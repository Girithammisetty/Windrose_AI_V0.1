# PBM role catalog (BRD 28 RX-FR-100) as tenant CUSTOM roles composing the
# Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). BRD personas mapped: pa_pharmacist, formulary_manager,
# rebate analyst (data steward slice), clinical_pharmacist_reviewer ->
# Clinical Director, pbm_compliance_officer.
