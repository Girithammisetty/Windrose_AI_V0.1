# pharmacy-benefit-mgmt capability pack (BRD 28) — Core-neutral edition:
# Rx prior-authorization and DUR safety review for PBMs, health plans, and
# Medicare Part D sponsors. Installable TODAY against Datacern Core's public
# APIs via packctl/pack-service; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are declared
# under `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases arrive
# from real rows via case triggers/intake, not seeds; eval golden sets are
# curated by the tenant from its own adjudicated history.
# v2.1.0 (audited depth rework): grounding corrected (MME/OMS attribution,
# rebate-delinking status, GPI class kept qualitative) and extended (DIR
# restructuring, 340B duplicate-discount exclusion, Part D redetermination
# clocks); neutral escalate_pharmacist review code + partial-approval code;
# PA triage gains Part D overdue escalations and a real default route;
# SLA-breach measures with a PA-Operations breach-watch tile.
# categories note: `mtm` is backed by the MTM-eligibility grounding record and
# `adherence` by the DUR late-refill (LR) outreach routing rule — both stay.
pack_manifest: 1
name: pharmacy-benefit-mgmt
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted pharmacy benefit management for PBMs, health plans, and
  Medicare Part D sponsors: Rx prior-authorization review with formulary and
  step-therapy grounding (denials always a documented human pharmacist
  decision), DUR safety-alert triage with adherence-outreach routing, typed
  PA/DUR case schemas and decision tables, PBM KPI semantic models (generic
  dispensing rate, PA turnaround, rebate capture, PMPM), three dashboards,
  PBM role catalog, domain ontology, governed PA-status write-back and
  claims/eligibility source connectors, domain-grounded copilot
  configuration, and a PA decision-scorer training pipeline.
categories: [pharmacy, pbm, prior-auth, mtm, adherence, medicare-part-d]
regulatory: [hipaa, hitrust, cms_part_d, cms_ma, ncpdp_ecl, dea_ec, state_pharmacy_law, ddi_alerts]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/pbm_core.yaml", identity: "pbm_core" }
    - { file: "semantic/pbm_pa.yaml", identity: "pbm_pa" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/pbm_trend_safety.yaml", identity: "pbm_trend_safety" }
    - { file: "dashboards/pa_operations.yaml", identity: "pa_operations" }
    - { file: "dashboards/rebate_cost.yaml", identity: "rebate_cost" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "pa_dur_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "review_schemas" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "pbm_ontology" }
  decision_models:
    - { file: "decisions/pa_triage_routing.yaml", identity: "pa_triage_routing" }
    - { file: "decisions/dur_safety_routing.yaml", identity: "dur_safety_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      RX-FR-030..070 bespoke LangGraph recipes (Rx PA Copilot, Formulary
      Alternative Suggester, MTM Copilot, Adherence Intervention Prioritizer,
      Star Ratings Copilot) require agent-runtime graph-module registration
      (a Core code surface, BRD 23 BR-12). This pack specializes the existing
      case-triage + analytics agents via TenantAgentConfig prompt_params +
      tenant-scope RAG grounding instead.
