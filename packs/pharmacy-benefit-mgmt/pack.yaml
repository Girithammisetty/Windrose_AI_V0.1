# pharmacy-benefit-mgmt capability pack (BRD 28) — Core-neutral edition.
# Installable TODAY against Windrose Core's public APIs via packctl; the
# manifest envelope follows BRD 23 (PKG-FR-001/003) so this bundle is
# forward-compatible with pack-service when it ships. Components the current
# Core cannot materialize are declared under `deferred` with the exact BRD 28
# requirement they trace to — recorded in the install ledger, never faked.
pack_manifest: 1
name: pharmacy-benefit-mgmt
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted pharmacy benefit management for PBMs, health plans, and
  Medicare Part D sponsors: Rx prior-authorization review with formulary and
  step-therapy grounding, DUR safety-alert triage, PBM KPI semantic models
  (generic dispensing rate, PA turnaround, rebate capture, PMPM), three
  dashboards, a PA/DUR review queue with pharmacist dispositions, PBM role
  catalog, domain-grounded copilot configuration, and a PA auto-decision
  training pipeline.
categories: [pharmacy, pbm, prior-auth, mtm, adherence, medicare-part-d]
regulatory: [hipaa, hitrust, cms_part_d, cms_ma, ncpdp_ecl, dea_ec, state_pharmacy_law, ddi_alerts]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/pbm_core.yaml", identity: "pbm_core" }
    - { file: "semantic/pbm_pa.yaml", identity: "pbm_pa" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/pbm_trend_safety.yaml", identity: "pbm_trend_safety" }
    - { file: "dashboards/pa_operations.yaml", identity: "pa_operations" }
    - { file: "dashboards/rebate_cost.yaml", identity: "rebate_cost" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "pa_dur_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: agent_recipes
    reason: >-
      RX-FR-030..070 bespoke LangGraph recipes (Rx PA Copilot, Formulary
      Alternative Suggester, MTM Copilot, Adherence Intervention Prioritizer,
      Star Ratings Copilot) require agent-runtime graph-module registration
      (a Core code surface, BRD 23 BR-12). This pack specializes the existing
      case-triage + analytics agents via TenantAgentConfig prompt_params +
      tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      RX-FR-080 read connectors (RxClaim, MedImpact, ScriptCheck, CoverMyMeds
      ePA, Surescripts RTPB, NCPDP EDI, dispensing feeds, Micromedex/First
      Databank/Lexi-Comp, formulary configs, member CRM) require customer
      credentials/licenses and pack-service connector materialization. The
      pack ships seed datasets in the exact landing shape; production
      connectors are configured through the product Data > Connections UI.
  - kind: write_adapters
    reason: >-
      RX-FR-080 write adapters (RxClaim PA decision post-back, CoverMyMeds
      ePA response, Surescripts approval/denial, MTM CMR document upload,
      adherence intervention log) execute only behind pack-service's
      materialization contract and customer credentials; all platform-side
      writes remain proposal-mode per BR-1/BR-10.
