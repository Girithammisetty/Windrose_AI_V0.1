# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the plan's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
# The SFTP drop is the PBM claims batch feed described generically — the
# tenant maps whatever file layout its adjudication platform emits to the
# pbm-rx-claims binding contract; the pack claims no specific EDI standard.
- name: "PBM claims batch drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "claims-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/pharmacy-claims"
- name: "Eligibility & formulary extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: pbm-eligibility-formulary-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
