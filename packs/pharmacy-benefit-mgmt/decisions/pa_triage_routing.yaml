# Governed decision table (BRD 54) — a deterministic, explainable, no-LLM
# first-cut triage over the PA worklist's real projection columns (all from
# the pbm_pa_requests binding contract). It EXECUTES to the same governed
# four-eyes proposal an agent produces: an operator dry-runs or batch-runs it
# across the worklist, and every matched case becomes a case.apply_disposition
# proposal a licensed pharmacist must approve. This table NEVER proposes a
# denial — an adverse coverage determination is always a documented human
# clinical decision — and every approval-shaped rule excludes controlled
# substances, which route to pharmacist review (the overdue and default
# routes are themselves neutral pharmacist-review outcomes, so they apply to
# all requests). The CMS Part D coverage-determination windows this pack's
# grounding documents (72h standard / 24h expedited) drive the overdue
# escalations; plan-configured tuning applies elsewhere.
# NOTE (formulary rules deliberately absent): the pbm_pa_requests contract
# carries no non-formulary or quantity-limit-exceeded column (those flags
# live on the pbm_formulary dataset, which this worklist projection does not
# join), so non-formulary pend/outreach and quantity-limit dose-rationale
# routing cannot be screened deterministically here — the copilot grounds
# those calls from the formulary context instead. There is likewise no
# documented-intolerance column, so the step-therapy exception is carried in
# the step-therapy rules' notes. Outcome disposition_codes are validated
# against this workspace's disposition catalog at install (dispositions
# install first).
- identity: pa_triage_routing
  name: "Rx PA triage routing"
  rules:
    # OVERDUE first: the Part D coverage-determination clock has already run
    # out (24h expedited / 72h standard). Neutral escalation applies to every
    # request, controlled or not — a breach is a compliance reportable and
    # auto-forwards to the Part D IRE.
    - when:
        - { column: status, op: eq, value: pending }
        - { column: urgency, op: eq, value: expedited }
        - { column: turnaround_hours, op: gte, value: 24 }
      then: { disposition_code: escalate_pharmacist, severity: critical }
      note: "OVERDUE — expedited PA past the 24-hour Part D coverage-determination window; SLA breach is a compliance reportable and auto-forwards to the IRE, pharmacist now"
    - when:
        - { column: status, op: eq, value: pending }
        - { column: urgency, op: eq, value: standard }
        - { column: turnaround_hours, op: gte, value: 72 }
      then: { disposition_code: escalate_pharmacist, severity: critical }
      note: "OVERDUE — standard PA past the 72-hour Part D coverage-determination window; SLA breach is a compliance reportable and auto-forwards to the IRE, pharmacist now"
    # Expedited PA missing step-therapy documentation — the fastest way to a
    # decidable file is to request the prescriber's records immediately.
    - when:
        - { column: status, op: eq, value: pending }
        - { column: urgency, op: eq, value: expedited }
        - { column: controlled_substance, op: eq, value: "no" }
        - { column: step_therapy_met, op: eq, value: "no" }
      then: { disposition_code: pa_pended_info, severity: critical }
      note: "Expedited PA without step-therapy documentation — pend for prescriber info now (plan-configured expedited window); documented intolerance or contraindication satisfies the step in place of a trial, so request that evidence explicitly"
    # Standard PA missing step-therapy documentation.
    - when:
        - { column: status, op: eq, value: pending }
        - { column: controlled_substance, op: eq, value: "no" }
        - { column: step_therapy_met, op: eq, value: "no" }
      then: { disposition_code: pa_pended_info, severity: medium }
      note: "Step-therapy documentation missing — pend for prescriber records before clinical review; documented intolerance or contraindication satisfies the step in place of a trial"
    # Clean expedited PA: criteria documented, non-controlled, copilot
    # recommends approval with high confidence — propose approval for
    # one-click pharmacist confirmation (approval is not adverse action).
    - when:
        - { column: status, op: eq, value: pending }
        - { column: urgency, op: eq, value: expedited }
        - { column: controlled_substance, op: eq, value: "no" }
        - { column: step_therapy_met, op: eq, value: "yes" }
        - { column: agent_recommendation, op: eq, value: approve }
        - { column: agent_confidence, op: gte, value: 0.85 }
      then: { disposition_code: pa_approved, severity: high }
      note: "Clean expedited PA (criteria met, non-controlled, high-confidence recommendation) — propose approval for one-click pharmacist confirmation"
    # Clean standard PA at higher confidence.
    - when:
        - { column: status, op: eq, value: pending }
        - { column: urgency, op: eq, value: standard }
        - { column: controlled_substance, op: eq, value: "no" }
        - { column: step_therapy_met, op: eq, value: "yes" }
        - { column: agent_recommendation, op: eq, value: approve }
        - { column: agent_confidence, op: gte, value: 0.9 }
      then: { disposition_code: pa_approved, severity: low }
      note: "Clean standard PA (criteria met, non-controlled, high-confidence recommendation) — propose approval for pharmacist confirmation"
  # Nothing matched deterministically -> the neutral escalate_pharmacist
  # review code: every controlled-substance, denial-candidate, or
  # low-confidence PA goes to the licensed pharmacist's own determination —
  # the table still never proposes a denial.
  default_outcome: { disposition_code: escalate_pharmacist, severity: low }
