# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# pbm_rx_claims / pbm_formulary / pbm_pa_requests / pbm_dur_alerts binding
# contracts. Attribute names are taken strictly from the contract columns so
# the ontology describes data the tenant actually binds.
- entity_key: member
  name: "Plan member"
  description: "The covered member whose prescriptions the plan adjudicates."
  attributes:
    - { name: member_state, data_type: string }
  relationships:
    - { name: rx_claims, target: rx_claim, cardinality: has_many }
    - { name: prior_auth_requests, target: prior_auth_request, cardinality: has_many }
    - { name: dur_alerts, target: dur_alert, cardinality: has_many }
- entity_key: prescriber
  name: Prescriber
  description: "The NPI-identified prescriber behind claims and PA requests."
  attributes:
    - { name: prescriber_npi, data_type: string }
  relationships:
    - { name: rx_claims, target: rx_claim, cardinality: has_many }
    - { name: prior_auth_requests, target: prior_auth_request, cardinality: has_many }
- entity_key: formulary_drug
  name: "Formulary drug listing"
  description: >-
    A GPI-class formulary position: tier, utilization-management flags
    (PA / step therapy / quantity limit), and preferred-agent status.
  attributes:
    - { name: gpi_class, data_type: string }
    - { name: therapeutic_class, data_type: string }
    - { name: preferred_tier, data_type: string }
    - { name: pa_required, data_type: string, description: "yes | no" }
    - { name: step_therapy, data_type: string, description: "yes | no" }
    - { name: quantity_limit, data_type: string, description: "yes | no" }
    - { name: preferred_agent, data_type: string }
    - { name: specialty_flag, data_type: string, description: "yes | no" }
  relationships:
    - { name: rx_claims, target: rx_claim, cardinality: has_many }
    - { name: prior_auth_requests, target: prior_auth_request, cardinality: has_many }
- entity_key: rx_claim
  name: "Rx claim"
  description: "An adjudicated pharmacy claim (paid, rejected, or reversed)."
  attributes:
    - { name: ndc, data_type: string }
    - { name: drug_name, data_type: string }
    - { name: gpi_class, data_type: string }
    - { name: brand_generic, data_type: string, description: "brand | generic" }
    - { name: formulary_tier, data_type: string }
    - { name: daw_code, data_type: string }
    - { name: fill_month, data_type: string }
    - { name: days_supply, data_type: integer }
    - { name: quantity, data_type: float }
    - { name: ingredient_cost, data_type: float }
    - { name: plan_paid, data_type: float }
    - { name: member_copay, data_type: float }
    - { name: rebate_expected, data_type: float }
    - { name: rebate_collected, data_type: float }
    - { name: claim_status, data_type: string, description: "paid | rejected | reversed" }
    - { name: reject_code, data_type: string, description: "NCPDP reject code, or none" }
    - { name: channel, data_type: string, description: "retail | mail | specialty" }
  relationships:
    - { name: member, target: member, cardinality: belongs_to }
    - { name: prescriber, target: prescriber, cardinality: belongs_to }
    - { name: formulary_drug, target: formulary_drug, cardinality: belongs_to }
    - { name: dur_alerts, target: dur_alert, cardinality: has_many }
- entity_key: prior_auth_request
  name: "Prior-authorization request"
  description: >-
    A coverage-determination request carrying urgency, controlled-substance
    status, step-therapy documentation, and the copilot's recommendation —
    decided by a licensed pharmacist within the plan-configured window.
  attributes:
    - { name: ndc, data_type: string }
    - { name: drug_name, data_type: string }
    - { name: gpi_class, data_type: string }
    - { name: urgency, data_type: string, description: "expedited | standard" }
    - { name: submitted_month, data_type: string }
    - { name: status, data_type: string, description: "pending | approved | denied" }
    - { name: turnaround_hours, data_type: float }
    - { name: controlled_substance, data_type: string, description: "yes | no" }
    - { name: cs_schedule, data_type: string }
    - { name: formulary_tier, data_type: string }
    - { name: step_therapy_met, data_type: string, description: "yes | no" }
    - { name: agent_recommendation, data_type: string }
    - { name: agent_confidence, data_type: float }
    - { name: denial_reason, data_type: string }
  relationships:
    - { name: member, target: member, cardinality: belongs_to }
    - { name: prescriber, target: prescriber, cardinality: belongs_to }
    - { name: formulary_drug, target: formulary_drug, cardinality: belongs_to }
- entity_key: dur_alert
  name: "DUR alert"
  description: >-
    A drug-utilization-review conflict fired against a claim — interaction,
    duplication, dosing, or refill-timing (adherence) signal — awaiting a
    pharmacist's documented override or intervention.
  attributes:
    - { name: conflict_code, data_type: string }
    - { name: severity_level, data_type: string, description: "1 (clinical-critical) | 2 | 3" }
    - { name: conflict_description, data_type: string }
    - { name: alert_month, data_type: string }
    - { name: status, data_type: string, description: "open | resolved" }
    - { name: pharmacist_action, data_type: string, description: "pending | override | intervene" }
  relationships:
    - { name: rx_claim, target: rx_claim, cardinality: belongs_to }
    - { name: member, target: member, cardinality: belongs_to }
