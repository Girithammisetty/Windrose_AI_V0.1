# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous safety-database change). The
# URL is a placeholder the tenant replaces; nothing is called at install.
- name: "Safety database case status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://safety-database.example.invalid/api/v1/icsr/status"
    headers: { Content-Type: "application/json" }
