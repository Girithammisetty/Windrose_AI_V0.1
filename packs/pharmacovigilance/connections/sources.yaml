# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the safety
# department's expected feeds exist as governed starting points the tenant
# completes with real hosts/credentials in Data → Connections. Nothing is
# polled at install. The SFTP drop is where E2B-style ICSR XML files land
# from exchange partners — the tenant's transformation step maps them to the
# pv-cases / pv-events landing shape (Core does not itself parse E2B).
- name: "ICSR intake drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "pv-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/inbound/icsr-xml"
- name: "Partner and literature intake extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: pv-intake-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
