# Semantic model `pv_core` — pharmacovigilance case-processing KPI catalog
# (serious-case rate, expedited conversion, deadline runway, backlog aging,
# unlisted-event signal share), expressed in the Core semantic grammar
# (agg whitelist, equality measure filters, derived expr_metric with nullif;
# join_paths left/many_to_one, acyclic snowflake: events -> cases -> products).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Numeric columns ingest
# as bronze strings, so numeric measures cast(... as double).
name: pv_core
description: >-
  Pharmacovigilance ICSR operations KPI model (FDA 21 CFR 314.80 / ICH E2A /
  EU GVP): adverse-event case volumes by source and seriousness, expedited
  vs periodic reporting mix, regulatory deadline runway, backlog aging, and
  MedDRA-coded event signal surfaces (unlisted-term share by product) —
  events joined to cases joined to the product book.
definition:
  entities:
    - name: cases
      dataset: pv_cases
      table: main.pv_cases
      primary_key: [case_id]
      dataset_version_policy: { policy: latest }
    - name: events
      dataset: pv_events
      table: main.pv_events
      primary_key: [event_id]
      dataset_version_policy: { policy: latest }
    - name: products
      dataset: pv_products
      table: main.pv_products
      primary_key: [product_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: cases_products
      from_entity: cases
      to_entity: products
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: product_id, to_column: product_id }]
    - name: events_cases
      from_entity: events
      to_entity: cases
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: case_id, to_column: case_id }]
  dimensions:
    - { name: case_type, entity: cases, type: categorical, column: case_type }
    - { name: source, entity: cases, type: categorical, column: source }
    - { name: report_country, entity: cases, type: categorical, column: report_country }
    - { name: serious, entity: cases, type: categorical, column: serious }
    - { name: seriousness_criteria, entity: cases, type: categorical, column: seriousness_criteria }
    - { name: expectedness, entity: cases, type: categorical, column: expectedness }
    - { name: causality, entity: cases, type: categorical, column: causality }
    - { name: case_status, entity: cases, type: categorical, column: status }
    - { name: case_disposition, entity: cases, type: categorical, column: disposition }
    - { name: deadline_bucket, entity: cases, type: categorical, column: deadline_bucket }
    - { name: received_month, entity: cases, type: categorical, column: received_month }
    - { name: patient_age_group, entity: cases, type: categorical, column: patient_age_group }
    - { name: patient_sex, entity: cases, type: categorical, column: patient_sex }
    - { name: case_outcome, entity: cases, type: categorical, column: outcome }
    - { name: event_pt, entity: events, type: categorical, column: event_pt }
    - { name: soc, entity: events, type: categorical, column: soc }
    - { name: event_listed, entity: events, type: categorical, column: listed }
    - { name: event_severity, entity: events, type: categorical, column: severity }
    - { name: event_outcome, entity: events, type: categorical, column: outcome }
    - { name: product_name, entity: products, type: categorical, column: product_name }
    - { name: therapeutic_area, entity: products, type: categorical, column: therapeutic_area }
    - { name: formulation, entity: products, type: categorical, column: formulation }
    - { name: region_scope, entity: products, type: categorical, column: region_scope }
    - { name: rems_flag, entity: products, type: categorical, column: rems_flag }
  measures:
    - { name: case_count, entity: cases, agg: count,
        description: "Number of adverse-event cases (ICSRs)" }
    - { name: open_case_count, entity: cases, agg: count,
        filters: "status = 'open'",
        description: "Cases still open (processing backlog)" }
    - { name: closed_case_count, entity: cases, agg: count,
        filters: "status = 'closed'",
        description: "Cases closed with a reporting decision" }
    - { name: serious_case_count, entity: cases, agg: count,
        filters: "serious = 'yes'",
        description: "Serious cases per ICH E2A criteria" }
    - { name: fatal_case_count, entity: cases, agg: count,
        filters: "outcome = 'fatal'",
        description: "Cases with a fatal outcome" }
    - { name: unlisted_case_count, entity: cases, agg: count,
        filters: "expectedness = 'unlisted'",
        description: "Cases with an unexpected (unlisted) reaction — expedited surface" }
    - { name: expedited_filed_count, entity: cases, agg: count,
        filters: "disposition = 'expedited_report_filed'",
        description: "Cases closed with an expedited (15-day / 7-day) report submitted" }
    - { name: periodic_count, entity: cases, agg: count,
        filters: "disposition = 'periodic_report'",
        description: "Cases routed to periodic aggregate reporting (PADER/PSUR)" }
    - { name: non_reportable_count, entity: cases, agg: count,
        filters: "disposition = 'non_reportable'",
        description: "Cases closed as not meeting valid-case or reportability criteria" }
    - { name: nullified_count, entity: cases, agg: count,
        filters: "disposition = 'nullified_duplicate'",
        description: "Cases nullified as duplicates of already-processed ICSRs" }
    - { name: avg_case_age_days, entity: cases, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average case age in days (cycle time / backlog aging)" }
    - { name: avg_days_to_deadline, entity: cases, agg: avg,
        expr: "cast(days_to_deadline as double)", format: decimal,
        description: "Average days remaining to the regulatory reporting deadline (open book)" }
    - { name: event_count, entity: events, agg: count,
        description: "Number of MedDRA-coded adverse events" }
    - { name: unlisted_event_count, entity: events, agg: count,
        filters: "listed = 'no'",
        description: "Events with an unlisted (unexpected) preferred term — signal surface" }
    - { name: severe_event_count, entity: events, agg: count,
        filters: "severity = 'severe'",
        description: "Events graded severe" }
    - { name: product_count, entity: products, agg: count,
        description: "Number of products in the safety portfolio" }
    - { name: rems_product_count, entity: products, agg: count,
        filters: "rems_flag = 'yes'",
        description: "Products under a REMS program" }
    - { name: serious_case_rate,
        expr_metric: "serious_case_count / nullif(case_count, 0)",
        format: percent,
        description: "Serious cases over all cases received" }
    - { name: expedited_conversion_rate,
        expr_metric: "expedited_filed_count / nullif(closed_case_count, 0)",
        format: percent,
        description: "Closed cases that produced an expedited regulatory report" }
    - { name: unlisted_event_share,
        expr_metric: "unlisted_event_count / nullif(event_count, 0)",
        format: percent,
        description: "Unlisted (unexpected) events over all events — portfolio signal pressure" }
    - { name: duplicate_rate,
        expr_metric: "nullified_count / nullif(closed_case_count, 0)",
        format: percent,
        description: "Closures nullified as duplicates — intake data-quality watch" }
