# PV role catalog as tenant CUSTOM roles composing the Core's closed action
# catalog (rbac never mints new verbs; packctl also creates a same-named
# permission group and binds the role so it's assignable). Separation of
# duties per GVP Module I expectations: the Intake Specialist processes and
# proposes, the Medical Reviewer owns seriousness/expectedness/causality,
# the Safety Officer (QPPV-equivalent) alone approves dispositions that
# become regulatory submissions, the Signal Analyst works the aggregate
# surfaces, and the Quality Auditor reviews everything with no case-write
# power (inspection readiness).
- name: "PV Intake Specialist"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
