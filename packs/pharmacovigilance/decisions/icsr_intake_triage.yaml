# Governed decision table (BRD 54) — a deterministic, explainable, no-LLM
# intake-triage ROUTER over pv_cases binding-contract columns (status,
# serious, seriousness_criteria, case_type, expectedness, days_to_deadline).
# It EXECUTES to the same governed four-eyes proposal an agent produces: an
# operator dry-runs or batch-runs it across the worklist, and every matched
# case becomes a case.apply_disposition proposal a human must approve. The
# table ONLY prioritizes the queue — it NEVER proposes a seriousness,
# causality, expectedness, or reportability determination (those belong to
# the medical reviewer and the Safety Officer/QPPV), so
# submit_expedited_report / include_periodic_report / non_reportable_invalid
# / nullify_duplicate never appear as rule outcomes. The days_to_deadline
# band is an institution-configured expedite threshold over the tenant's own
# clock column, not a regulatory day-count. Outcome disposition_codes are
# validated against this workspace's disposition catalog at install, so
# `dispositions` installs before this (packctl INSTALL_ORDER).
- identity: icsr_intake_triage
  name: "ICSR intake triage routing"
  rules:
    # Reporting clock ALREADY breached — negative runway would silently
    # fall through the [0,7] band below, so it gets its own leading rule.
    - when:
        - { column: status, op: eq, value: open }
        - { column: days_to_deadline, op: lt, value: 0 }
      then: { disposition_code: escalate_medical_review, severity: critical }
      note: >-
        Regulatory reporting clock already breached (negative runway) —
        overdue cases lead the queue; the late-submission handling and any
        regulator notification remain human decisions (QPPV).
    # Fatal-outcome case — leads the queue, always.
    - when:
        - { column: status, op: eq, value: open }
        - { column: seriousness_criteria, op: eq, value: death }
      then: { disposition_code: escalate_medical_review, severity: critical }
      note: >-
        Fatal-outcome ICSR — route to priority medical review immediately.
        The seriousness/expectedness/causality assessment and any
        submission decision remain human (medical reviewer + QPPV).
    # Serious clinical-trial case — the tightest regulatory reporting
    # clocks apply to this category.
    - when:
        - { column: status, op: eq, value: open }
        - { column: case_type, op: eq, value: clinical }
        - { column: serious, op: eq, value: "yes" }
      then: { disposition_code: escalate_medical_review, severity: critical }
      note: >-
        Serious case from a clinical trial — the tightest regulatory
        reporting clocks apply to this report category, so it goes to
        medical review ahead of the postmarketing book.
    # Serious case with the reporting-clock runway nearly exhausted.
    - when:
        - { column: status, op: eq, value: open }
        - { column: serious, op: eq, value: "yes" }
        - { column: days_to_deadline, op: between, value: [0, 7] }
      then: { disposition_code: escalate_medical_review, severity: critical }
      note: >-
        Serious case with little regulatory reporting-clock runway left —
        expedite-band threshold is institution-configured over the
        tenant's own days_to_deadline column, not a regulatory day-count.
    # Serious literature case — the regulatory clock started when the
    # article was first screened, so day zero is already spent by the time
    # the case reaches intake.
    - when:
        - { column: status, op: eq, value: open }
        - { column: case_type, op: eq, value: literature }
        - { column: serious, op: eq, value: "yes" }
      then: { disposition_code: escalate_medical_review, severity: high }
      note: >-
        Serious literature case — literature cases arrive with day zero
        already elapsed at screening, so the effective runway is shorter
        than the clock column suggests; expedite medical review.
    # Serious + recorded-unlisted profile: expedited-report CANDIDATE —
    # the candidacy prioritizes review; the reportability call stays human.
    - when:
        - { column: status, op: eq, value: open }
        - { column: serious, op: eq, value: "yes" }
        - { column: expectedness, op: eq, value: unlisted }
      then: { disposition_code: escalate_medical_review, severity: high }
      note: >-
        Recorded serious + unlisted profile is the expedited-report
        CANDIDATE surface — the table only moves it up the queue; the
        reportability determination itself is never proposed by rule.
  # Every valid ICSR receives human medical review; unmatched open cases
  # route at routine priority — the neutral human-review outcome, still a
  # four-eyes proposal a reviewer must approve.
  default_outcome: { disposition_code: escalate_medical_review, severity: low }
