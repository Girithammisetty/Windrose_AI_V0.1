# pharmacovigilance capability pack — Core-neutral edition: adverse-event
# (ICSR) case processing for pharma/biotech safety departments. Installable
# TODAY against Datacern Core's public APIs via packctl/pack-service; the
# manifest envelope follows BRD 23 (PKG-FR-001/003). Components the current
# Core cannot materialize are declared under `deferred` — recorded in the
# install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own assessed case history.
pack_manifest: 1
name: pharmacovigilance
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted pharmacovigilance case processing (FDA 21 CFR 314.80/312.32,
  ICH E2A/E2D, EU GVP): ICSR intake triage with valid-case and duplicate
  checks, seriousness/expectedness/causality-grounded reporting proposals
  with QPPV approval, expedited (15-day/7-day) deadline tracking, PV
  operations KPI semantic model and dashboards (serious-case rate, expedited
  conversion, deadline runway, unlisted-term signal pressure),
  product-event signal network analytics, regulatory grounding memories,
  and event-anomaly + case-priority training pipelines.
categories: [pharma, pharmacovigilance, drug-safety, icsr]
regulatory: [fda_21cfr314, fda_21cfr312, ich_e2a, ich_e2d, eu_gvp, meddra]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/pv_core.yaml", identity: "pv_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/pv_case_operations.yaml", identity: "pv_case_operations" }
    - { file: "dashboards/signal_watch.yaml", identity: "signal_watch" }
    - { file: "dashboards/regulatory_reporting.yaml", identity: "regulatory_reporting" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "icsr_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "icsr_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "pv_ontology" }
  decision_models:
    - { file: "decisions/icsr_intake_triage.yaml", identity: "icsr_intake_triage" }
    - { file: "decisions/followup_routing.yaml", identity: "followup_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Intake Validity Checker, Duplicate
      Detector, MedDRA Coding Assistant, Narrative Drafter, Signal
      Evaluation Copilot) require agent-runtime graph-module registration
      (BRD 23 BR-12). This pack specializes the existing case-triage +
      analytics agents via TenantAgentConfig prompt_params + tenant-scope
      RAG grounding instead.
