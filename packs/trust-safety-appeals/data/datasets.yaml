# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload.
- identity: ts_appeals
  name: ts-appeals
  required_columns:
    [appeal_id, decision_id, appeal_type, policy_area, enforcement_source,
     user_standing, severity, status, disposition, filed_month, age_days,
     days_to_deadline, deadline_bucket]
- identity: ts_enforcements
  name: ts-enforcements
  required_columns:
    [decision_id, account_id, content_type, classifier_score_band,
     policy_version, action, enforce_month, geography, report_count]
- identity: ts_accounts
  name: ts-accounts
  required_columns:
    [account_id, account_handle, account_type, account_age_bucket,
     audience_tier, prior_violations, verified, monetized]
