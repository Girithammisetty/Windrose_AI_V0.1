# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous change to the moderation
# platform). The URL is a placeholder the tenant replaces; nothing is called
# at install.
- name: "Moderation platform appeal status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://moderation-platform.example.invalid/api/v1/appeals/status"
    headers: { Content-Type: "application/json" }
