# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the platform's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
- name: "Appeal export drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "appeals-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/appeal-exports"
- name: "Enforcement log extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: enforcement-log-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
