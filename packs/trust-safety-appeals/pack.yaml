# trust-safety-appeals capability pack — Core-neutral edition: platform
# trust & safety appeals adjudication (content and account enforcement
# appeals) for social/UGC platforms, marketplaces, gaming platforms, and
# dating apps under DSA/OSA process obligations. Installable TODAY against
# Datacern Core's public APIs via packctl/pack-service; the manifest envelope
# follows BRD 23 (PKG-FR-001/003). Components the current Core cannot
# materialize are declared under `deferred` — recorded in the install ledger,
# never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own adjudicated appeal history.
pack_manifest: 1
name: trust-safety-appeals
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted trust-and-safety appeals adjudication for online platforms:
  appeal intake triage with complaint-handling deadline awareness (DSA
  statement-of-reasons and internal complaint-handling obligations, human
  review never solely automated), classifier false-positive detection with
  overturn-rate feedback into enforcement quality, brigading/mass-report
  integrity screening, compromised-account restore paths, policy-gap
  escalation and precedent loops, appeals-operations KPI semantic model and
  dashboards (overturn rate, uphold rate, escalation share, deadline runway,
  enforcement-source mix), account-enforcement network analytics, DSA/OSA
  grounding memories, and enforcement-anomaly + appeal-outcome training
  pipelines.
categories: [trust_safety, content_moderation, appeals, platform_governance, marketplaces]
regulatory: [eu_dsa, uk_online_safety_act]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/appeals_core.yaml", identity: "appeals_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/appeals_command_center.yaml", identity: "appeals_command_center" }
    - { file: "dashboards/overturn_classifier_quality.yaml", identity: "overturn_classifier_quality" }
    - { file: "dashboards/dsa_compliance_transparency.yaml", identity: "dsa_compliance_transparency" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "appeal_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "appeal_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "appeals_ontology" }
  decision_models:
    - { file: "decisions/appeal_priority_routing.yaml", identity: "appeal_priority_routing" }
    - { file: "decisions/policy_gap_and_integrity_routing.yaml", identity: "policy_gap_and_integrity_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Appeal Intake Copilot, Statement-of-Reasons
      Drafter, Brigading/Report-Integrity Screener, Complaint-Deadline
      Sentinel) require agent-runtime graph-module registration (BRD 23
      BR-12). This pack specializes the existing case-triage + analytics
      agents via TenantAgentConfig prompt_params + tenant-scope RAG
      grounding instead.
