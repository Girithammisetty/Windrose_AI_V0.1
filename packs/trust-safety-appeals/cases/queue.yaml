# Seeded appeals-adjudication queue: the OPEN appeals from the seed dataset
# become cases so a reviewer logging in sees a real, pattern-diverse worklist
# on day one — a counter-speech classifier false positive, a repeat-infringer
# counterfeit appeal with new authorization docs, a mass-reported creator
# (brigading suspicion), a satire demonetization policy-gap, a
# compromised-account suspension, and a duplicate second appeal. due_days=4
# keeps triage inside the tightest complaint-handling deadlines on the open
# book (1-3 days runway on the high rows).
dataset: ts_appeals
due_days: 4
rows:
  - row_pk: APL-9001
    severity: high
    display_projection:
      appeal_id: APL-9001
      account: "KestrelWatch (ACC-3001)"
      appeal_type: content_removal
      policy_area: hate_speech
      enforcement_source: automated_classifier
      days_to_deadline: "2"
      note: "Counter-speech false-positive signature: verified creator's video condemning a slur was removed by the hate-speech classifier at high confidence (E-8019, policy HS-2.3) — the quoted term triggered the model, the surrounding content denounces it. Identical removal on this account (E-8001) was overturned in March (APL-7001); no violation history. High overturn likelihood; decision due in 2 days and the appeal decision cannot rest solely on automated means"
  - row_pk: APL-9002
    severity: medium
    display_projection:
      appeal_id: APL-9002
      account: "BrightBazaarGoods (ACC-3002)"
      appeal_type: content_removal
      policy_area: counterfeit
      enforcement_source: user_report
      days_to_deadline: "9"
      note: "Repeat counterfeit infringer (3+ priors; APL-7002 on E-8002 upheld in March) appealing a brand-report listing takedown (E-8020) — but this time submits a distributor authorization letter and invoice chain not present in prior appeals. History is a risk signal, not proof: verify the new authorization docs against the brand registry on their own merits before deciding"
  - row_pk: APL-9003
    severity: high
    display_projection:
      appeal_id: APL-9003
      account: "LumaSketch (ACC-3003)"
      appeal_type: ranking_restriction
      policy_area: harassment
      enforcement_source: user_report
      days_to_deadline: "3"
      note: "Brigading signature: reach restriction (E-8021) rode 214 user reports landing in a burst — same pattern as the April wave (E-8006: 167 reports, E-8030: 143 reports) that was overturned on appeal (APL-7006) after the reports traced to an off-platform call-to-report thread. Large verified creator; assess the reported posts on content, not report volume, and route reporter-cluster evidence to report-integrity review"
  - row_pk: APL-9004
    severity: medium
    display_projection:
      appeal_id: APL-9004
      account: "SatireCityDaily (ACC-3004)"
      appeal_type: demonetization
      policy_area: misinformation
      enforcement_source: automated_classifier
      days_to_deadline: "21"
      note: "Policy-gap signature: satire channel demonetized (E-8022) after the misinformation classifier scored a parody news video at high confidence — the misinformation policy (MI-1.7) has no explicit satire/parody carve-out, and this account's March appeal on the same question (APL-7005 on E-8005) was escalated to the policy team and remains unresolved. Monetized account, livelihood impact; escalate for a precedent ruling rather than re-deciding case-by-case"
  - row_pk: APL-9005
    severity: high
    display_projection:
      appeal_id: APL-9005
      account: "PixelForgeFan (ACC-3005)"
      appeal_type: account_suspension
      policy_area: spam
      enforcement_source: automated_classifier
      days_to_deadline: "1"
      note: "Compromised-account signature: suspension (E-8023) triggered by a spam-message blast (E-8028, E-8029 removed the same week) from a clean 0-prior account — blast followed a password change and logins from a new geography inconsistent with the owner's history. Restore path: verify owner identity, reset credentials, revoke sessions, expunge strikes from the compromise window. Decision due in 1 day"
  - row_pk: APL-9006
    severity: medium
    display_projection:
      appeal_id: APL-9006
      account: "KestrelWatch (ACC-3001)"
      appeal_type: content_removal
      policy_area: hate_speech
      enforcement_source: automated_classifier
      days_to_deadline: "12"
      note: "Duplicate signature: second appeal on the same enforcement decision (E-8019) filed 3 days after APL-9001 and while it is still pending — same appellant, same decision, no new evidence attached. Close as duplicate with a note linking the appellant to the live appeal APL-9001; do not run a parallel determination on one decision"
