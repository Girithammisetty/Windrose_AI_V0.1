# Appeals-operations role catalog as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties: the Appeals Reviewer adjudicates first-line appeals
# and proposes, the Senior Policy Reviewer handles precedent-setting and
# classifier-quality investigations, the Escalations Specialist owns
# policy-team and report-integrity escalations, the Appeals Operations
# Manager alone approves dispositions (final determinations and restorations
# are four-eyes), and the Transparency & Audit Lead reviews everything with
# no case-write power (DSA transparency-report and audit readiness).
- name: "Appeals Reviewer"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
