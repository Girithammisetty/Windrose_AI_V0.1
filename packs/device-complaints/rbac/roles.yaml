# Complaint-handling role catalog as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties: the Intake Coordinator logs and triages, the
# Complaint Investigator runs the technical investigation, the MDR
# Reportability Analyst owns the 21 CFR 803 decision file (with ingestion
# reads for source-system evidence), the Quality & Regulatory Manager alone
# approves dispositions (MDR filings and not-reportable rationales are
# four-eyes), and the Quality Systems Auditor reviews everything with no
# case-write power (inspection readiness).
- name: "Complaint Intake Coordinator"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
