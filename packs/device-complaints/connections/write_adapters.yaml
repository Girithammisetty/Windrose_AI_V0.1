# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous QMS change, and never a
# regulatory submission). The URLs are placeholders the tenant replaces;
# nothing is called at install.
- name: "QMS complaint status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://eqms.example.invalid/api/v1/complaints/status"
    headers: { Content-Type: "application/json" }
