# insurance-claims-payer capability pack (BRD 24) — Core-neutral edition.
# Installable TODAY against Windrose Core's public APIs via packctl; the
# manifest envelope follows BRD 23 (PKG-FR-001/003) so this bundle is
# forward-compatible with pack-service when it ships. Components the current
# Core cannot materialize are declared under `deferred` with the exact BRD
# requirement they trace to — recorded in the install ledger, never faked.
pack_manifest: 1
name: insurance-claims-payer
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted prior-auth review, appeal analysis, and denial analytics for US
  health payers: payer KPI semantic models, three dashboards, PA/appeal review
  queues with dispositions, payer role catalog, domain-grounded copilot
  configuration, and a PA-approval training pipeline.
categories: [insurance, health, payer, claims, prior-auth, appeals, denials]
regulatory: [cms_4201_f, cms_2024_ma_ai_review, naic_ai_bulletin, hipaa]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/claims.yaml", identity: "claims" }
    - { file: "semantic/utilization.yaml", identity: "utilization" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/payer_kpi.yaml", identity: "payer_kpi" }
    - { file: "dashboards/appeals_analytics.yaml", identity: "appeals_analytics" }
    - { file: "dashboards/pa_ops.yaml", identity: "pa_ops" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/pa_queue.yaml", identity: "pa_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: agent_recipes
    reason: >-
      INS-FR-030/040/050 bespoke LangGraph recipes (prior_auth,
      appeal_analyst, denial_rationale) require agent-runtime graph-module
      registration (a Core code surface, BRD 23 BR-12). This pack specializes
      the existing case-triage + analytics agents via TenantAgentConfig
      prompt_params + tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      INS-FR-060 SoR connectors (Facets, HealthEdge, QNXT, Guidewire, Epic
      FHIR, EDI 837/835/278) require customer credentials and pack-service
      connector materialization. The pack ships seed datasets in the exact
      landing shape; production connectors are configured through the product
      Data > Connections UI.
  - kind: write_adapters
    reason: >-
      INS-FR-061 SoR write adapters (Facets PA decision, Guidewire notes, EDI
      responses) execute only behind pack-service's materialization contract
      and customer credentials; all platform-side writes remain proposal-mode.
  - kind: ontology
    reason: >-
      INS-FR-010 ontology registration awaits pack-service; entity semantics
      are carried today by the semantic models and dataset schemas.
  - kind: case_schemas
    reason: >-
      INS-FR-091 typed case schemas await case-service schema materialization;
      today's cases carry the same fields via display_projection + the
      disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      INS-FR-071 confidence calibrator ships as a pipeline seed instead
      (pa_approval_classifier); Platt-scaling archetype registration awaits
      experiment-service archetype APIs.
