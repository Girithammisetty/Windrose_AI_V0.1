# insurance-claims-payer capability pack (BRD 24) — Core-neutral edition:
# AI-assisted prior-auth review, appeal analysis, and denial analytics for US
# health payers. Installable TODAY against Datacern Core's public APIs via
# packctl/pack-service; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under `deferred`
# — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases arrive
# from real rows via case triggers/intake, not seeds; eval golden sets are
# curated by the tenant from its own adjudicated history.
# v2.1.0 (audited depth rework): fabricated plan-history grounding removed;
# SME-depth triage instructions; PA/appeal decision tables extended (overdue
# escalation, missing-clinical-info deferral, CO-151/PR-204 appeal routes);
# turnaround grounding extended with CMS-0057-F, which carries the
# 72h-expedited / 7-day-standard prior-auth windows to Medicaid, CHIP, and
# FFE QHP issuers (compliance from Jan 1 2026; PA API phased 2026-2027).
pack_manifest: 1
name: insurance-claims-payer
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted prior-auth review, appeal analysis, and denial analytics for US
  health payers: payer KPI semantic models, three dashboards, typed PA/appeal
  case schemas with dispositions, deterministic PA-triage and appeal-routing
  decision tables, payer domain ontology, payer role catalog, domain-grounded
  copilot configuration with guardrails, governed source/write-back
  connections (X12 837 intake, claim-status sync), and a PA-approval training
  pipeline with its governed model blueprint.
categories: [insurance, health, payer, claims, prior-auth, appeals, denials]
regulatory: [cms_4201_f, cms_0057_f, cms_2024_ma_ai_review, naic_ai_bulletin, hipaa]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/claims.yaml", identity: "claims" }
    - { file: "semantic/utilization.yaml", identity: "utilization" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/payer_kpi.yaml", identity: "payer_kpi" }
    - { file: "dashboards/appeals_analytics.yaml", identity: "appeals_analytics" }
    - { file: "dashboards/pa_ops.yaml", identity: "pa_ops" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "review_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "review_schemas" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "payer_ontology" }
  decision_models:
    - { file: "decisions/pa_review_triage.yaml", identity: "pa_review_triage" }
    - { file: "decisions/appeal_expedite_routing.yaml", identity: "appeal_expedite_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      INS-FR-030/040/050 bespoke LangGraph recipes (prior_auth,
      appeal_analyst, denial_rationale) require agent-runtime graph-module
      registration (a Core code surface, BRD 23 BR-12). This pack specializes
      the existing case-triage + analytics agents via TenantAgentConfig
      prompt_params + tenant-scope RAG grounding instead.
