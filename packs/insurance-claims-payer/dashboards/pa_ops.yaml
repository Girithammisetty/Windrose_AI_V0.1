# PA Ops dashboard (INS-FR-070 #3): live PA queue by urgency, decision mix,
# turnaround, agent recommendation split (shadow-agreement precursor).
name: "PA Ops"
module: insights
semantic_model: payer_utilization
description: >-
  Prior-authorization operations (BRD 24): queue by urgency tier, decision mix,
  turnaround hours against the CMS-4201-F windows, agent recommendation mix.
tags: [insurance, payer, prior-auth, pack]
charts:
  - name: "PA requests by urgency"
    chart_type: vertical_bar_chart
    description: "PA volume by urgency tier"
    config:
      x: { dimension: urgency }
      y: [ { measure: pa_request_count, agg_fn: count } ]
    sources: [ { measure: pa_request_count } ]
    w: 6
    h: 4
  - name: "PA decision mix"
    chart_type: pie_chart
    description: "Approved / denied / pending"
    config:
      x: { dimension: pa_status }
      y: [ { measure: pa_request_count, agg_fn: count } ]
    sources: [ { measure: pa_request_count } ]
    w: 6
    h: 4
  - name: "Turnaround by urgency"
    chart_type: vertical_bar_chart
    description: "Average decision hours per urgency tier (CMS window check)"
    config:
      x: { dimension: urgency }
      y: [ { measure: avg_turnaround_hours, agg_fn: avg } ]
    sources: [ { measure: avg_turnaround_hours } ]
    w: 6
    h: 4
  - name: "Agent recommendation grid"
    chart_type: grid_chart
    description: "Agent recommendation mix with volumes and mean confidence"
    config:
      columns: [agent_recommendation, pa_request_count, avg_agent_confidence]
      x: { dimension: agent_recommendation }
      y:
        - { measure: pa_request_count, agg_fn: count }
        - { measure: avg_agent_confidence, agg_fn: avg }
    sources:
      - { measure: pa_request_count }
      - { measure: avg_agent_confidence }
    w: 6
    h: 4
