# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml — X12 837 claim
# drops, eligibility batch extracts) or file upload.
- identity: payer_claims
  name: payer-claims
  required_columns:
    [claim_id, member_id, provider_npi, provider_specialty, plan_year,
     product_type, service_month, place_of_service, cpt_code, icd10_code,
     service_line, billed_amount, allowed_amount, paid_amount,
     # value domain: status — 'denied' and 'paid' are matched literally by
     # semantic filters and verified queries
     status,
     network_status, member_state]
- identity: payer_denials
  name: payer-denials
  required_columns:
    [denial_id, claim_id, member_id, denial_reason_code, denial_reason_text,
     cpt_code, service_line, decision_by, decision_month, product_type,
     member_state, appealed]
- identity: payer_appeals
  name: payer-appeals
  required_columns:
    [appeal_id, denial_id, claim_id, level, submitted_by, submitted_month,
     # value domain: status — 'pending' and 'overturned' are matched literally
     # by the appeal-routing table, semantic filters, and verified queries
     status,
     verdict_by, member_state,
     # value domain: denial_reason_code = CARC codes in CO-50/CO-197/CO-151/
     # PR-204 form — matched literally by the appeal-routing table
     denial_reason_code,
     cpt_code, potential_value]
- identity: prior_auth_requests
  name: payer-prior-auth-requests
  required_columns:
    [par_id, member_id, provider_npi, requested_service, cpt_code, icd10_code,
     # value domain: urgency = urgent|standard — matched literally by the
     # PA-triage table and verified queries
     urgency,
     submitted_month,
     # value domain: status = pending|approved|denied — matched literally by
     # the PA-triage table and semantic filters
     status,
     turnaround_hours, product_type, member_state,
     # value domain: specialty_drug_flag = yes|no — specialty-drug routing
     # signal read literally by the PA-triage table
     specialty_drug_flag,
     # value domain: clinical_info_status = complete|incomplete — matched
     # literally by the PA-triage table's missing-info deferral rule
     clinical_info_status,
     # value domain: agent_recommendation = approve|escalate_md — matched
     # literally by the PA-triage table
     agent_recommendation,
     agent_confidence]
