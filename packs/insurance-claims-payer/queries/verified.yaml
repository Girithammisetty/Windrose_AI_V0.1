# Verified NL<->SQL queries (BRD 24 Appendix; SEM-FR-040 four-eyes approved at
# install). SQL uses {{dataset('<name>')}} macros — the only table references
# query-service's tenant-namespace guard admits.
- nl_text: "What's our denial rate by product type?"
  sql_text: >-
    SELECT product_type,
           count(*) AS claims,
           sum(CASE WHEN status = 'denied' THEN 1 ELSE 0 END) AS denied,
           round(sum(CASE WHEN status = 'denied' THEN 1 ELSE 0 END) * 1.0
                 / nullif(count(*), 0), 4) AS denial_rate
    FROM {{dataset('payer-claims')}}
    GROUP BY product_type
  model: payer_claims
  tags: [denials, kpi, pack]
- nl_text: "Which procedure codes have the highest appeal overturn rate?"
  sql_text: >-
    SELECT cpt_code,
           count(*) AS appeals,
           sum(CASE WHEN status = 'overturned' THEN 1 ELSE 0 END) AS overturned,
           round(sum(CASE WHEN status = 'overturned' THEN 1 ELSE 0 END) * 1.0
                 / nullif(count(*), 0), 4) AS overturn_rate
    FROM {{dataset('payer-appeals')}}
    GROUP BY cpt_code
    ORDER BY overturn_rate DESC
  model: payer_claims
  tags: [appeals, overturns, pack]
- nl_text: "Top denial reason codes by count"
  sql_text: >-
    SELECT denial_reason_code, denial_reason_text, count(*) AS denials
    FROM {{dataset('payer-denials')}}
    GROUP BY denial_reason_code, denial_reason_text
    ORDER BY denials DESC
  model: payer_claims
  tags: [denials, pack]
- nl_text: "PA turnaround by urgency tier against the CMS windows"
  sql_text: >-
    SELECT urgency,
           count(*) AS requests,
           round(avg(cast(turnaround_hours AS double)), 1) AS avg_hours
    FROM {{dataset('payer-prior-auth-requests')}}
    GROUP BY urgency
  model: payer_utilization
  tags: [prior-auth, sla, pack]
- nl_text: "Which pending PAs are at risk against the regulatory clock?"
  sql_text: >-
    SELECT par_id, urgency, requested_service, cpt_code,
           round(cast(turnaround_hours AS double), 1) AS hours_elapsed,
           round((CASE WHEN urgency = 'urgent' THEN 72 ELSE 168 END)
                 - cast(turnaround_hours AS double), 1) AS hours_remaining,
           CASE
             WHEN cast(turnaround_hours AS double)
                  >= (CASE WHEN urgency = 'urgent' THEN 72 ELSE 168 END)
               THEN 'overdue'
             WHEN cast(turnaround_hours AS double)
                  >= (CASE WHEN urgency = 'urgent' THEN 24 ELSE 120 END)
               THEN 'at_risk'
             ELSE 'on_track'
           END AS clock_bucket
    FROM {{dataset('payer-prior-auth-requests')}}
    WHERE status = 'pending'
    ORDER BY hours_remaining ASC
  model: payer_utilization
  tags: [prior-auth, sla, at-risk, pack]
- nl_text: "Denial volume and reason-code spread by reviewing decision-maker (QA)"
  sql_text: >-
    SELECT decision_by,
           count(*) AS denials,
           count(DISTINCT denial_reason_code) AS distinct_reason_codes
    FROM {{dataset('payer-denials')}}
    GROUP BY decision_by
    ORDER BY denials DESC
  model: payer_claims
  tags: [denials, qa, reviewers, pack]
- nl_text: "Members with denied claims by state"
  sql_text: >-
    SELECT member_state, count(*) AS denied_claims
    FROM {{dataset('payer-claims')}}
    WHERE status = 'denied'
    GROUP BY member_state
    ORDER BY denied_claims DESC
  model: payer_claims
  tags: [denials, geography, pack]
