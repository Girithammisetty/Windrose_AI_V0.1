# Semantic model `lossmit_core` — mortgage-servicer loss-mitigation KPI
# catalog (workout approval rate, denial rate, doc-completion rate, deadline
# runway, dual-track holds, arrearage exposure, backlog aging), expressed in
# the Core semantic grammar (agg whitelist, equality measure filters, derived
# expr_metric with nullif; join_paths left/many_to_one, acyclic chain).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Amount columns ingest
# as bronze strings, so numeric measures cast(... as double) (the proven
# claims_core pattern).
name: lossmit_core
description: >-
  US mortgage-servicing loss-mitigation KPI model (RESPA Reg X 12 CFR
  1024.39-.41): application volumes and backlog aging, disposition outcome
  mix, workout approval and denial rates, document completion, Reg X deadline
  runway and dual-tracking holds, arrearage exposure — applications joined
  through the distressed loan book to the borrower roster.
definition:
  entities:
    - name: applications
      dataset: lm_applications
      table: main.lm_applications
      primary_key: [app_id]
      dataset_version_policy: { policy: latest }
    - name: loans
      dataset: lm_loans
      table: main.lm_loans
      primary_key: [loan_id]
      dataset_version_policy: { policy: latest }
    - name: borrowers
      dataset: lm_borrowers
      table: main.lm_borrowers
      primary_key: [borrower_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: applications_loans
      from_entity: applications
      to_entity: loans
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: loan_id, to_column: loan_id }]
    - name: loans_borrowers
      from_entity: loans
      to_entity: borrowers
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: borrower_id, to_column: borrower_id }]
  dimensions:
    - { name: request_type, entity: applications, type: categorical, column: request_type }
    - { name: hardship_reason, entity: applications, type: categorical, column: hardship_reason }
    - { name: delinquency_bucket, entity: applications, type: categorical, column: delinquency_bucket }
    - { name: investor, entity: applications, type: categorical, column: investor }
    - { name: doc_status, entity: applications, type: categorical, column: doc_status }
    - { name: dual_track_hold, entity: applications, type: categorical, column: dual_track_hold }
    - { name: prior_workout_flag, entity: applications, type: categorical, column: prior_workout_flag }
    - { name: severity, entity: applications, type: categorical, column: severity }
    - { name: application_status, entity: applications, type: categorical, column: status }
    - { name: application_disposition, entity: applications, type: categorical, column: disposition }
    - { name: deadline_bucket, entity: applications, type: categorical, column: deadline_bucket }
    - { name: filed_month, entity: applications, type: categorical, column: filed_month }
    - { name: upb_band, entity: applications, type: categorical, column: upb_band }
    - { name: loan_product, entity: loans, type: categorical, column: product }
    - { name: origination_year_band, entity: loans, type: categorical, column: origination_year_band }
    - { name: ltv_band, entity: loans, type: categorical, column: ltv_band }
    - { name: rate_band, entity: loans, type: categorical, column: rate_band }
    - { name: property_state, entity: loans, type: categorical, column: state }
    - { name: escrowed, entity: loans, type: categorical, column: escrowed }
    - { name: prior_defaults_band, entity: loans, type: categorical, column: prior_defaults_band }
    - { name: income_band, entity: borrowers, type: categorical, column: income_band }
    - { name: employment_status, entity: borrowers, type: categorical, column: employment_status }
    - { name: contact_recency, entity: borrowers, type: categorical, column: contact_recency }
    - { name: prior_lossmit_band, entity: borrowers, type: categorical, column: prior_lossmit_band }
    - { name: bankruptcy_flag, entity: borrowers, type: categorical, column: bankruptcy_flag }
  measures:
    - { name: application_count, entity: applications, agg: count,
        description: "Number of loss-mitigation applications" }
    - { name: open_application_count, entity: applications, agg: count,
        filters: "status = 'open'",
        description: "Applications still open (evaluation backlog)" }
    - { name: closed_application_count, entity: applications, agg: count,
        filters: "status = 'closed'",
        description: "Applications closed with a final outcome" }
    - { name: approved_workout_count, entity: applications, agg: count,
        filters: "disposition = 'approve_workout_offer'",
        description: "Applications approved for a workout offer (modification/forbearance/plan/short sale/DIL)" }
    - { name: denied_count, entity: applications, agg: count,
        filters: "disposition = 'deny_with_specific_reasons'",
        description: "Applications denied — Reg X requires the specific reasons stated" }
    - { name: docs_requested_count, entity: applications, agg: count,
        filters: "disposition = 'request_missing_documents'",
        description: "Applications closed incomplete after documented follow-up (missing documents)" }
    - { name: referred_alternatives_count, entity: applications, agg: count,
        filters: "disposition = 'refer_foreclosure_alternatives'",
        description: "Applications referred to non-retention foreclosure alternatives counseling" }
    - { name: reinstated_count, entity: applications, agg: count,
        filters: "disposition = 'close_reinstated'",
        description: "Applications closed because the borrower reinstated the loan" }
    - { name: complete_doc_count, entity: applications, agg: count,
        filters: "doc_status = 'complete'",
        description: "Complete applications (Reg X 30-day evaluation clock runs)" }
    - { name: incomplete_doc_count, entity: applications, agg: count,
        filters: "doc_status = 'incomplete'",
        description: "Incomplete applications (missing-document chase in progress)" }
    - { name: modification_request_count, entity: applications, agg: count,
        filters: "request_type = 'modification'",
        description: "Loan-modification requests (the primary retention workout)" }
    - { name: dual_track_hold_count, entity: applications, agg: count,
        filters: "dual_track_hold = 'yes'",
        description: "Applications with a foreclosure-process hold in effect (Reg X dual-tracking protection)" }
    - { name: deep_delinquency_count, entity: applications, agg: count,
        filters: "delinquency_bucket = '120_plus'",
        description: "Applications on loans 120+ days delinquent (foreclosure-eligible severity)" }
    - { name: repeat_workout_request_count, entity: applications, agg: count,
        filters: "prior_workout_flag = 'yes'",
        description: "Applications from borrowers with prior loss-mitigation history (redefault watch)" }
    - { name: avg_application_age_days, entity: applications, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average application age in days (cycle time / backlog aging)" }
    - { name: total_arrearage_amount, entity: applications, agg: sum,
        expr: "cast(arrearage_amount as double)", format: decimal,
        description: "Total past-due arrearage dollars on applications" }
    - { name: loan_count, entity: loans, agg: count,
        description: "Number of loans on the distressed servicing book" }
    - { name: arm_loan_count, entity: loans, agg: count,
        filters: "product = 'arm'",
        description: "Adjustable-rate loans (payment-shock surface)" }
    - { name: high_ltv_loan_count, entity: loans, agg: count,
        filters: "ltv_band = 'over_105'",
        description: "Underwater loans (LTV over 105 — short-sale/DIL candidates)" }
    - { name: total_upb_amount, entity: loans, agg: sum,
        expr: "cast(upb_amount as double)", format: decimal,
        description: "Total unpaid principal balance on the distressed book" }
    - { name: borrower_count, entity: borrowers, agg: count,
        description: "Number of borrowers on the distressed roster" }
    - { name: unemployed_borrower_count, entity: borrowers, agg: count,
        filters: "employment_status = 'unemployed'",
        description: "Unemployed borrowers (income-verification-sensitive workouts)" }
    - { name: workout_approval_rate,
        expr_metric: "approved_workout_count / nullif(closed_application_count, 0)",
        format: percent,
        description: "Workout offers approved over all closed applications" }
    - { name: denial_rate,
        expr_metric: "denied_count / nullif(closed_application_count, 0)",
        format: percent,
        description: "Applications denied over all closed applications (fair-servicing pattern watch)" }
    - { name: doc_completion_rate,
        expr_metric: "complete_doc_count / nullif(application_count, 0)",
        format: percent,
        description: "Complete applications over all applications (doc-chase effectiveness)" }
    - { name: repeat_request_share,
        expr_metric: "repeat_workout_request_count / nullif(application_count, 0)",
        format: percent,
        description: "Share of applications from borrowers with prior loss-mit history (redefault proxy)" }
    - { name: deep_delinquency_share,
        expr_metric: "deep_delinquency_count / nullif(application_count, 0)",
        format: percent,
        description: "Share of applications arriving at 120+ days delinquent (late-engagement signal)" }
