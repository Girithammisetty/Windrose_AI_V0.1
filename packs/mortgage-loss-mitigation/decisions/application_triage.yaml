# Governed decision table (BRD 54) — a deterministic, explainable, no-LLM
# first-cut triage over the loss-mitigation worklist. Columns are the
# lm-applications binding-contract columns (data/datasets.yaml), so the table
# reads exactly what intake projects from the real dataset. It EXECUTES to
# the same governed four-eyes proposal an agent produces: every matched case
# becomes a case.apply_disposition proposal a human must approve — the table
# proposes, a human decides. It NEVER proposes approve_workout_offer,
# deny_with_specific_reasons, or refer_foreclosure_alternatives: workout
# approvals/denials and every foreclosure-path step are human four-eyes
# determinations with documented findings. Runway/aging thresholds are
# institution-configured operational bands inside the servicing-rule clock —
# the table cites no regulatory day-count as its own. Outcome
# disposition_codes are validated against this workspace's disposition
# catalog at install time, so `dispositions` installs before this.
- identity: lossmit_application_triage
  name: "Loss-mitigation application triage routing"
  rules:
    # Clock already LAPSED — an already-overdue window inverts the posture:
    # this is no longer runway management but a live compliance breach. An
    # overdue written 1024.41(c) evaluation decision is a live Reg X
    # violation, so the file outranks every merely-tight deadline.
    - when:
        - { column: status, op: eq, value: open }
        - { column: days_to_deadline, op: lt, value: 0 }
      then: { disposition_code: escalate_underwriting_review, severity: critical }
      note: "Evaluation clock already lapsed — an overdue written 1024.41(c) evaluation decision is a live Reg X violation, not a deadline risk; immediate human review and remediation posture, ahead of every still-open runway"
    # Complete application deep into its servicing-rule evaluation clock —
    # the written-decision runway is nearly consumed.
    - when:
        - { column: status, op: eq, value: open }
        - { column: doc_status, op: eq, value: complete }
        - { column: days_to_deadline, op: between, value: [0, 7] }
      then: { disposition_code: escalate_underwriting_review, severity: critical }
      note: "Complete application with the servicing-rule evaluation clock nearly consumed — expedited underwriting queue ahead of FIFO order; the runway band is institution-configured"
    # Dual-tracking protection in effect — the hold must be human-confirmed.
    - when:
        - { column: status, op: eq, value: open }
        - { column: dual_track_hold, op: eq, value: "yes" }
      then: { disposition_code: escalate_underwriting_review, severity: critical }
      note: "Foreclosure-path protection hold in effect — a human confirms the hold is logged and current; the table never touches the foreclosure path itself"
    # Incomplete file with little runway — the document chase must move now.
    - when:
        - { column: status, op: eq, value: open }
        - { column: doc_status, op: eq, value: incomplete }
        - { column: days_to_deadline, op: between, value: [0, 7] }
      then: { disposition_code: request_missing_documents, severity: high }
      note: "Incomplete file with the servicing-rule clock nearly consumed — document-collection outreach now; the incompleteness close is only approved after a human confirms the documented follow-up chase"
    # Incomplete file with runway — standard document-collection outreach.
    - when:
        - { column: status, op: eq, value: open }
        - { column: doc_status, op: eq, value: incomplete }
      then: { disposition_code: request_missing_documents, severity: medium }
      note: "Incomplete application — route to the document-collection chase; a human verifies the follow-up record before any incompleteness determination"
    # Repeat request after prior loss-mitigation history — investor
    # re-eligibility rules must be checked by an underwriter first.
    - when:
        - { column: status, op: eq, value: open }
        - { column: prior_workout_flag, op: eq, value: "yes" }
      then: { disposition_code: escalate_underwriting_review, severity: high }
      note: "Repeat request after prior loss-mitigation history — an underwriter checks the investor's re-eligibility rules before the waterfall evaluation"
    # Non-retention track (short sale / deed-in-lieu): a different document
    # set and counseling path than retention workouts. 1024.41's evaluate-
    # all-options and anti-evasion posture means the request still gets the
    # full-waterfall review — the borrower's stated preference never
    # short-circuits the retention evaluation.
    - when:
        - { column: status, op: eq, value: open }
        - { column: request_type, op: in, value: [short_sale, deed_in_lieu] }
      then: { disposition_code: escalate_underwriting_review, severity: high }
      note: "Non-retention request (short sale / DIL) — route to the non-retention track's document set and counseling path; under 1024.41 the file is still evaluated for ALL available options (anti-evasion), and every foreclosure-alternatives referral remains a human four-eyes determination"
    # Disaster hardship — deferral-first review posture: disaster files
    # typically flow through forbearance to a deferral evaluation before any
    # modification, so they get an expedited specialist look.
    - when:
        - { column: status, op: eq, value: open }
        - { column: hardship_reason, op: eq, value: disaster }
      then: { disposition_code: escalate_underwriting_review, severity: high }
      note: "Disaster-related hardship — expedited, deferral-first review: disaster files typically resolve through forbearance into a deferral evaluation before any modification is considered"
    # Catch-all for the OPEN worklist: nothing matched deterministically ->
    # standard human review at low severity. The neutral human-review code is
    # the ONLY thing this table ever proposes by default — never an approval,
    # a denial, or a foreclosure-path referral.
    - when:
        - { column: status, op: eq, value: open }
      then: { disposition_code: escalate_underwriting_review, severity: low }
      note: "No deterministic route matched — standard human review queue; the specialist evaluates on the file's own evidence"
  # default_outcome deliberately OMITTED: the open-status catch-all rule above
  # is the routing floor, and closed rows get NO proposal at all.
