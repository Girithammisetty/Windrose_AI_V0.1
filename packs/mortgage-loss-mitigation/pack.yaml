# mortgage-loss-mitigation capability pack — Core-neutral edition: RESPA
# Reg X (12 CFR 1024.39-.41) loss-mitigation decisioning for US mortgage
# servicers and subservicers, banks, and credit unions. Installable TODAY
# against Datacern Core's public APIs via packctl; the manifest envelope
# follows BRD 23 (PKG-FR-001/003). Components the current Core cannot
# materialize are declared under `deferred` — recorded in the install
# ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: mortgage-loss-mitigation
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted mortgage-servicing loss-mitigation workflow for US servicers:
  application intake triage with Reg X regulatory-clock awareness (30-day
  complete-application evaluation, 5-business-day acknowledgment),
  dual-tracking hold enforcement, investor-waterfall-ordered workout
  evaluation (GSE/FHA/VA/portfolio), denial-appeal handling with independent
  review, loss-mit operations KPI semantic model and dashboards (workout
  approval rate, denial rate, doc-completion rate, deadline runway,
  dual-track holds, arrearage exposure), investor-workout network analytics,
  Reg X + waterfall grounding memories, and loan-anomaly + workout-outcome
  training pipelines.
categories: [mortgage, servicing, loss_mitigation, default_servicing, banking]
regulatory: [respa_reg_x, ecoa_reg_b, cfpb, gse_servicing_guides, fha_servicing]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/lossmit_core.yaml", identity: "lossmit_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/lossmit_command_center.yaml", identity: "lossmit_command_center" }
    - { file: "dashboards/regx_clock_dual_track.yaml", identity: "regx_clock_dual_track" }
    - { file: "dashboards/workout_outcomes.yaml", identity: "workout_outcomes" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "lossmit_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "lossmit_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "lossmit_ontology" }
  decision_models:
    - { file: "decisions/application_triage.yaml", identity: "lossmit_application_triage" }
    - { file: "decisions/deep_delinquency_escalation.yaml", identity: "deep_delinquency_escalation" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Loss Mit Intake Copilot, Investor Waterfall
      Evaluator, Reg X Clock Sentinel, Document Chase Coordinator) require
      agent-runtime graph-module registration (BRD 23 BR-12). This pack
      specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
