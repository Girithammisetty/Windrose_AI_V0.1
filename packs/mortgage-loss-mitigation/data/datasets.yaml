# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload.
- identity: lm_applications
  name: lm-applications
  required_columns:
    [app_id, loan_id, request_type, hardship_reason, delinquency_bucket,
     investor, doc_status, dual_track_hold, prior_workout_flag, severity,
     status, disposition, filed_month, age_days, days_to_deadline,
     deadline_bucket, upb_band, arrearage_amount]
- identity: lm_loans
  name: lm-loans
  required_columns:
    [loan_id, borrower_id, product, origination_year_band, ltv_band,
     rate_band, state, escrowed, prior_defaults_band, upb_amount]
- identity: lm_borrowers
  name: lm-borrowers
  required_columns:
    [borrower_id, borrower_name, income_band, employment_status,
     contact_recency, prior_lossmit_band, bankruptcy_flag]
