# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the carrier/TPA's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
# The SFTP drop is a generic batch-file landing zone — whatever first-report
# and bill-review extracts the tenant's upstream systems produce; the pack
# makes no claims about specific interchange-format support.
- name: "First-report and medical-bill batch drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "edi-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/claim-batches"
- name: "Policy and employer extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: carrier-policy-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
