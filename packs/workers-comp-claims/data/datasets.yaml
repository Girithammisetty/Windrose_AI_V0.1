# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload.
- identity: wc_claims
  name: wc-claims
  required_columns:
    [claim_id, employer_id, claimant_name, jurisdiction_state, injury_type,
     body_part, cause_code, claim_type, severity, status, disposition,
     siu_flag, litigation_flag, rtw_status, filed_month, age_days,
     days_to_deadline, deadline_bucket, incurred_reserve, paid_to_date]
- identity: wc_medical_bills
  name: wc-medical-bills
  required_columns:
    [bill_id, claim_id, provider_name, provider_type, service_category,
     billed_amount, paid_amount, bill_month, fee_schedule_flag]
- identity: wc_employers
  name: wc-employers
  required_columns:
    [employer_id, employer_name, industry, class_code_group, state,
     safety_program, experience_mod_tier]
