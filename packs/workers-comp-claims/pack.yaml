# workers-comp-claims capability pack — Core-neutral edition: workers'
# compensation claims adjudication for US carriers, TPAs, and self-insured
# employers. Installable TODAY against Windrose Core's public APIs via
# packctl; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under
# `deferred` — recorded in the install ledger, never faked.
pack_manifest: 1
name: workers-comp-claims
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted workers' compensation claims adjudication for carriers, TPAs,
  and self-insured employers: FNOL triage with statutory
  compensability-clock awareness (state accept/deny decision windows),
  AOE/COE compensability grounding, SIU fraud red-flag escalation
  (Monday-morning / unwitnessed / post-layoff clusters), medical bill review
  against state fee schedules with provider-cluster analytics, reserve
  adequacy and return-to-work tracking, claim-operations KPI semantic model
  and dashboards (acceptance/denial rates, SIU referral share, litigation
  rate, deadline runway, fee-schedule variance), state-law + NAIC
  AI-governance grounding memories, and bill-anomaly + compensability-outcome
  training pipelines.
categories: [insurance, workers_comp, claims, siu, bill_review]
regulatory: [state_wc_acts, state_fee_schedules, medicare_secondary_payer, naic_ai_governance, state_fraud_bureaus]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/wc_claims_core.yaml", identity: "wc_claims_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/wc_claims_command_center.yaml", identity: "wc_claims_command_center" }
    - { file: "dashboards/compensability_clock_reserves.yaml", identity: "compensability_clock_reserves" }
    - { file: "dashboards/medical_bill_review.yaml", identity: "medical_bill_review" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "claim_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (FNOL Intake Copilot, Compensability Clock
      Sentinel, Medical Bill Review Auditor, SIU Red-Flag Scorer, RTW
      Planner) require agent-runtime graph-module registration (BRD 23
      BR-12). This pack specializes the existing case-triage + analytics
      agents via TenantAgentConfig prompt_params + tenant-scope RAG
      grounding instead.
  - kind: connection_templates
    reason: >-
      Production read connectors (claims administration systems such as
      Guidewire ClaimCenter and Origami Risk; state EDI rails for IAIABC
      FROI/SROI first/subsequent reports of injury; medical bill-review
      platforms; pharmacy/PBM feeds; ISO ClaimSearch for prior-claim
      matching; wage/payroll systems for indemnity rate calculation) require
      customer credentials and pack-service connector materialization. The
      pack ships seed datasets in the exact landing shape; production
      connectors are configured through the product Data > Connections UI.
  - kind: write_adapters
    reason: >-
      Write adapters (file FROI/SROI EDI transactions with state agencies,
      post accept/deny/delay determinations and reserve changes to the
      claims administration system, initiate indemnity benefit payments,
      issue statutory claimant notices) execute only behind pack-service's
      materialization contract and customer credentials; every such write
      stays proposal-mode with human approval — no autonomous benefit
      decision, payment, or state filing, ever.
  - kind: ontology
    reason: >-
      Ontology registration (Claim, Claimant, Employer, Policy, BodyPart,
      InjuryCause, MedicalBill, Provider, ReserveChange, RTWPlan,
      SIUReferral, IME, ImpairmentRating, Jurisdiction, DeadlineClock,
      BenefitPayment) awaits pack-service; entity semantics are carried
      today by the wc_claims_core semantic model and dataset schemas.
  - kind: case_schemas
    reason: >-
      Typed case schemas (fnol_intake, compensability_review,
      siu_investigation, medical_bill_audit, rtw_planning,
      litigation_management) await case-service schema materialization;
      today's cases carry the same fields via display_projection + the
      disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      Model archetypes (compensability_confidence, siu_referral_score,
      reserve_development_risk) await experiment-service archetype APIs; the
      scoring capability ships as pipeline seeds instead (isolation_forest
      medical-bill anomaly + xgboost compensability-outcome scorer) with
      model-governance expectations noted in grounding memories.
