# workers-comp-claims capability pack — Core-neutral edition: workers'
# compensation claims adjudication for US carriers, TPAs, and self-insured
# employers. Installable TODAY against Datacern Core's public APIs via
# packctl/pack-service; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under
# `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases arrive
# from real rows via case triggers/intake, not seeds; eval golden sets are
# curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: workers-comp-claims
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted workers' compensation claims adjudication for carriers, TPAs,
  and self-insured employers: FNOL triage with compensability-clock awareness
  (jurisdiction-configured accept/deny decision windows), AOE/COE
  compensability grounding, allegation-neutral SIU pattern-flag routing,
  medical bill review against state fee schedules with provider-cluster
  analytics, reserve adequacy and return-to-work tracking, claim-operations
  KPI semantic model and dashboards (acceptance/denial rates, SIU referral
  share, litigation rate, deadline runway, fee-schedule variance), workers'
  comp + NAIC AI-governance grounding memories, and bill-anomaly +
  compensability-outcome training pipelines.
categories: [insurance, workers_comp, claims, siu, bill_review]
regulatory: [state_wc_acts, state_fee_schedules, medicare_secondary_payer, naic_ai_governance, state_fraud_bureaus]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/wc_claims_core.yaml", identity: "wc_claims_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/wc_claims_command_center.yaml", identity: "wc_claims_command_center" }
    - { file: "dashboards/compensability_clock_reserves.yaml", identity: "compensability_clock_reserves" }
    - { file: "dashboards/medical_bill_review.yaml", identity: "medical_bill_review" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "claim_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "claim_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "claim_ontology" }
  decision_models:
    - { file: "decisions/claim_triage_routing.yaml", identity: "claim_triage_routing" }
    - { file: "decisions/investigation_review_routing.yaml", identity: "investigation_review_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (FNOL Intake Copilot, Compensability Clock
      Sentinel, Medical Bill Review Auditor, SIU Red-Flag Scorer, RTW
      Planner) require agent-runtime graph-module registration (BRD 23
      BR-12). This pack specializes the existing case-triage + analytics
      agents via TenantAgentConfig prompt_params + tenant-scope RAG
      grounding instead.
