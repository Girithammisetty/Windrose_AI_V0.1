# Disposition taxonomy for the compensability-adjudication workflow.
# Categories are the Core's closed set {true_positive,false_positive,benign,
# inconclusive,other} (CASE-FR-020). accept_compensable and
# deny_not_compensable are the statutory compensability determinations
# (denial notes must carry the specific AOE/COE findings the jurisdiction's
# denial notice will cite); refer_utilization_review routes medical-necessity
# and fee-schedule questions to UR/bill review; escalate_siu_fraud sends
# red-flag clusters to the Special Investigation Unit (benefits continue
# unless disqualifying evidence develops); close_return_to_work records a
# successful RTW closure; escalate_senior_adjuster is a NEUTRAL routing code
# (no determination implied) so deterministic routing tables can move a claim
# to a senior adjuster without ever proposing an accept/deny outcome;
# issue_delay_notice records the jurisdiction's delay/investigation notice —
# the compliance action a lapsing decision clock demands (the note carries the
# notice date and the jurisdiction's form reference); close_settled_msa
# records a settlement closure with the Medicare-set-aside consideration
# documented in the note.
- { code: accept_compensable,        label: "Accept — compensable (AOE/COE established)",          category: true_positive,  requires_note: true }
- { code: deny_not_compensable,      label: "Deny — compensability not established",               category: false_positive, requires_note: true }
- { code: refer_utilization_review,  label: "Refer to utilization review / bill review",           category: other,          requires_note: true }
- { code: escalate_siu_fraud,        label: "Escalate to SIU — fraud red flags",                   category: inconclusive,   requires_note: true }
- { code: close_return_to_work,      label: "Close — successful return to work",                   category: benign,         requires_note: true }
- { code: escalate_senior_adjuster,  label: "Escalate — senior adjuster review (routing only)",    category: other,          requires_note: true }
- { code: issue_delay_notice,        label: "Issue jurisdiction delay/investigation notice",       category: inconclusive,   requires_note: true }
- { code: close_settled_msa,         label: "Close — settled (MSA considered/documented)",         category: other,          requires_note: true }
