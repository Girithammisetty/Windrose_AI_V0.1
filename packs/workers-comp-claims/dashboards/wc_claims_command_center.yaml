# WC Claims Command Center: claim mix by injury type, backlog aging,
# disposition outcome mix, intake trend. Chart families restricted to the
# render-verified set (vertical_bar / grid / pie / line); expr_metric measures
# (rates) are query/NL surfaces, never charted directly.
name: "WC Claims Command Center"
module: insights
semantic_model: wc_claims_core
description: >-
  Top-line workers' comp claim-operations KPIs: claim volumes by injury type,
  adjudication backlog aging by severity, compensability disposition mix,
  monthly FNOL intake trend, and reserve exposure per injury type.
tags: [insurance, workers_comp, claims, pack]
charts:
  - name: "Claims by injury type"
    chart_type: vertical_bar_chart
    description: "Claim volume by injury type (strain/sprain, fracture, laceration, ...)"
    config:
      x: { dimension: injury_type }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Backlog aging by severity"
    chart_type: vertical_bar_chart
    description: "Average claim age in days by severity (cycle-time watch)"
    config:
      x: { dimension: severity }
      y: [ { measure: avg_claim_age_days, agg_fn: avg } ]
    sources: [ { measure: avg_claim_age_days } ]
    w: 6
    h: 4
  - name: "Compensability disposition mix"
    chart_type: pie_chart
    description: "Accepted vs denied vs UR referral vs SIU escalation vs RTW closure vs pending"
    config:
      x: { dimension: claim_disposition }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "FNOL intake by month"
    chart_type: line_chart
    description: "Claim filings trend by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Injury-type worklist grid"
    chart_type: grid_chart
    description: "Claims, closures, acceptances, denials and incurred reserve by injury type"
    config:
      columns: [injury_type, claim_count, closed_claim_count, accepted_count, denied_count, total_incurred_reserve]
      x: { dimension: injury_type }
      y:
        - { measure: claim_count, agg_fn: count }
        - { measure: closed_claim_count, agg_fn: count }
        - { measure: accepted_count, agg_fn: count }
        - { measure: denied_count, agg_fn: count }
        - { measure: total_incurred_reserve, agg_fn: sum }
    sources:
      - { measure: claim_count }
      - { measure: closed_claim_count }
      - { measure: accepted_count }
      - { measure: denied_count }
      - { measure: total_incurred_reserve }
    w: 12
    h: 4
