# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the screening workflow needs and
# the exact landing-shape columns it requires; at install the tenant binds it
# to a REAL dataset (explicit dataset_bindings on the install request, or
# same-name reuse), and pack-service validates the bound dataset exposes every
# required column — failing closed with the missing list. Real data arrives
# through the pack's governed source connectors (connections/sources.yaml) or
# file upload: CRA result files, court-record aggregator extracts, MVR rails,
# verification bureaus, and the customer's ATS/HRIS.
- identity: bs_applicants
  name: bs-applicants
  required_columns:
    [applicant_id, applicant_name, state, prior_orders_band, dispute_history,
     common_name]
- identity: bs_orders
  name: bs-orders
  required_columns:
    [order_id, applicant_id, employer_name, employer_industry,
     position_category, package, order_month, turnaround_days, turnaround_band]
- identity: bs_reviews
  name: bs-reviews
  required_columns:
    [review_id, order_id, check_type, hit_type, record_age_band, relevance,
     identity_confidence, severity, status, disposition, deadline_bucket,
     filed_month, age_days, days_to_deadline]
