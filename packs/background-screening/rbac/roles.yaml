# Screening-operations role catalog as tenant CUSTOM roles composing the
# Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). Separation of duties: the Screening Adjudicator investigates
# hits and proposes dispositions, the Identity Resolution Specialist digs
# into common-name/mixed-file matches (query authoring + export), the
# Adverse Action Coordinator runs the pre-adverse/adverse-action two-step
# and watches the notice rails (ingestion reads), the Screening Operations
# Manager alone approves dispositions (adverse findings and final
# determinations are four-eyes), and the FCRA Compliance Auditor reviews
# everything with no case-write power (exam readiness).
- name: "Screening Adjudicator"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
