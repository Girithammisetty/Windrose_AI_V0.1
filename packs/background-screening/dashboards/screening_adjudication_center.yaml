# Screening Adjudication Center: hit mix by check type, backlog aging,
# outcome mix, intake trend. Chart families restricted to the render-verified
# set (vertical_bar / grid / pie / line); expr_metric measures (rates) are
# query/NL surfaces, never charted directly.
name: "Screening Adjudication Center"
module: insights
semantic_model: screening_core
description: >-
  Top-line screening-adjudication KPIs: hit volumes by check type,
  adjudication backlog aging by severity, human disposition outcome mix,
  and monthly hit intake.
tags: [screening, fcra, adjudication, pack]
charts:
  - name: "Hits by check type"
    chart_type: vertical_bar_chart
    description: "Screening-hit volume by check type (criminal, MVR, verifications, credit header)"
    config:
      x: { dimension: check_type }
      y: [ { measure: review_count, agg_fn: count } ]
    sources: [ { measure: review_count } ]
    w: 6
    h: 4
  - name: "Backlog aging by severity"
    chart_type: vertical_bar_chart
    description: "Average adjudication age in days by severity (cycle-time watch)"
    config:
      x: { dimension: severity }
      y: [ { measure: avg_review_age_days, agg_fn: avg } ]
    sources: [ { measure: avg_review_age_days } ]
    w: 6
    h: 4
  - name: "Disposition outcome mix"
    chart_type: pie_chart
    description: "Clear vs adverse finding vs suppressed vs identity escalation vs individualized assessment vs pending"
    config:
      x: { dimension: review_disposition }
      y: [ { measure: review_count, agg_fn: count } ]
    sources: [ { measure: review_count } ]
    w: 6
    h: 4
  - name: "Hit intake by month"
    chart_type: line_chart
    description: "Screening-hit reviews opened by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: review_count, agg_fn: count } ]
    sources: [ { measure: review_count } ]
    w: 6
    h: 4
  - name: "Check-type worklist grid"
    chart_type: grid_chart
    description: "Reviews, closures, clears, adverse findings and suppressions by check type"
    config:
      columns: [check_type, review_count, closed_review_count, cleared_count, adverse_finding_count, suppressed_count]
      x: { dimension: check_type }
      y:
        - { measure: review_count, agg_fn: count }
        - { measure: closed_review_count, agg_fn: count }
        - { measure: cleared_count, agg_fn: count }
        - { measure: adverse_finding_count, agg_fn: count }
        - { measure: suppressed_count, agg_fn: count }
    sources:
      - { measure: review_count }
      - { measure: closed_review_count }
      - { measure: cleared_count }
      - { measure: adverse_finding_count }
      - { measure: suppressed_count }
    w: 12
    h: 4
