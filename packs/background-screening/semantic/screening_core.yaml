# Semantic model `screening_core` — background-screening adjudication KPI
# catalog (clear rate, adverse-finding rate, suppression rate,
# identity-escalation share, adjudication aging, deadline runway, check-type
# mix, order turnaround), expressed in the Core semantic grammar (agg
# whitelist, equality measure filters, derived expr_metric with nullif;
# join_paths left/many_to_one, acyclic chain).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Numeric columns ingest
# as bronze strings, so numeric measures cast(... as double) (the proven
# claims_core pattern).
name: screening_core
description: >-
  Employment background-screening adjudication KPI model (FCRA): screening-hit
  volumes and backlog aging, adjudication outcome mix (clear / adverse /
  suppress / identity escalation / individualized assessment), adverse-action
  deadline runway, check-type and hit-type mix, identity-confidence watch,
  and order turnaround — hit reviews joined through screening orders to the
  applicant book.
definition:
  entities:
    - name: reviews
      dataset: bs_reviews
      table: main.bs_reviews
      primary_key: [review_id]
      dataset_version_policy: { policy: latest }
    - name: orders
      dataset: bs_orders
      table: main.bs_orders
      primary_key: [order_id]
      dataset_version_policy: { policy: latest }
    - name: applicants
      dataset: bs_applicants
      table: main.bs_applicants
      primary_key: [applicant_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: reviews_orders
      from_entity: reviews
      to_entity: orders
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: order_id, to_column: order_id }]
    - name: orders_applicants
      from_entity: orders
      to_entity: applicants
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: applicant_id, to_column: applicant_id }]
  dimensions:
    - { name: check_type, entity: reviews, type: categorical, column: check_type }
    - { name: hit_type, entity: reviews, type: categorical, column: hit_type }
    - { name: record_age_band, entity: reviews, type: categorical, column: record_age_band }
    - { name: relevance, entity: reviews, type: categorical, column: relevance }
    - { name: identity_confidence, entity: reviews, type: categorical, column: identity_confidence }
    - { name: severity, entity: reviews, type: categorical, column: severity }
    - { name: review_status, entity: reviews, type: categorical, column: status }
    - { name: review_disposition, entity: reviews, type: categorical, column: disposition }
    - { name: deadline_bucket, entity: reviews, type: categorical, column: deadline_bucket }
    - { name: filed_month, entity: reviews, type: categorical, column: filed_month }
    - { name: position_category, entity: orders, type: categorical, column: position_category }
    - { name: employer_industry, entity: orders, type: categorical, column: employer_industry }
    - { name: package_tier, entity: orders, type: categorical, column: package }
    - { name: order_month, entity: orders, type: categorical, column: order_month }
    - { name: turnaround_band, entity: orders, type: categorical, column: turnaround_band }
    - { name: applicant_state, entity: applicants, type: categorical, column: state }
    - { name: prior_orders_band, entity: applicants, type: categorical, column: prior_orders_band }
    - { name: dispute_history, entity: applicants, type: categorical, column: dispute_history }
    - { name: common_name, entity: applicants, type: categorical, column: common_name }
  measures:
    - { name: review_count, entity: reviews, agg: count,
        description: "Number of screening-hit adjudication reviews" }
    - { name: open_review_count, entity: reviews, agg: count,
        filters: "status = 'open'",
        description: "Hit reviews still open (adjudication backlog)" }
    - { name: closed_review_count, entity: reviews, agg: count,
        filters: "status = 'closed'",
        description: "Hit reviews closed with a final adjudication outcome" }
    - { name: cleared_count, entity: reviews, agg: count,
        filters: "disposition = 'clear_report_eligible'",
        description: "Reviews cleared — no reportable adverse information" }
    - { name: adverse_finding_count, entity: reviews, agg: count,
        filters: "disposition = 'report_adverse_finding'",
        description: "Reviews closed as verified, reportable adverse findings" }
    - { name: suppressed_count, entity: reviews, agg: count,
        filters: "disposition = 'suppress_not_reportable'",
        description: "Hits suppressed — obsolete or mismatched records (accuracy saves)" }
    - { name: identity_escalation_count, entity: reviews, agg: count,
        filters: "disposition = 'request_identity_verification'",
        description: "Reviews escalated for identity verification (mixed-file risk)" }
    - { name: individualized_assessment_count, entity: reviews, agg: count,
        filters: "disposition = 'individualized_assessment_review'",
        description: "Reviews routed to EEOC individualized assessment" }
    - { name: criminal_hit_count, entity: reviews, agg: count,
        filters: "check_type = 'criminal'",
        description: "Hits surfaced by criminal-record searches" }
    - { name: mvr_hit_count, entity: reviews, agg: count,
        filters: "check_type = 'mvr'",
        description: "Hits surfaced by motor-vehicle-record checks" }
    - { name: low_identity_confidence_count, entity: reviews, agg: count,
        filters: "identity_confidence = 'low'",
        description: "Hits with low identity-match confidence (common-name / mixed-file watch)" }
    - { name: pending_relevance_count, entity: reviews, agg: count,
        filters: "relevance = 'pending'",
        description: "Open hits whose job-relatedness analysis is still pending" }
    - { name: avg_review_age_days, entity: reviews, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average adjudication age in days (cycle time / backlog aging)" }
    - { name: avg_deadline_runway_days, entity: reviews, agg: avg,
        expr: "cast(days_to_deadline as double)", format: decimal,
        description: "Average days remaining to the next adverse-action or dispute deadline" }
    - { name: order_count, entity: orders, agg: count,
        description: "Number of screening orders" }
    - { name: driver_order_count, entity: orders, agg: count,
        filters: "position_category = 'driver'",
        description: "Orders for driving positions (MVR + continuous-monitoring surface)" }
    - { name: premium_package_count, entity: orders, agg: count,
        filters: "package = 'premium'",
        description: "Orders on the premium screening package" }
    - { name: delayed_order_count, entity: orders, agg: count,
        filters: "turnaround_band = 'over_5_days'",
        description: "Orders whose turnaround exceeded five days (SLA watch)" }
    - { name: avg_turnaround_days, entity: orders, agg: avg,
        expr: "cast(turnaround_days as double)", format: decimal,
        description: "Average order turnaround in days" }
    - { name: applicant_count, entity: applicants, agg: count,
        description: "Number of applicants in the screening book" }
    - { name: dispute_history_applicant_count, entity: applicants, agg: count,
        filters: "dispute_history = 'yes'",
        description: "Applicants with a prior FCRA dispute on file" }
    - { name: common_name_applicant_count, entity: applicants, agg: count,
        filters: "common_name = 'yes'",
        description: "Applicants flagged as common names (heightened identity-matching standard)" }
    - { name: clear_rate,
        expr_metric: "cleared_count / nullif(closed_review_count, 0)",
        format: percent,
        description: "Reviews cleared over all closures" }
    - { name: adverse_finding_rate,
        expr_metric: "adverse_finding_count / nullif(closed_review_count, 0)",
        format: percent,
        description: "Verified reportable adverse findings over all closures" }
    - { name: suppression_rate,
        expr_metric: "suppressed_count / nullif(closed_review_count, 0)",
        format: percent,
        description: "Hits suppressed as obsolete or mismatched over all closures (accuracy-save rate)" }
    - { name: identity_escalation_share,
        expr_metric: "identity_escalation_count / nullif(closed_review_count, 0)",
        format: percent,
        description: "Closures escalated for identity verification over all closures" }
    - { name: criminal_hit_share,
        expr_metric: "criminal_hit_count / nullif(review_count, 0)",
        format: percent,
        description: "Share of hit volume surfaced by criminal-record searches" }
