# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the screening
# program's expected feeds exist as governed starting points the tenant
# completes with real hosts/credentials in Data → Connections. Nothing is
# polled at install.
- name: "CRA result-file drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "cra-results.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/screening-results"
- name: "ATS candidate/order extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: ats-screening-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
