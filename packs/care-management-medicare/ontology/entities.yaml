# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# care-patients / care-activities / care-billing-candidates / care-rpm-readings
# binding contracts. Attribute names match the contract columns so the ontology
# describes data the bound tenant datasets actually carry.
- entity_key: patient
  name: "Medicare patient"
  description: >-
    A Medicare panel member eligible for or enrolled in a care-management
    program family, with consent state and post-discharge (TCM) status.
  attributes:
    - { name: mbi_last4, data_type: string, description: "Medicare beneficiary identifier, last 4 only" }
    - { name: plan_type, data_type: string, description: "FFS | MA | DUALS" }
    - { name: qmb_flag, data_type: string }
    - { name: fqhc_flag, data_type: string }
    - { name: chronic_condition_count, data_type: integer }
    - { name: primary_icd10, data_type: string }
    - { name: condition_group, data_type: string }
    - { name: enrollment_status, data_type: string, description: "eligible | offered | consented | active" }
    - { name: apcm_tier, data_type: string }
    - { name: recent_discharge_flag, data_type: string }
    - { name: tcm_contact_2bd, data_type: string }
    - { name: readmitted_30d, data_type: string }
  relationships:
    - { name: care_manager, target: care_manager, cardinality: belongs_to }
    - { name: activities, target: care_activity, cardinality: has_many }
    - { name: billing_candidates, target: billing_candidate, cardinality: has_many }
    - { name: device_readings, target: device_reading, cardinality: has_many }
- entity_key: care_manager
  name: "Care manager"
  description: >-
    The care-team member (RN / LPN / MA / behavioral-health care manager)
    who carries the patient panel and logs coordination time.
  attributes:
    - { name: care_manager_role, data_type: string, description: "rn | lpn | ma | bhcm" }
  relationships:
    - { name: panel_patients, target: patient, cardinality: has_many }
    - { name: activities, target: care_activity, cardinality: has_many }
- entity_key: care_activity
  name: "Care coordination activity"
  description: >-
    One time-tracked care-coordination touch (call, portal message, medication
    review, data review) whose minutes accrue to the month's billing candidate.
  attributes:
    - { name: activity_type, data_type: string }
    - { name: activity_month, data_type: string }
    - { name: duration_min, data_type: integer }
    - { name: billable_flag, data_type: string }
    - { name: note_status, data_type: string, description: "pending | approved" }
    - { name: proposed_by, data_type: string, description: "manual | care_scribe (agent-drafted, human-approved)" }
  relationships:
    - { name: patient, target: patient, cardinality: belongs_to }
    - { name: care_manager, target: care_manager, cardinality: belongs_to }
- entity_key: billing_candidate
  name: "Billing candidate"
  description: >-
    A proposed program/code/month billing line held at the
    documentation-completeness gate until a human approves, adjusts, or holds
    it — the monthly billing review work item.
  attributes:
    - { name: program_code, data_type: string }
    - { name: cpt_code, data_type: string }
    - { name: service_month, data_type: string }
    - { name: total_time_min, data_type: integer }
    - { name: expected_reimbursement, data_type: float }
    - { name: decision, data_type: string, description: "bill | hold" }
    - { name: hold_reason, data_type: string }
    - { name: audit_package_status, data_type: string }
  relationships:
    - { name: patient, target: patient, cardinality: belongs_to }
- entity_key: device_reading
  name: "RPM device-reading cycle"
  description: >-
    A patient-month remote-monitoring summary: reading-day adherence, anomaly
    count, and clinician review minutes/note state for the cycle.
  attributes:
    - { name: reading_month, data_type: string }
    - { name: device_type, data_type: string }
    - { name: device_vendor, data_type: string }
    - { name: fda_cleared_flag, data_type: string }
    - { name: reading_days, data_type: integer }
    - { name: anomaly_count, data_type: integer }
    - { name: review_minutes, data_type: integer }
    - { name: meets_16day_flag, data_type: string }
  relationships:
    - { name: patient, target: patient, cardinality: belongs_to }
