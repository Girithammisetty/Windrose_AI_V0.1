# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the practice's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
# The ADT/HL7v2 drop lands raw v2 messages; Core ingestion decodes hl7v2 via
# the BRD 57 standards-interop decoders — the pack declares only the transport.
- name: "ADT / HL7v2 feed drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "hl7-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/adt"
- name: "Claims / eligibility extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: care-mgmt-extracts
    root_prefix: "monthly/"
    file_format: csv
    glob: "*.csv"
