# Governed decision table (BRD 54) — a deterministic, explainable, no-LLM
# first-cut triage over monthly-billing-review cases created from
# care-billing-candidates rows (all columns below are that dataset's binding
# contract columns). It EXECUTES to the same governed four-eyes proposal an
# agent produces: every matched case becomes a case.apply_disposition proposal
# a care manager, clinician reviewer, or CFO must approve — the table
# proposes, a human decides, and it NEVER bills (BR-2) and NEVER proposes a
# clinical determination. Thresholds and artifact rules are program-configured
# by the practice's compliance policy, not asserted here. Outcome
# disposition_codes are validated against this workspace's disposition catalog
# at install (dispositions install first, packctl INSTALL_ORDER).
- identity: billing_review_triage
  name: "Monthly billing review triage"
  rules:
    # Consent is the hard prerequisite: a missing/revoked consent artifact is
    # a do-not-bill signal the reviewer confirms against the consent chain.
    - when:
        - { column: hold_reason, op: in, value: [consent_revoked, no_consent] }
      then: { disposition_code: consent_issue_confirmed, severity: high }
      note: "Consent artifact missing or revoked in the intake record — do not bill; reviewer confirms against the consent audit chain"
    # Same-month code-combination conflict — a human reviewer selects the
    # defensible code; the table never picks between codes itself.
    - when:
        - { column: hold_reason, op: eq, value: code_mutual_exclusion }
      then: { disposition_code: escalate_md, severity: medium }
      note: "Same-month code-combination conflict — clinician reviewer selects the defensible code"
    # A program-configured documentation/threshold artifact is missing — hold
    # and pursue completion; under-documented months are held, not billed.
    - when:
        - { column: hold_reason, op: in, value: [missing_time, rpm_16day_not_met, tcm_window_missed, care_plan_overdue] }
      then: { disposition_code: bill_held, severity: medium }
      note: "Program-configured documentation or threshold artifact missing — hold and close the gap before billing"
    # Audit-defensibility gate: even a clean candidate holds until its audit
    # package is complete (practice-configured RAC-defensibility policy).
    - when:
        - { column: audit_package_status, op: eq, value: incomplete }
      then: { disposition_code: bill_held, severity: low }
      note: "Audit package incomplete — hold until the audit-defensibility package is assembled"
    # No documentation gap + complete audit package: propose approval; the
    # biller/CFO still makes the final four-eyes call.
    - when:
        - { column: hold_reason, op: eq, value: none }
        - { column: audit_package_status, op: eq, value: complete }
      then: { disposition_code: bill_approved, severity: low }
      note: "No documentation gap and complete audit package — propose approval for the biller's four-eyes sign-off"
  # Anything unmatched goes to a human clinician reviewer — the table never
  # guesses on ambiguous candidates.
  default_outcome: { disposition_code: escalate_md, severity: low }
