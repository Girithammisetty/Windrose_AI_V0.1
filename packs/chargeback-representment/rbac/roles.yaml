# Merchant dispute-operations role catalog as tenant CUSTOM roles composing
# the Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). Separation of duties: the Dispute Response Analyst triages and
# proposes fight/accept decisions, the Evidence Specialist assembles
# compelling-evidence packages (order/carrier/alert-feed reads), the
# Pre-Arbitration Lead runs escalations and deep analysis, the Dispute
# Program Manager alone approves dispositions (representment filings,
# liability acceptances, and pre-arb escalations are four-eyes), and the
# Payments Compliance Auditor reviews everything with no case-write power
# (network-program and PSP-audit readiness).
- name: "Dispute Response Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
