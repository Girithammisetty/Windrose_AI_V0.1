      note: "Fourth chargeback in 12 months from Devon Marsh (prior_chargebacks_band 3_plus): MR-4007 won on delivery + device evidence, MR-4016 lost on weak docs. This 4837 'no authorization' claim on ORD-9024 has device match + delivery confirmation to the address on file — fight with the full pattern history AND flag for block-list/prevention; each claim still stands on its own evidence"
