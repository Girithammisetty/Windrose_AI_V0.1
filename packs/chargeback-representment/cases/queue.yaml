# Seeded chargeback-response queue: the OPEN chargebacks from the seed
# dataset become cases so an analyst logging in sees a real, pattern-diverse
# worklist on day one — a CE 3.0-qualified CNP fraud claim, a delivery-
# confirmed not-received claim on a tight deadline, a weak not-as-described
# claim where accepting is cheaper, a serial friendly-fraudster's fourth
# chargeback, an issuer pre-arbitration on a big-ticket win, and a duplicate
# chargeback already refunded through a pre-dispute alert. due_days=4 keeps
# triage ahead of the tightest acquirer response deadlines on the open book.
dataset: mr_chargebacks
due_days: 4
rows:
  - row_pk: MR-5002
    severity: high
    display_projection:
      chargeback_id: MR-5002
      customer: "Rosa Camacho (CU-3012)"
      reason_code: "13.1"
      reason_family: consumer_dispute
      amount: "486.30"
      days_to_deadline: "6"
      note: "Visa 13.1 'merchandise not received' on ORD-9022 ($486.30, home goods): carrier shows signed delivery confirmation to the AVS-matched shipping address — the canonical 13.1 winner. Response deadline in 6 days; assemble POD + AVS/CVV match + order/shipping records and represent. Same evidence profile won MR-4003 and MR-4017"
  - row_pk: MR-5005
    severity: high
    display_projection:
      chargeback_id: MR-5005
      customer: "Amara Diallo (CU-3006)"
      reason_code: "4853"
      reason_family: consumer_dispute
      amount: "1980.00"
      days_to_deadline: "4"
      note: "Issuer pre-arbitration on ORD-9025 ($1,980 electronics) — our second presentment initially prevailed and the issuer has now escalated with new cardholder documentation. 4 days to respond: big ticket + strong original evidence (delivery confirmed, device match) supports continuing, but weigh pre-arb/arbitration fees and the loss precedent MR-4015 before committing — Dispute Program Manager sign-off required"
