# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous change to the benefits system
# of record). The URL is a placeholder the agency replaces; nothing is
# called at install, and no credential material ships in the pack.
- name: "Benefits platform determination status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://benefits-platform.example.invalid/api/v1/determinations/status"
    headers: { Content-Type: "application/json" }
