# Governed model blueprints (experiment-service inc9): the intended models
# this vertical runs, independent of any trained artifact. Each corresponds
# to a training pipeline this pack already ships (pipelines/templates.yaml),
# so the blueprint and its implementation stay in one governed pair.
- archetype_key: gb_determination_outcome_scorer
  name: "Determination outcome scorer"
  task_type: classification
  target: disposition
  description: >-
    Supervised scorer over adjudicated determinations (gb-determinations):
    predicts the likely disposition from program, determination type, issue
    type, severity, and deadline runway — the deterministic-first pre-router
    that orders the examiner docket. Implemented by the pack's xgboost
    training pipeline.
  expected_metrics: { f1: 0.80 }
  governance_notes: >-
    Adverse-action relevant: scores order the docket ONLY — every
    eligibility determination and appeal outcome remains a four-eyes human
    decision, denials always carry written findings and appeal rights, and
    no score ever becomes a denial, termination, or fraud consequence
    without an individualized human determination. Promotion requires
    eval-gate + Program Integrity Manager approval.
- archetype_key: gb_claim_anomaly_detector
  name: "Benefit claim anomaly detector"
  task_type: anomaly_detection
  target: null
  description: >-
    Unsupervised surface scan over the claim book (gb-claims) for
    out-of-pattern filing clusters — cross-program fans and shared-address
    filing rings. Implemented by the pack's isolation-forest training
    pipeline.
  expected_metrics: {}
  governance_notes: >-
    Detector output opens verification review work, never adverse action;
    flagged activity routes to human program-integrity review. An anomaly
    hit alone never justifies denying or suspending a claimant whose own
    documents verify (the automated-fraud-system false-positive lesson).
