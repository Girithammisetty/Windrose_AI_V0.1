# Seeded adjudication queue: the OPEN determinations from the seed dataset
# become cases so an examiner logging in sees a real, pattern-diverse
# worklist on day one — a payroll-lag income mismatch on a vulnerable
# Medicaid household, a contested UI separation, an expedited SNAP
# application at day 5 of 7, an identity flag on a legitimate claimant from
# a shared address, a large agency-error overpayment (waiver candidate), and
# an appeal-hearing packet due in 3 days. due_days=4 keeps triage inside the
# SNAP 7-day expedited clock and the 3-day hearing-packet deadline on the
# tightest rows.
dataset: gb_determinations
due_days: 4
rows:
  - row_pk: GB-D-5001
    severity: high
    display_projection:
      determination_id: GB-D-5001
      claimant: "Marisol Vega (CL-3001)"
      program: medicaid_eligibility
      determination_type: redetermination
      issue_type: income_verification
      days_to_deadline: "6"
      note: "Quarterly wage-match flags household income over the Medicaid limit on claim C-4001, but current pay stubs show unchanged wages — the mismatch pattern matches an employer payroll-reporting lag, the exact false-positive this household already cleared at SNAP redetermination GB-D-4018 (claim C-4021, approved). Household is flagged vulnerable and Spanish-preferred: any adverse action requires translated advance notice with specific reasons and hearing rights, and benefits cannot be terminated before the notice period runs"
  - row_pk: GB-D-5002
    severity: medium
    display_projection:
      determination_id: GB-D-5002
      claimant: "Todd Brannigan (CL-3002)"
      program: unemployment
      determination_type: initial_eligibility
      issue_type: separation_reason
      days_to_deadline: "11"
      note: "Employer contests the separation on claim C-4002 as a voluntary quit; claimant states he was laid off in a shift reduction. Employer's documentation window is open — obtain the separation statement and any resignation record before deciding; on a misconduct-style contest the employer bears the burden. First-payment promptness clock is running (11 days of runway). Claimant's prior work-search denial GB-D-4007 / upheld appeal GB-D-4014 sit on a DIFFERENT claim (C-4013) — this separation issue is decided on its own evidence"
  - row_pk: GB-D-5003
    severity: high
    display_projection:
      determination_id: GB-D-5003
      claimant: "Amina Warsame (CL-3003)"
      program: snap
      determination_type: initial_eligibility
      issue_type: income_verification
      days_to_deadline: "2"
      note: "Expedited SNAP application C-4003 at day 5 of the 7-day expedited clock: household reports income and liquid resources under the expedited threshold, one pay stub still outstanding (verification_docs partial). Under expedited-service rules the missing verification is postponable — issue the first allotment on time after identity verification and complete the remaining verification in the following period; blowing the expedited deadline is itself a compliance failure. Somali-language notices required"
  - row_pk: GB-D-5004
    severity: medium
    display_projection:
      determination_id: GB-D-5004
      claimant: "Jonah Whitaker (CL-3004)"
      program: unemployment
      determination_type: initial_eligibility
      issue_type: identity
      days_to_deadline: "14"
      note: "Identity flag on claim C-4004 fired because the filing address is a shared multi-unit address also used by the suspected stolen-identity ring on CL-3009's claims C-4009/C-4017/C-4029 (fraud referrals GB-D-4002/GB-D-4011, established overpayment GB-D-4017 $5,210, docs missing on all three). CL-3004's own documents are internally consistent, docs complete, employment history verified with the listed employer — treat the flag as a verification lead, route through the identity-verification pathway, and never auto-deny on the address match alone (the automated-fraud-system lesson)"
  - row_pk: GB-D-5005
    severity: medium
    display_projection:
      determination_id: GB-D-5005
      claimant: "Earl Dempsey (CL-3005)"
      program: unemployment
      determination_type: overpayment
      issue_type: income_verification
      overpayment_amount: "8460.00"
      days_to_deadline: "25"
      note: "$8,460 overpayment on claim C-4005 traced to an agency benefit-rate miscalculation applied across 12 weeks — the claimant reported wages correctly and without fault each week. Agency-error origin plus financial hardship makes this a strong waiver candidate under the equity-and-good-conscience standard; document the fault analysis before any recovery action. Precedent: waiver granted on the $380 TANF agency-error overpayment GB-D-4019 (claim C-4019)"
  - row_pk: GB-D-5006
    severity: high
    display_projection:
      determination_id: GB-D-5006
      claimant: "Renata Kovacs (CL-3006)"
      program: disability_state
      determination_type: appeal_hearing_prep
      issue_type: income_verification
      days_to_deadline: "3"
      note: "Fair-hearing packet due in 3 days on the appeal of denial GB-D-4012 (state disability, claim C-4006). Assemble exhibits: the determination notice, wage and income records relied upon, medical/functional documentation, and the examiner file — the agency defends the record it decided on, and the hearing officer decides on that record. Verify the original notice stated the specific reasons and appeal rights; a defective notice is an independent due-process ground for reversal (recent overturn GB-D-4006 turned on the employer failing its burden)"
