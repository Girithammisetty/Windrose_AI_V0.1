# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload.
# Chain shape: cc_claims (claim/change-order work items) -> cc_contracts
# (contract book) -> cc_parties (subcontractor/supplier/GC/owner-rep register).
- identity: cc_claims
  name: cc-claims
  # value domain: disposition holds cases/dispositions.yaml catalog codes —
  #   approve_change_order | reject_no_entitlement | negotiate_partial_merit |
  #   request_substantiation | close_withdrawn_resolved | escalate_review_board |
  #   refer_dispute_resolution (semantic measure filters and verified SQL
  #   compare against these literals)
  # value domain: status = open | closed
  # value domain: claim_type = acceleration | change_order_request |
  #   defect_backcharge | delay_claim | differing_site_conditions | payment_dispute
  # value domain: notice_timely = yes | no | disputed
  # value domain: schedule_impact = none | days_1_15 | days_16_29 | days_30_plus
  # value domain: days_to_deadline = int days remaining in the contract-configured
  #   response window (negative = window already lapsed)
  required_columns:
    [claim_id, contract_id, claim_type, entitlement_basis, notice_timely,
     schedule_impact, severity, status, disposition, deadline_bucket,
     filed_month, age_days, days_to_deadline, claimed_amount, approved_amount]
- identity: cc_contracts
  name: cc-contracts
  required_columns:
    [contract_id, party_id, project, contract_type, value_band, start_year,
     retention_band, claim_month]
- identity: cc_parties
  name: cc-parties
  required_columns:
    [party_id, party_name, party_type, trade, prequal_tier,
     prior_claims_band, surety_backed]
