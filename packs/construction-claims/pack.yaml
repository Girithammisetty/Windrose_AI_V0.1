# construction-claims capability pack — Core-neutral edition: construction
# claim and change-order adjudication for the paying side of the contract
# (owners/developers, general contractors, construction managers, sureties,
# infrastructure agencies). Installable TODAY against Datacern Core's public
# APIs via packctl/pack-service; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are
# declared under `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: construction-claims
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted construction claim and change-order adjudication for owners,
  GCs, CMs, sureties, and infrastructure agencies: claim intake triage with
  contractual notice-provision awareness, entitlement-first analysis
  (differing site conditions Type I/II, directed vs constructive
  acceleration, concurrent delay), quantum review grounded in measured-mile
  vs total-cost methodology, defect-backcharge and surety-notice handling,
  pay-if-paid/pay-when-paid payment-dispute screening, a claims-operations
  KPI semantic model and dashboards (approval/rejection/negotiated rates,
  claimed-vs-approved ratio, deadline runway, schedule-impact mix), a
  party-to-project exposure network, claims-law grounding memories, and
  contract-anomaly + claim-outcome training pipelines.
categories: [construction, claims, change_orders, disputes, infrastructure]
regulatory: [contract_law, far_dsc_clause, mechanics_lien, surety_bonds, prompt_payment]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/construction_claims_core.yaml", identity: "construction_claims_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/claims_command_center.yaml", identity: "claims_command_center" }
    - { file: "dashboards/entitlement_schedule_impact.yaml", identity: "entitlement_schedule_impact" }
    - { file: "dashboards/party_risk_recovery.yaml", identity: "party_risk_recovery" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "claim_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "claim_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "claims_ontology" }
  decision_models:
    - { file: "decisions/claim_intake_routing.yaml", identity: "claim_intake_routing" }
    - { file: "decisions/substantiation_routing.yaml", identity: "substantiation_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Claim Intake Copilot, Delay Analysis
      Assistant for TIA/windows narratives, Quantum Review Builder with
      measured-mile benchmarking, Notice & Deadline Sentinel) require
      agent-runtime graph-module registration (BRD 23 BR-12). This pack
      specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
