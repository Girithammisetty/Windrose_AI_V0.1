# construction-claims capability pack — Core-neutral edition: construction
# claim and change-order adjudication for the paying side of the contract
# (owners/developers, general contractors, construction managers, sureties,
# infrastructure agencies). Installable TODAY against Windrose Core's public
# APIs via packctl; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under
# `deferred` — recorded in the install ledger, never faked.
pack_manifest: 1
name: construction-claims
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted construction claim and change-order adjudication for owners,
  GCs, CMs, sureties, and infrastructure agencies: claim intake triage with
  contractual notice-provision awareness, entitlement-first analysis
  (differing site conditions Type I/II, directed vs constructive
  acceleration, concurrent delay), quantum review grounded in measured-mile
  vs total-cost methodology, defect-backcharge and surety-notice handling,
  pay-if-paid/pay-when-paid payment-dispute screening, a claims-operations
  KPI semantic model and dashboards (approval/rejection/negotiated rates,
  claimed-vs-approved ratio, deadline runway, schedule-impact mix), a
  party-to-project exposure network, claims-law grounding memories, and
  contract-anomaly + claim-outcome training pipelines.
categories: [construction, claims, change_orders, disputes, infrastructure]
regulatory: [contract_law, far_dsc_clause, mechanics_lien, surety_bonds, prompt_payment]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/construction_claims_core.yaml", identity: "construction_claims_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/claims_command_center.yaml", identity: "claims_command_center" }
    - { file: "dashboards/entitlement_schedule_impact.yaml", identity: "entitlement_schedule_impact" }
    - { file: "dashboards/party_risk_recovery.yaml", identity: "party_risk_recovery" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "claims_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Claim Intake Copilot, Delay Analysis
      Assistant for TIA/windows narratives, Quantum Review Builder with
      measured-mile benchmarking, Notice & Deadline Sentinel) require
      agent-runtime graph-module registration (BRD 23 BR-12). This pack
      specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      Production read connectors (project-controls and PMIS platforms:
      Procore, Autodesk Construction Cloud, Oracle Primavera P6 and Unifier,
      e-Builder, Kahua; ERP/cost systems: CMiC, Sage 300 CRE, Viewpoint
      Vista; document management for daily reports, RFIs, submittals and
      boring logs) require customer credentials and pack-service connector
      materialization. The pack ships seed datasets in the exact landing
      shape; production connectors are configured through the product
      Data > Connections UI.
  - kind: write_adapters
    reason: >-
      Write adapters (execute a change order in the contract/ERP system,
      post a backcharge, release or hold a progress payment, issue a formal
      claim determination letter, transmit a surety notice) execute only
      behind pack-service's materialization contract and customer
      credentials; every such write stays proposal-mode with human approval
      — no autonomous change-order execution, payment movement, or default
      declaration, ever.
  - kind: ontology
    reason: >-
      Ontology registration (Project, Contract, Party, Surety, Claim,
      ChangeOrder, DelayEvent, ScheduleUpdate, NoticeRecord, Backcharge,
      PayApplication, DeterminationLetter) awaits pack-service; entity
      semantics are carried today by the construction_claims_core semantic
      model and dataset schemas.
  - kind: case_schemas
    reason: >-
      Typed case schemas (change_order_review, delay_claim_analysis,
      dsc_investigation, defect_backcharge_review, payment_dispute_review,
      acceleration_claim_review) await case-service schema materialization;
      today's cases carry the same fields via display_projection + the
      disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      Model archetypes (claim_outcome_confidence, quantum_inflation_score)
      await experiment-service archetype APIs; the scoring capability ships
      as pipeline seeds instead (isolation_forest contract-book anomaly +
      xgboost claim-outcome scorer) with model-governance expectations noted
      in grounding memories.
