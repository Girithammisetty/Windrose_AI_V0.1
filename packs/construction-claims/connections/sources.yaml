# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the owner's/
# GC's expected feeds exist as governed starting points the tenant completes
# with real hosts/credentials in Data → Connections. Nothing is polled at
# install. These feeds are how the cc-* binding contracts receive real data.
- name: "Claim document drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "edi-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/inbound/claim-documents"
- name: "Project-system extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: project-system-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
