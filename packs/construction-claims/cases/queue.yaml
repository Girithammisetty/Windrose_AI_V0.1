# Seeded claim-adjudication queue: the OPEN claims from the seed dataset
# become cases so an analyst logging in sees a real, pattern-diverse worklist
# on day one — owner-furnished-equipment delay with concurrent contractor
# delay, DSC rock claim with a boring-log dispute, a change order priced ~3x
# the measured-mile norm, a total-cost productivity claim, a defect
# backcharge with a surety notice pending, and a pay-if-paid payment
# dispute. due_days=5 keeps triage inside the tightest contractual
# response-deadline runway on the open book.
dataset: cc_claims
due_days: 5
rows:
  - row_pk: CLM-9001
    severity: high
    display_projection:
      claim_id: CLM-9001
      party: "Northgate Builders (P-3007, GC)"
      claim_type: delay_claim
      entitlement_basis: owner_directive
      claimed_amount: "1450000.00"
      days_to_deadline: "10"
      note: "GC claims 42 calendar days of critical-path delay on metro_transit_hub (contract CT-6007, GMP) from late owner-furnished switchgear; owner's schedule review shows steel erection (Ridgeline, CT-6002 scope analog) was itself 3+ weeks behind in the same window — concurrent delay question. Time-impact analysis requested from the GC; do not concede compensable time before the TIA isolates owner-caused float consumption. Response due in 10 days"
  - row_pk: CLM-9002
    severity: high
    display_projection:
      claim_id: CLM-9002
      party: "TerraFirm Earthworks (P-3004)"
      claim_type: differing_site_conditions
      entitlement_basis: site_conditions
      claimed_amount: "685000.00"
      days_to_deadline: "5"
      note: "Type I DSC rock claim on metro_transit_hub (CT-6008, unit_price): claimant asserts rock elevations materially higher than the boring logs indicated; geotech disputes the log interpretation at two of four borings. TerraFirm has 3+ prior claims and a rejected late-notice weather claim on this same contract (CLM-8017) — notice WAS timely here, so decide on the indicated-conditions comparison, not conduct history. Response due in 5 days"
  - row_pk: CLM-9003
    severity: medium
    display_projection:
      claim_id: CLM-9003
      party: "IronPeak Electric (P-3003)"
      claim_type: change_order_request
      entitlement_basis: design_change
      claimed_amount: "312000.00"
      days_to_deadline: "18"
      note: "Conduit-rerouting CO on lakeview_hospital (CT-6014) after the ASI-revised riser drawings — entitlement looks sound (owner-issued design change) but the unit pricing runs roughly 3x the measured-mile rate IronPeak billed for identical runs earlier on the same contract (compare CLM-8020 contract records). Recommend negotiating quantum to the demonstrated production rate before work proceeds; scope/price/time should be signed before the rerouted runs start"
  - row_pk: CLM-9004
    severity: medium
    display_projection:
      claim_id: CLM-9004
      party: "Cascade Mechanical Systems (P-3002)"
      claim_type: acceleration
      entitlement_basis: owner_directive
      claimed_amount: "498000.00"
      days_to_deadline: "25"
      note: "Constructive-acceleration/productivity claim on metro_transit_hub (CT-6009): Cascade prices lost productivity by total-cost method (bid vs actual) with no measured-mile baseline, and notice timeliness is disputed. Total-cost quantum is disfavored — request contemporaneous records (daily reports, timesheets, an unimpacted comparison period) and proof of the constructive-acceleration elements: excusable delay, extension requested and denied, direction to hold schedule. 25-day runway allows a substantiation cycle"
  - row_pk: CLM-9005
    severity: high
    display_projection:
      claim_id: CLM-9005
      party: "Pinnacle Roofing Systems (P-3009)"
      claim_type: defect_backcharge
      entitlement_basis: subcontractor_default
      claimed_amount: "226000.00"
      days_to_deadline: "7"
      note: "Backcharge against Pinnacle on lakeview_hospital (CT-6013) for membrane defects found at flood test — remediation quote $226,000; Pinnacle is surety-backed and a performance-bond notice is pending. Confirm the contract's notice-and-cure sequence is satisfied BEFORE any default declaration (a wrongful default exposes the owner side); document cure demand, response window, and inspection record. Note Pinnacle's CO CLM-8019 on this same contract was approved clean. 7 days to respond"
  - row_pk: CLM-9006
    severity: medium
    display_projection:
      claim_id: CLM-9006
      party: "Vantage Fire Protection (P-3010)"
      claim_type: payment_dispute
      entitlement_basis: spec_ambiguity
      claimed_amount: "91400.00"
      days_to_deadline: "12"
      note: "Vantage demands release of $91,400 on metro_transit_hub (CT-6011) withheld after the owner shorted the GC's pay application; the subcontract's payment clause reads 'payment ... when paid by owner' — whether that is a pay-when-paid timing provision or an enforceable pay-if-paid condition precedent depends on the express language and jurisdiction. Route to contract counsel for clause review; prompt-payment exposure accrues if the withholding lacks a statutory basis. 12-day runway"
