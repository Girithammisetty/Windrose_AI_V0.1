# Governed decision table (BRD 54) — a deterministic, explainable, no-LLM
# first-cut triage over the columns cases created from real cd-disputes rows
# project (dispute_type, amount, deadline_days_left, reg_flag,
# provisional_credit — all in the cd_disputes binding contract). It EXECUTES
# to the same governed four-eyes proposal an agent produces: an operator
# dry-runs or batch-runs it across the worklist, and every matched case
# becomes a case.apply_disposition proposal that the Dispute Operations
# Manager must approve. No autonomous determination — the table proposes, a
# human decides. Clock rules route to route_investigation_review, NOT
# escalate_fraud_review: a deadline breach is a workflow emergency, not a
# fraud question. Dollar cut-offs below are institution-configured triage
# thresholds, not regulatory requirements. Outcome disposition_codes are
# validated against this workspace's disposition catalog at install time, so
# `dispositions` installs before this (packctl INSTALL_ORDER).
- identity: reg_e_triage
  name: "Reg E dispute triage table"
  rules:
    # OVERDUE: the regulatory clock has already run out. This is the most
    # escalation-worthy posture in the workflow — the file is out of
    # compliance until a human completes and documents the investigation.
    - when:
        - { column: deadline_days_left, op: lt, value: 0 }
      then: { disposition_code: route_investigation_review, severity: critical }
      note: "Regulatory clock ALREADY BREACHED — overdue posture; route to investigation review for immediate human completion and documented findings"
    # Regulatory clock at/near expiry — must reach a human fast. A clock
    # breach is not a fraud question, so this routes to investigation
    # review, not the fraud track.
    - when:
        - { column: deadline_days_left, op: between, value: [0, 2] }
      then: { disposition_code: route_investigation_review, severity: critical }
      note: "Regulatory clock ≤ 2 business days — route to investigation review now"
    # Reg E provisional-credit clock at risk: credit is due but not yet
    # issued and the runway is nearly gone (12 CFR 1005.11 requires
    # provisional credit within 10 business days to take the extended
    # investigation window).
    - when:
        - { column: reg_flag, op: eq, value: reg_e }
        - { column: provisional_credit, op: eq, value: due }
        - { column: deadline_days_left, op: between, value: [0, 3] }
      then: { disposition_code: route_investigation_review, severity: critical }
      note: "Provisional-credit clock at risk — credit due but not issued (12 CFR 1005.11 10-business-day provisional credit); route for immediate human action"
    # High-value card-not-present unauthorized fraud.
    - when:
        - { column: dispute_type, op: in, value: [fraud_unauthorized] }
        - { column: amount, op: between, value: [500, 1000000] }
      then: { disposition_code: escalate_fraud_review, severity: high }
      note: "High-value unauthorized fraud — fraud investigation review"
    # Small-dollar unauthorized claim below the investigation-cost floor —
    # zero-liability quick resolve (institution-configured threshold, not a
    # regulatory figure).
    - when:
        - { column: dispute_type, op: in, value: [fraud_unauthorized] }
        - { column: amount, op: between, value: [0, 50] }
      then: { disposition_code: resolve_cardholder_favor, severity: low }
      note: "Small-dollar zero-liability quick resolve — investigation cost exceeds the disputed amount (institution-configured threshold)"
    # Post-cancellation recurring billing — chargeable with the cancellation record.
    - when:
        - { column: dispute_type, op: in, value: [cancelled_recurring] }
      then: { disposition_code: file_chargeback, severity: medium }
      note: "Post-cancellation billing — chargeback with cancellation evidence"
    # 'Item not received' — requires carrier delivery-confirmation review.
    - when:
        - { column: dispute_type, op: in, value: [not_received] }
      then: { disposition_code: escalate_fraud_review, severity: high }
      note: "Not-received claim — delivery-confirmation + first-party pattern review"
  # Unmatched disputes route to HUMAN investigation review — never to an
  # auto-proposed denial. A Reg E denial requires a completed investigation
  # with specific documented findings; a default-deny posture is a UDAAP /
  # CFPB-examination risk even when individual files look defensible.
  default_outcome: { disposition_code: route_investigation_review, severity: medium }
