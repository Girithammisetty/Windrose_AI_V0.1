# Semantic model `disputes_core` — issuer dispute-operations KPI catalog
# (cardholder-favor rate, chargeback win rate, provisional-credit exposure,
# deadline runway, backlog aging), expressed in the Core semantic grammar
# (agg whitelist, equality measure filters, derived expr_metric with nullif;
# join_paths left/many_to_one, acyclic).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Amount columns ingest
# as bronze strings, so numeric measures cast(... as double) (the proven
# claims_core pattern).
name: disputes_core
description: >-
  US card-issuer dispute operations KPI model (Reg E / Reg Z + network
  chargebacks): dispute volumes and backlog aging, disposition outcome mix,
  cardholder-favor and chargeback win rates, provisional-credit exposure and
  regulatory deadline runway — disputes and card transactions joined to the
  cardholder book.
definition:
  entities:
    - name: disputes
      dataset: cd_disputes
      table: main.cd_disputes
      primary_key: [dispute_id]
      dataset_version_policy: { policy: latest }
    - name: transactions
      dataset: cd_transactions
      table: main.cd_transactions
      primary_key: [txn_id]
      dataset_version_policy: { policy: latest }
    - name: cardholders
      dataset: cd_cardholders
      table: main.cd_cardholders
      primary_key: [cardholder_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: disputes_cardholders
      from_entity: disputes
      to_entity: cardholders
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: cardholder_id, to_column: cardholder_id }]
    - name: transactions_cardholders
      from_entity: transactions
      to_entity: cardholders
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: cardholder_id, to_column: cardholder_id }]
  dimensions:
    - { name: dispute_type, entity: disputes, type: categorical, column: dispute_type }
    - { name: reason_code, entity: disputes, type: categorical, column: reason_code }
    - { name: network, entity: disputes, type: categorical, column: network }
    - { name: card_product, entity: disputes, type: categorical, column: card_product }
    - { name: reg_flag, entity: disputes, type: categorical, column: reg_flag }
    - { name: severity, entity: disputes, type: categorical, column: severity }
    - { name: dispute_status, entity: disputes, type: categorical, column: status }
    - { name: dispute_disposition, entity: disputes, type: categorical, column: disposition }
    - { name: provisional_credit, entity: disputes, type: categorical, column: provisional_credit }
    - { name: chargeback_filed, entity: disputes, type: categorical, column: chargeback_filed }
    - { name: deadline_bucket, entity: disputes, type: categorical, column: deadline_bucket }
    - { name: assigned_tier, entity: disputes, type: categorical, column: assigned_tier }
    - { name: filed_month, entity: disputes, type: categorical, column: filed_month }
    - { name: mcc, entity: transactions, type: categorical, column: mcc }
    - { name: merchant_country, entity: transactions, type: categorical, column: merchant_country }
    - { name: txn_channel, entity: transactions, type: categorical, column: channel }
    - { name: entry_mode, entity: transactions, type: categorical, column: entry_mode }
    - { name: txn_month, entity: transactions, type: categorical, column: txn_month }
    - { name: segment, entity: cardholders, type: categorical, column: segment }
    - { name: risk_tier, entity: cardholders, type: categorical, column: risk_tier }
    - { name: home_state, entity: cardholders, type: categorical, column: home_state }
    - { name: account_age_bucket, entity: cardholders, type: categorical, column: account_age_bucket }
  measures:
    - { name: dispute_count, entity: disputes, agg: count,
        description: "Number of disputes" }
    - { name: open_dispute_count, entity: disputes, agg: count,
        filters: "status = 'open'",
        description: "Disputes still open (adjudication backlog)" }
    - { name: closed_dispute_count, entity: disputes, agg: count,
        filters: "status = 'closed'",
        description: "Disputes closed with a final outcome" }
    - { name: cardholder_favor_count, entity: disputes, agg: count,
        filters: "disposition = 'cardholder_favor'",
        description: "Disputes resolved in the cardholder's favor (non-chargeback)" }
    - { name: denied_count, entity: disputes, agg: count,
        filters: "disposition = 'denied_no_error'",
        description: "Disputes denied — investigation found no error" }
    - { name: chargeback_won_count, entity: disputes, agg: count,
        filters: "disposition = 'chargeback_won'",
        description: "Chargebacks won — funds recovered from the merchant" }
    - { name: chargeback_lost_count, entity: disputes, agg: count,
        filters: "disposition = 'chargeback_lost'",
        description: "Chargebacks lost at representment/arbitration" }
    - { name: chargeback_filed_count, entity: disputes, agg: count,
        filters: "chargeback_filed = 'yes'",
        description: "Disputes where a network chargeback was filed" }
    - { name: fraud_dispute_count, entity: disputes, agg: count,
        filters: "dispute_type = 'fraud_unauthorized'",
        description: "Unauthorized-transaction (fraud) disputes" }
    - { name: provisional_credit_issued_count, entity: disputes, agg: count,
        filters: "provisional_credit = 'issued'",
        description: "Disputes with provisional credit currently issued" }
    - { name: provisional_credit_due_count, entity: disputes, agg: count,
        filters: "provisional_credit = 'due'",
        description: "Open Reg E disputes where the provisional-credit clock is running" }
    - { name: avg_dispute_age_days, entity: disputes, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average dispute age in days (cycle time / backlog aging)" }
    - { name: total_disputed_amount, entity: disputes, agg: sum,
        expr: "cast(amount as double)", format: decimal,
        description: "Total dollar amount in dispute" }
    - { name: avg_disputed_amount, entity: disputes, agg: avg,
        expr: "cast(amount as double)", format: decimal,
        description: "Average disputed amount" }
    - { name: total_recovered_amount, entity: disputes, agg: sum,
        expr: "cast(recovery_amount as double)", format: decimal,
        description: "Total dollars recovered from merchants via chargebacks" }
    - { name: txn_count, entity: transactions, agg: count,
        description: "Number of card transactions" }
    - { name: cnp_txn_count, entity: transactions, agg: count,
        filters: "channel = 'card_not_present'",
        description: "Card-not-present transactions (primary fraud surface)" }
    - { name: recurring_txn_count, entity: transactions, agg: count,
        filters: "entry_mode = 'recurring'",
        description: "Recurring/subscription transactions (cancelled-recurring surface)" }
    - { name: total_txn_amount, entity: transactions, agg: sum,
        expr: "cast(amount as double)", format: decimal,
        description: "Total transaction amount" }
    - { name: avg_txn_amount, entity: transactions, agg: avg,
        expr: "cast(amount as double)", format: decimal,
        description: "Average transaction amount" }
    - { name: cardholder_count, entity: cardholders, agg: count,
        description: "Number of cardholders on the book" }
    - { name: high_risk_cardholder_count, entity: cardholders, agg: count,
        filters: "risk_tier = 'high'",
        description: "Cardholders in the high dispute-risk tier (first-party fraud watch)" }
    - { name: cardholder_favor_rate,
        expr_metric: "cardholder_favor_count / nullif(closed_dispute_count, 0)",
        format: percent,
        description: "Disputes resolved in the cardholder's favor over all closures" }
    - { name: dispute_denial_rate,
        expr_metric: "denied_count / nullif(closed_dispute_count, 0)",
        format: percent,
        description: "Disputes denied (no error found) over all closures" }
    - { name: chargeback_win_rate,
        expr_metric: "chargeback_won_count / nullif(chargeback_filed_count, 0)",
        format: percent,
        description: "Chargebacks won over chargebacks filed (recovery effectiveness)" }
    - { name: fraud_dispute_share,
        expr_metric: "fraud_dispute_count / nullif(dispute_count, 0)",
        format: percent,
        description: "Share of dispute volume claiming unauthorized transactions" }
    - { name: recovery_rate,
        expr_metric: "total_recovered_amount / nullif(total_disputed_amount, 0)",
        format: percent,
        description: "Dollars recovered over dollars disputed" }
