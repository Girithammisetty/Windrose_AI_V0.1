# Dispute Command Center: dispute mix by type, backlog aging, outcome mix,
# intake trend. Chart families restricted to the render-verified set
# (vertical_bar / grid / pie / line); expr_metric measures (rates) are
# query/NL surfaces, never charted directly.
name: "Dispute Command Center"
module: insights
semantic_model: disputes_core
description: >-
  Top-line dispute operations KPIs: dispute volumes by type, adjudication
  backlog aging by severity, human disposition outcome mix, and dollar
  exposure per dispute type.
tags: [banking, disputes, cards, pack]
charts:
  - name: "Disputes by type"
    chart_type: vertical_bar_chart
    description: "Dispute volume by claim type (fraud, not received, duplicate, ...)"
    config:
      x: { dimension: dispute_type }
      y: [ { measure: dispute_count, agg_fn: count } ]
    sources: [ { measure: dispute_count } ]
    w: 6
    h: 4
  - name: "Backlog aging by severity"
    chart_type: vertical_bar_chart
    description: "Average dispute age in days by severity (cycle-time watch)"
    config:
      x: { dimension: severity }
      y: [ { measure: avg_dispute_age_days, agg_fn: avg } ]
    sources: [ { measure: avg_dispute_age_days } ]
    w: 6
    h: 4
  - name: "Disposition outcome mix"
    chart_type: pie_chart
    description: "Cardholder favor vs denied vs chargeback won/lost vs pending"
    config:
      x: { dimension: dispute_disposition }
      y: [ { measure: dispute_count, agg_fn: count } ]
    sources: [ { measure: dispute_count } ]
    w: 6
    h: 4
  - name: "Dispute intake by month"
    chart_type: line_chart
    description: "Dispute filings trend by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: dispute_count, agg_fn: count } ]
    sources: [ { measure: dispute_count } ]
    w: 6
    h: 4
  - name: "Dispute-type worklist grid"
    chart_type: grid_chart
    description: "Disputes, closures, cardholder-favor outcomes, chargebacks won and exposure by type"
    config:
      columns: [dispute_type, dispute_count, closed_dispute_count, cardholder_favor_count, chargeback_won_count, total_disputed_amount]
      x: { dimension: dispute_type }
      y:
        - { measure: dispute_count, agg_fn: count }
        - { measure: closed_dispute_count, agg_fn: count }
        - { measure: cardholder_favor_count, agg_fn: count }
        - { measure: chargeback_won_count, agg_fn: count }
        - { measure: total_disputed_amount, agg_fn: sum }
    sources:
      - { measure: dispute_count }
      - { measure: closed_dispute_count }
      - { measure: cardholder_favor_count }
      - { measure: chargeback_won_count }
      - { measure: total_disputed_amount }
    w: 12
    h: 4
