# card-disputes capability pack — Core-neutral edition: Reg E / Reg Z card
# dispute and chargeback adjudication for US issuers (banks, credit unions,
# fintech program managers). Installable TODAY against Datacern Core's public
# APIs via packctl/pack-service; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are declared
# under `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases arrive
# from real rows via case triggers/intake, not seeds; eval golden sets are
# curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: card-disputes
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted card dispute and chargeback workflow for US issuers: dispute
  intake triage with regulatory-clock awareness (Reg E provisional credit,
  Reg Z billing-error windows), first-party fraud escalation, network
  chargeback recovery with reason-code grounding, dispute-operations KPI
  semantic model and dashboards (cardholder-favor rate, chargeback win rate,
  deadline runway, provisional-credit exposure), cardholder-merchant network
  analytics, Reg E/Z + network-rule grounding memories, and
  transaction-anomaly + dispute-outcome training pipelines.
categories: [banking, cards, disputes, chargebacks, fraud]
regulatory: [reg_e, reg_z, cfpb, visa_rules, mastercard_rules]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/disputes_core.yaml", identity: "disputes_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/dispute_command_center.yaml", identity: "dispute_command_center" }
    - { file: "dashboards/regulatory_clock.yaml", identity: "regulatory_clock" }
    - { file: "dashboards/chargeback_recovery.yaml", identity: "chargeback_recovery" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "dispute_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "dispute_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "dispute_ontology" }
  decision_models:
    - { file: "decisions/reg_e_triage.yaml", identity: "reg_e_triage" }
    - { file: "decisions/merchant_error_recovery.yaml", identity: "merchant_error_recovery" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Dispute Intake Copilot, Chargeback
      Representment Builder, First-Party Fraud Scorer, Provisional Credit
      Clock Sentinel) require agent-runtime graph-module registration
      (BRD 23 BR-12). This pack specializes the existing case-triage +
      analytics agents via TenantAgentConfig prompt_params + tenant-scope
      RAG grounding instead.
