# tax-notices capability pack — Core-neutral edition: corporate tax notice
# and exemption-certificate resolution for corporate tax departments,
# tax-compliance BPOs/firms, multi-state retailers and SaaS sellers (sales
# tax), and payroll providers. Installable TODAY against Windrose Core's
# public APIs via packctl; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are
# declared under `deferred` — recorded in the install ledger, never faked.
pack_manifest: 1
name: tax-notices
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted corporate tax notice and exemption-certificate resolution:
  notice intake triage with jurisdictional-deadline awareness (response
  windows forfeit appeal rights when missed), penalty-abatement workflow
  (first-time abatement and reasonable-cause grounding), economic-nexus
  questionnaire handling post-Wayfair, exemption/resale certificate audit
  remediation, information-mismatch (CP2000-style) response, duplicate-notice
  reconciliation, tax-notice-operations KPI semantic model and dashboards
  (abatement rate, pay-valid share, amended-return share, deadline runway,
  assessed-vs-abated exposure), entity-jurisdiction nexus network analytics,
  IRS-practice + state-DOR grounding memories, and account-anomaly +
  notice-outcome training pipelines.
categories: [tax, compliance, notices, sales_use, abatement]
regulatory: [irs_procedures, state_tax_codes, wayfair_nexus, mtc_uniform_cert, streamlined_sales_tax]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/tax_notices_core.yaml", identity: "tax_notices_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/tax_notice_command_center.yaml", identity: "tax_notice_command_center" }
    - { file: "dashboards/deadlines_exposure.yaml", identity: "deadlines_exposure" }
    - { file: "dashboards/root_cause_abatement.yaml", identity: "root_cause_abatement" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "notice_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: guardrails
    reason: >-
      Tax-notice domain policies (no response filed or payment remitted before
      the human determination; abatement requests must cite the actual facts
      of the taxpayer's compliance history; never advise ignoring a statutory
      notice; deadline-forfeiture watch — a missed response window forfeits
      administrative appeal rights) require guardrail-service / OPA policy
      materialization, which Core does not expose as a pack surface yet. The
      behavioral core is partially covered today by Core invariants: every
      pack-configured agent is proposal-mode with four-eyes approval
      (agent-runtime), and the agent instructions + disposition taxonomy
      route final determinations exclusively to human analysts with the Tax
      Compliance Manager as approver.
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Notice Intake Copilot, Abatement Request
      Builder, Economic-Nexus Threshold Monitor, Deadline Calendar Sentinel,
      Certificate Remediation Planner) require agent-runtime graph-module
      registration (BRD 23 BR-12). This pack specializes the existing
      case-triage + analytics agents via TenantAgentConfig prompt_params +
      tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      Production read connectors (IRS transcript/e-Services correspondence
      feeds, state DOR portal inboxes, ERP tax engines: SAP/Oracle/NetSuite
      and rate providers such as Vertex/Avalara-class services,
      exemption-certificate management systems, payroll providers' agency
      notice feeds, mailroom OCR/scanning services) require customer
      credentials and pack-service connector materialization. The pack ships
      seed datasets in the exact landing shape; production connectors are
      configured through the product Data > Connections UI.
  - kind: write_adapters
    reason: >-
      Write adapters (file a notice response or protest through an agency
      portal, submit a penalty-abatement request, remit an assessed payment,
      file an amended return through the compliance engine, update the
      exemption-certificate repository, register for a new jurisdiction)
      execute only behind pack-service's materialization contract and
      customer credentials; every such write stays proposal-mode with human
      approval — no autonomous filing, payment, or registration, ever.
  - kind: eval_sets
    reason: >-
      Golden eval sets (notice triage, deadline-risk ranking,
      abatement-eligibility screening, duplicate-notice detection,
      nexus-threshold determination) require eval-service write APIs whose
      action names are not yet in the rbac canonical catalog (Core follow-up
      noted in rbac catalog.go).
  - kind: ontology
    reason: >-
      Ontology registration (LegalEntity, TaxAccount, Jurisdiction, Notice,
      Assessment, Penalty, Interest, AbatementRequest, AmendedReturn,
      ExemptionCertificate, FilingObligation, DeadlineClock,
      VoluntaryDisclosure) awaits pack-service; entity semantics are carried
      today by the tax_notices_core semantic model and dataset schemas.
  - kind: case_schemas
    reason: >-
      Typed case schemas (notice_intake, abatement_request, nexus_review,
      cert_audit_remediation, information_mismatch_response,
      duplicate_reconciliation) await case-service schema materialization;
      today's cases carry the same fields via display_projection + the
      disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      Model archetypes (abatement_success_likelihood, notice_validity_score)
      await experiment-service archetype APIs; the scoring capability ships
      as pipeline seeds instead (isolation_forest account-anomaly scan +
      xgboost notice-outcome scorer) with model-governance expectations
      noted in grounding memories.
  - kind: display_labels
    reason: >-
      Display-label overlays ("Notice", "Assessment", "Response due",
      "Deadline at risk", "Abated", entity templates) require the BFF
      label-registry endpoints (BFF-FR-082/088) which are pack-service-tier
      features.
