# Tax Notice Command Center: notice mix by type, backlog aging, outcome mix,
# intake trend. Chart families restricted to the render-verified set
# (vertical_bar / grid / pie / line); expr_metric measures (rates) are
# query/NL surfaces, never charted directly.
name: "Tax Notice Command Center"
module: insights
semantic_model: tax_notices_core
description: >-
  Top-line notice operations KPIs: notice volumes by type, resolution
  backlog aging by severity, human disposition outcome mix, intake trend,
  and per-type assessed exposure.
tags: [tax, notices, compliance, pack]
charts:
  - name: "Notices by type"
    chart_type: vertical_bar_chart
    description: "Notice volume by type (assessment, penalty, cert audit, mismatch, ...)"
    config:
      x: { dimension: notice_type }
      y: [ { measure: notice_count, agg_fn: count } ]
    sources: [ { measure: notice_count } ]
    w: 6
    h: 4
  - name: "Backlog aging by severity"
    chart_type: vertical_bar_chart
    description: "Average notice age in days by severity (cycle-time watch)"
    config:
      x: { dimension: severity }
      y: [ { measure: avg_notice_age_days, agg_fn: avg } ]
    sources: [ { measure: avg_notice_age_days } ]
    w: 6
    h: 4
  - name: "Disposition outcome mix"
    chart_type: pie_chart
    description: "Abated vs paid-valid vs amended vs clarification vs duplicate vs pending"
    config:
      x: { dimension: notice_disposition }
      y: [ { measure: notice_count, agg_fn: count } ]
    sources: [ { measure: notice_count } ]
    w: 6
    h: 4
  - name: "Notice intake by month"
    chart_type: line_chart
    description: "Notices logged by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: notice_count, agg_fn: count } ]
    sources: [ { measure: notice_count } ]
    w: 6
    h: 4
  - name: "Notice-type worklist grid"
    chart_type: grid_chart
    description: "Notices, closures, abatements, amended returns and assessed exposure by type"
    config:
      columns: [notice_type, notice_count, closed_notice_count, abated_count, amended_return_count, total_assessed_amount]
      x: { dimension: notice_type }
      y:
        - { measure: notice_count, agg_fn: count }
        - { measure: closed_notice_count, agg_fn: count }
        - { measure: abated_count, agg_fn: count }
        - { measure: amended_return_count, agg_fn: count }
        - { measure: total_assessed_amount, agg_fn: sum }
    sources:
      - { measure: notice_count }
      - { measure: closed_notice_count }
      - { measure: abated_count }
      - { measure: amended_return_count }
      - { measure: total_assessed_amount }
    w: 12
    h: 4
