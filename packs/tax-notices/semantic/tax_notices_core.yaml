# Semantic model `tax_notices_core` — corporate tax-notice-operations KPI
# catalog (abatement rate, pay-valid share, amended-return share,
# assessed-vs-abated recovery, deadline runway, backlog aging), expressed in
# the Core semantic grammar (agg whitelist, equality measure filters, derived
# expr_metric with nullif; join_paths left/many_to_one, acyclic).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Amount columns ingest
# as bronze strings, so numeric measures cast(... as double) (the proven
# claims_core pattern). Joins form a CHAIN: notices -> accounts -> entities.
name: tax_notices_core
description: >-
  Corporate tax notice operations KPI model (IRS / state DOR / county-city):
  notice volumes and backlog aging, disposition outcome mix, abatement and
  pay-valid and amended-return shares, assessed-vs-abated dollar exposure,
  and jurisdictional deadline runway — notices joined to registered tax
  accounts and up to the legal-entity book (nexus footprint, ERP system,
  voluntary-disclosure history).
definition:
  entities:
    - name: notices
      dataset: tx_notices
      table: main.tx_notices
      primary_key: [notice_id]
      dataset_version_policy: { policy: latest }
    - name: accounts
      dataset: tx_accounts
      table: main.tx_accounts
      primary_key: [account_id]
      dataset_version_policy: { policy: latest }
    - name: business_entities
      dataset: tx_entities
      table: main.tx_entities
      primary_key: [entity_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: notices_accounts
      from_entity: notices
      to_entity: accounts
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: account_id, to_column: account_id }]
    - name: accounts_business_entities
      from_entity: accounts
      to_entity: business_entities
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: entity_id, to_column: entity_id }]
  dimensions:
    - { name: notice_type, entity: notices, type: categorical, column: notice_type }
    - { name: jurisdiction_level, entity: notices, type: categorical, column: jurisdiction_level }
    - { name: tax_type, entity: notices, type: categorical, column: tax_type }
    - { name: root_cause, entity: notices, type: categorical, column: root_cause }
    - { name: amount_band, entity: notices, type: categorical, column: amount_band }
    - { name: severity, entity: notices, type: categorical, column: severity }
    - { name: notice_status, entity: notices, type: categorical, column: status }
    - { name: notice_disposition, entity: notices, type: categorical, column: disposition }
    - { name: filed_month, entity: notices, type: categorical, column: filed_month }
    - { name: deadline_bucket, entity: notices, type: categorical, column: deadline_bucket }
    - { name: account_jurisdiction, entity: accounts, type: categorical, column: jurisdiction }
    - { name: registration_status, entity: accounts, type: categorical, column: registration_status }
    - { name: filing_frequency, entity: accounts, type: categorical, column: filing_frequency }
    - { name: account_month, entity: accounts, type: categorical, column: account_month }
    - { name: filing_history, entity: accounts, type: categorical, column: filing_history }
    - { name: business_unit, entity: business_entities, type: categorical, column: business_unit }
    - { name: industry, entity: business_entities, type: categorical, column: industry }
    - { name: nexus_footprint, entity: business_entities, type: categorical, column: nexus_footprint }
    - { name: erp_system, entity: business_entities, type: categorical, column: erp_system }
    - { name: voluntary_disclosure_history, entity: business_entities, type: categorical, column: voluntary_disclosure_history }
  measures:
    - { name: notice_count, entity: notices, agg: count,
        description: "Number of tax notices" }
    - { name: open_notice_count, entity: notices, agg: count,
        filters: "status = 'open'",
        description: "Notices still open (resolution backlog)" }
    - { name: closed_notice_count, entity: notices, agg: count,
        filters: "status = 'closed'",
        description: "Notices closed with a final outcome" }
    - { name: abated_count, entity: notices, agg: count,
        filters: "disposition = 'abate_penalty_resolved'",
        description: "Notices resolved by winning abatement or withdrawal (agency error / reasonable cause)" }
    - { name: pay_valid_count, entity: notices, agg: count,
        filters: "disposition = 'pay_assessment_valid'",
        description: "Notices where the assessment was correct and paid" }
    - { name: amended_return_count, entity: notices, agg: count,
        filters: "disposition = 'file_amended_return'",
        description: "Notices resolved by filing an amended return" }
    - { name: clarification_count, entity: notices, agg: count,
        filters: "disposition = 'request_agency_clarification'",
        description: "Notices closed after an agency clarification request" }
    - { name: duplicate_closed_count, entity: notices, agg: count,
        filters: "disposition = 'close_duplicate_notice'",
        description: "Notices closed as duplicates of an already-resolved liability" }
    - { name: high_severity_count, entity: notices, agg: count,
        filters: "severity = 'high'",
        description: "High-severity notices (deadline or dollar exposure)" }
    - { name: irs_notice_count, entity: notices, agg: count,
        filters: "jurisdiction_level = 'irs'",
        description: "Federal (IRS) notices" }
    - { name: sales_use_notice_count, entity: notices, agg: count,
        filters: "tax_type = 'sales_use'",
        description: "Sales & use tax notices (the multi-state surface)" }
    - { name: cert_audit_count, entity: notices, agg: count,
        filters: "notice_type = 'exemption_cert_audit'",
        description: "Exemption/resale certificate audit notices" }
    - { name: avg_notice_age_days, entity: notices, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average notice age in days (cycle time / backlog aging)" }
    - { name: avg_deadline_runway_days, entity: notices, agg: avg,
        expr: "cast(days_to_deadline as double)", format: decimal,
        description: "Average days remaining to the response deadline (closed rows carry 0 — slice by deadline_bucket)" }
    - { name: total_assessed_amount, entity: notices, agg: sum,
        expr: "cast(assessed_amount as double)", format: decimal,
        description: "Total dollars assessed across notices" }
    - { name: avg_assessed_amount, entity: notices, agg: avg,
        expr: "cast(assessed_amount as double)", format: decimal,
        description: "Average assessed amount per notice" }
    - { name: total_abated_amount, entity: notices, agg: sum,
        expr: "cast(abated_amount as double)", format: decimal,
        description: "Total dollars abated, withdrawn, or reduced via amendment" }
    - { name: total_penalty_amount, entity: notices, agg: sum,
        expr: "cast(penalty_amount as double)", format: decimal,
        description: "Total penalty dollars across notices (the generally-abatable component)" }
    - { name: total_interest_amount, entity: notices, agg: sum,
        expr: "cast(interest_amount as double)", format: decimal,
        description: "Total interest dollars across notices (statutory — generally not abatable)" }
    - { name: account_count, entity: accounts, agg: count,
        description: "Number of registered tax accounts" }
    - { name: registered_account_count, entity: accounts, agg: count,
        filters: "registration_status = 'registered'",
        description: "Accounts fully registered with the jurisdiction" }
    - { name: entity_count, entity: business_entities, agg: count,
        description: "Number of legal entities on the book" }
    - { name: vda_entity_count, entity: business_entities, agg: count,
        filters: "voluntary_disclosure_history = 'yes'",
        description: "Entities with prior voluntary-disclosure agreements" }
    - { name: national_footprint_count, entity: business_entities, agg: count,
        filters: "nexus_footprint = 'national'",
        description: "Entities with a national nexus footprint (highest multi-state exposure)" }
    - { name: abatement_rate,
        expr_metric: "abated_count / nullif(closed_notice_count, 0)",
        format: percent,
        description: "Notices won via abatement/withdrawal over all closures" }
    - { name: penalty_share_of_assessed,
        expr_metric: "total_penalty_amount / nullif(total_assessed_amount, 0)",
        format: percent,
        description: "Penalty dollars as a share of total assessed — the abatable slice of the exposure (interest is statutory and generally stands)" }
    - { name: pay_valid_share,
        expr_metric: "pay_valid_count / nullif(closed_notice_count, 0)",
        format: percent,
        description: "Notices where the agency was right and we paid, over all closures" }
    - { name: amended_return_share,
        expr_metric: "amended_return_count / nullif(closed_notice_count, 0)",
        format: percent,
        description: "Closures resolved through an amended return" }
    - { name: abatement_recovery_rate,
        expr_metric: "total_abated_amount / nullif(total_assessed_amount, 0)",
        format: percent,
        description: "Dollars abated/reduced over dollars assessed (exposure recovery)" }
    - { name: high_severity_share,
        expr_metric: "high_severity_count / nullif(notice_count, 0)",
        format: percent,
        description: "Share of notice volume flagged high severity" }
