# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the tax
# department's expected feeds exist as governed starting points the tenant
# completes with real hosts/credentials in Data → Connections. Nothing is
# polled at install. These are the landing paths for the tx-* binding
# contracts: mailroom scan/extract drops of agency notices, and tax-engine
# account/entity extracts.
- name: "Notice intake scan/extract drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "notice-intake.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/notice-extracts"
- name: "Tax engine extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: tax-engine-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
