# Typed custom case fields (case-service CASE-FR-022) — the tax-notice work
# item's real triage attributes, typed so the case form validates them and
# decision surfaces can read them structurally instead of parsing notes.
# data_type is IMMUTABLE after creation (case-service) — chosen deliberately.
# Enum options mirror the tx-notices binding-contract column values so field
# data and the bound dataset agree.
# notice_type includes the IRS collection-stream sequence (extending the enum
# BEFORE install is safe — data_type stays immutable): CP14 balance due ->
# CP501 reminder -> CP504 intent to levy (which authorizes only a STATE-REFUND
# levy) -> LT11/L1058, the final notice that opens the 30-day Collection Due
# Process window. Triage urgency turns on which rung the notice sits on.
- name: notice_type
  data_type: enum
  purpose: both
  field_meta:
    label: "Notice type"
    options: [sales_use_assessment, penalty_interest, income_franchise,
              information_mismatch, exemption_cert_audit, payroll_withholding,
              cp14_balance_due, cp501_reminder,
              cp504_intent_levy_state_refund, lt11_final_intent_levy]
    required: false
- name: jurisdiction_level
  data_type: enum
  purpose: both
  field_meta:
    label: "Jurisdiction level"
    options: [irs, state, county_city]
    required: false
- name: tax_type
  data_type: enum
  purpose: both
  field_meta:
    label: "Tax type"
    options: [sales_use, payroll, income, franchise, property]
    required: false
- name: root_cause
  data_type: enum
  purpose: both
  field_meta:
    label: "Root cause"
    options: [rate_change, timing_difference, nexus_question, cert_expired,
              data_mismatch, filing_gap, pending]
    required: false
- name: assessed_amount
  data_type: float
  purpose: both
  field_meta:
    label: "Assessed amount (USD)"
    required: false
- name: abated_amount
  data_type: float
  purpose: both
  field_meta:
    label: "Abated / reduced amount (USD)"
    required: false
- name: days_to_deadline
  data_type: integer
  purpose: both
  field_meta:
    label: "Response window — days left"
    required: false
