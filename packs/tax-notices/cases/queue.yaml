# Seeded notice-resolution queue: the OPEN notices from the seed dataset
# become cases so an analyst logging in sees a real, pattern-diverse worklist
# on day one — recurring rate-table lag, IRS first-time-abatement candidate
# on a 5-day clock, economic-nexus questionnaire, exemption-cert audit
# remediation sprint, acquisition duplicate-EIN information mismatch, and a
# county duplicate of a state-resolved assessment. due_days=4 keeps triage
# well inside the tightest jurisdictional response windows on the open book.
dataset: tx_notices
due_days: 4
rows:
  - row_pk: TXN-9001
    severity: medium
    display_projection:
      notice_id: TXN-9001
      account: "Larkspur Foods OH sales tax (A-5123)"
      notice_type: sales_use_assessment
      root_cause: rate_change
      assessed_amount: "16800.00"
      days_to_deadline: "25"
      note: "Second rate-table lag hit on A-5123 in 90 days: TXN-8011 closed in April via amended return with $4,200 abated for the same cause. A local rate increase posted to the ERP tax engine two filing cycles late, under-collecting on taxable sales — the $16,800 assessment math reconciles to the rate delta. Amended-return path with a penalty-waiver request; flag the rate-subscription feed at E-3009 for a systemic fix or this recurs every cycle."
  - row_pk: TXN-9002
    severity: high
    display_projection:
      notice_id: TXN-9002
      account: "Aster Payroll Services federal 941 (A-5116)"
      notice_type: penalty_interest
      root_cause: timing_difference
      assessed_amount: "24600.00"
      days_to_deadline: "5"
      note: "IRS failure-to-deposit penalty of $24,600 on A-5116: one deposit missed the electronic cutoff by a day. Account shows a clean 3-year history (filing_history clean, no prior penalties in the seed book), all returns filed, tax fully paid — textbook first-time-abatement profile with reasonable cause as fallback. Response window closes in 5 days; a missed deadline forfeits administrative appeal rights. Expect penalty relief only — interest generally stands."
  - row_pk: TXN-9003
    severity: medium
    display_projection:
      notice_id: TXN-9003
      account: "Meridian Direct CO sales tax (A-5107, registration pending)"
      notice_type: sales_use_assessment
      root_cause: nexus_question
      assessed_amount: "0.00"
      days_to_deadline: "42"
      note: "CO economic-nexus questionnaire on A-5107 — no assessment yet, exposure builds daily. Sales analysis shows the state's economic-nexus threshold was crossed in Q1 2026; registration is already pending. Respond inside the 42-day window, complete the registration, and evaluate the pre-registration period: E-3002 carries prior voluntary-disclosure history, and VDA lookback/penalty relief is typically unavailable once the state has made contact — position the response carefully with the Controversy & Abatement Lead."
  - row_pk: TXN-9004
    severity: high
    display_projection:
      notice_id: TXN-9004
      account: "Redwood Medical Devices IL sales tax (A-5121)"
      notice_type: exemption_cert_audit
      root_cause: cert_expired
      assessed_amount: "68500.00"
      days_to_deadline: "21"
      note: "IL exemption-certificate audit on A-5121: the auditor's sample shows roughly 30% of resale/exemption certificates expired or incomplete, driving a $68,500 proposed assessment. Cure rights are commonly honored during the audit window — run a certificate re-solicitation sprint against the flagged customer list and resubmit before the 21-day response date. Precedents on the book: TXN-8007 (FL — cure accepted, $9,400 abated) vs TXN-8015 (CA — certs unrecoverable, paid in full)."
  - row_pk: TXN-9005
    severity: high
    display_projection:
      notice_id: TXN-9005
      account: "Quartz Analytics federal income (A-5124)"
      notice_type: information_mismatch
      root_cause: data_mismatch
      assessed_amount: "38200.00"
      days_to_deadline: "9"
      note: "CP2000-style information mismatch proposing $38,200 on A-5124: the 2025 acquisition of Quartz Analytics produced duplicate information returns under both the legacy and surviving EIN — the same income counted twice by the matching program. Prior mismatch TXN-8008 on this account closed via agency clarification. This is a PROPOSED adjustment, not a final assessment or audit: respond 'disagree' with the EIN-consolidation documentation inside the 9-day remaining window."
  - row_pk: TXN-9006
    severity: medium
    display_projection:
      notice_id: TXN-9006
      account: "Harbor Point Construction CO sales tax (A-5126)"
      notice_type: sales_use_assessment
      root_cause: pending
      assessed_amount: "12750.00"
      days_to_deadline: "14"
      note: "County sales-tax notice for $12,750 on A-5126 matching TXN-8012 — the state assessment for the same periods and base, paid and closed in April. Believed duplicate (root cause pending confirmation): the county appears not to have credited the state-administered filing. Do NOT pay twice — reconcile the state payment record, ask the county to cross-reference it, and respond within the 14-day window so the duplicate cannot go final by default."
