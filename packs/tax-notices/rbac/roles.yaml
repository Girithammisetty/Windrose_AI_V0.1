# Tax-notice-operations role catalog as tenant CUSTOM roles composing the
# Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). Separation of duties: the Tax Notice Analyst logs and triages
# notices and proposes dispositions, the Controversy & Abatement Lead works
# abatements/protests and deeper research (query authoring + export), the
# Sales Tax Specialist owns the multi-state sales/use and certificate surface
# (plus ingestion reads for agency feeds), the Tax Compliance Manager alone
# approves dispositions (responses, payments, and abatement filings are
# four-eyes), and the Tax Governance Auditor reviews everything with no
# case-write power (exam and provenance readiness).
- name: "Tax Notice Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
