# seller-vetting capability pack — Core-neutral edition: marketplace seller
# vetting and counterfeit/IP-enforcement adjudication for e-commerce
# marketplaces, app stores, resale platforms, and B2B marketplaces.
# Installable TODAY against Datacern Core's public APIs via
# packctl/pack-service; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under
# `deferred` — recorded in the install ledger, never faked.
# v2 (no-dummy-data rule): the pack ships ZERO bundled data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not bundled fixtures; eval
# golden sets are curated by the tenant from its own adjudicated review
# history.
pack_manifest: 1
name: seller-vetting
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted marketplace seller vetting and counterfeit/IP-enforcement
  workflow: onboarding KYB verification with INFORM Consumers Act / EU DSA
  trader-traceability awareness, counterfeit takedown triage grounded in
  test-buy and signal-stack evidence, DMCA/trademark claim adjudication that
  weighs first-sale and claim-abuse defenses, linked-account ring detection,
  reinstatement plan-of-action review, a marketplace-integrity KPI semantic
  model and dashboards (enforcement rate, claim-rejection rate, deadline
  runway, GMV at risk, KYB posture), seller-category network analytics,
  INFORM/DMCA/KYB grounding memories, and listing-anomaly + review-outcome
  training pipelines.
categories: [marketplace, trust_safety, counterfeit, ip_enforcement, seller_risk]
regulatory: [inform_consumers_act, dmca, lanham_act, eu_dsa, cpsc, ftc]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/seller_vetting_core.yaml", identity: "seller_vetting_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/marketplace_integrity_center.yaml", identity: "marketplace_integrity_center" }
    - { file: "dashboards/counterfeit_ip_claims.yaml", identity: "counterfeit_ip_claims" }
    - { file: "dashboards/seller_risk_rings.yaml", identity: "seller_risk_rings" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "vetting_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "vetting_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "marketplace_ontology" }
  decision_models:
    - { file: "decisions/ip_claim_expedite.yaml", identity: "ip_claim_expedite" }
    - { file: "decisions/repeat_signal_vetting.yaml", identity: "repeat_signal_vetting" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "enforcement_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Onboarding KYB Verifier, Counterfeit
      Signal-Stack Scorer, IP Claim Evidence Examiner, Ring Linkage Mapper,
      Reinstatement Plan-of-Action Reviewer) require agent-runtime
      graph-module registration (BRD 23 BR-12). This pack specializes the
      existing case-triage + analytics agents via TenantAgentConfig
      prompt_params + tenant-scope RAG grounding instead.
