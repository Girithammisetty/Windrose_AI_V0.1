# underwriting-intake capability pack — Core-neutral edition: commercial
# insurance underwriting submission intake & triage for P&C carriers,
# MGAs/MGUs, wholesale brokers, and E&S markets. Installable TODAY against
# Datacern Core's public APIs via packctl/pack-service; the manifest envelope
# follows BRD 23 (PKG-FR-001/003). Components the current Core cannot
# materialize are declared under `deferred` — recorded in the install ledger,
# never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own triaged history. Appetite statements
# and authority limits are carrier-configured — the pack encodes routing
# process, never a carrier's underwriting guidelines.
pack_manifest: 1
name: underwriting-intake
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted commercial underwriting submission intake and triage:
  clearance-first duplicate blocking (first-in broker holds the market),
  appetite-fit and completeness triage (ACORD apps, currently-valued loss
  runs, SOV/COPE), broker needed-by deadline awareness with renewal-defense
  prioritization, E&S specialty-market referral with documented
  admitted-market declination, declination hygiene with risk-based reasons,
  submission-funnel KPI semantic model and dashboards (accept-to-underwriter
  rate, declination rate, info-request share, appetite/completeness mix,
  deadline runway, broker-tier and premium-band mix), broker-line network
  analytics, clearance/appetite/E&S/cyber-controls/fair-underwriting
  grounding memories, and account-anomaly + triage-outcome training
  pipelines.
categories: [insurance, underwriting, commercial_lines, intake, triage]
regulatory: [state_unfair_trade_practices, surplus_lines_diligent_search, naic_ai_bulletin, fair_underwriting]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/underwriting_core.yaml", identity: "underwriting_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/submission_intake_center.yaml", identity: "submission_intake_center" }
    - { file: "dashboards/appetite_clearance.yaml", identity: "appetite_clearance" }
    - { file: "dashboards/broker_funnel_performance.yaml", identity: "broker_funnel_performance" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "submission_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "submission_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "underwriting_ontology" }
  decision_models:
    - { file: "decisions/submission_intake_routing.yaml", identity: "submission_intake_routing" }
    - { file: "decisions/referral_review_routing.yaml", identity: "referral_review_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Submission Clearance Checker, Appetite Fit
      Scorer, Completeness Chaser, Renewal-Defense Deadline Sentinel)
      require agent-runtime graph-module registration (BRD 23 BR-12). This
      pack specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
