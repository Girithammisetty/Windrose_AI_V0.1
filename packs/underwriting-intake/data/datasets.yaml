# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) — the broker
# submission drop and policy-admin extracts — or file upload.
- identity: uw_submissions
  name: uw-submissions
  # Columns the decision tables and semantic/query filters compare to
  # literals carry their value domains below, so bound tenant data can be
  # checked against what the rules actually match.
  required_columns:
    [submission_id, account_id, broker_name, broker_tier,
     # value domain: commercial_auto | cyber | general_liability | professional | property | workers_comp
     line_of_business,
     segment,
     # value domain: in_appetite | marginal | out_of_appetite | pending
     appetite_fit,
     # value domain: complete | missing_apps | missing_loss_runs | missing_sov
     completeness,
     # value domain: urgent | standard priority bands (only 'urgent' is matched by rule)
     priority_band,
     severity,
     # value domain: open | closed
     status,
     # value domain: the codes in cases/dispositions.yaml
     disposition,
     filed_month, age_days, days_to_deadline, deadline_bucket,
     # value domain: premium bands (program-configured); 'over_500k' is the band the referral table matches
     premium_band,
     # value domain: cleared | duplicate_pending | bor_contested
     clearance_status]
- identity: uw_accounts
  name: uw-accounts
  required_columns:
    [account_id, insured_id, industry, state, tiv_band, loss_history,
     years_in_business, submission_month]
- identity: uw_insureds
  name: uw-insureds
  required_columns:
    [insured_id, insured_name, industry_group, size_tier, prior_carrier_band,
     risk_grade]
