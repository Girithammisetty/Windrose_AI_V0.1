# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) — the broker
# submission drop and policy-admin extracts — or file upload.
- identity: uw_submissions
  name: uw-submissions
  required_columns:
    [submission_id, account_id, broker_name, broker_tier, line_of_business,
     segment, appetite_fit, completeness, priority_band, severity, status,
     disposition, filed_month, age_days, days_to_deadline, deadline_bucket,
     premium_band]
- identity: uw_accounts
  name: uw-accounts
  required_columns:
    [account_id, insured_id, industry, state, tiv_band, loss_history,
     years_in_business, submission_month]
- identity: uw_insureds
  name: uw-insureds
  required_columns:
    [insured_id, insured_name, industry_group, size_tier, prior_carrier_band,
     risk_grade]
