      insured: "Nimbus Data Systems (I-9005)"
      line_of_business: cyber
      appetite_fit: marginal
      completeness: missing_apps
      premium_band: 25k_100k
      days_to_deadline: "7"
      note: "Marginal cyber risk on account A-8026: the application package lacks the MFA/EDR/backup control attestations (missing_apps) — the prior-term submission hit the same gap (SUB-6015, closed request_missing_information). Market practice treats an absent MFA attestation as decline-or-sublimit territory; request the ransomware supplemental before any appetite call"
