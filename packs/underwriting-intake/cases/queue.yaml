# Seeded submission-triage queue: the OPEN submissions from the seed dataset
# become cases so an intake analyst logging in sees a real, pattern-diverse
# worklist on day one — an in-appetite GL renewal missing loss runs, a
# marginal cyber risk with no MFA attestations, a large cat-exposed property
# schedule near capacity, a clearance conflict (second broker on a cleared
# account), a habitual out-of-appetite broker, and a renewal-defense
# submission two days from the broker's needed-by date. due_days=4 keeps
# triage inside the tightest needed-by runways (speed-to-first-touch drives
# hit ratio).
dataset: uw_submissions
due_days: 4
rows:
  - row_pk: SUB-6021
    severity: medium
    display_projection:
      submission_id: SUB-6021
      insured: "Calloway Steel Fabricators (I-9001)"
      line_of_business: general_liability
      appetite_fit: in_appetite
      completeness: missing_loss_runs
      premium_band: 100k_500k
      days_to_deadline: "9"
      note: "In-appetite middle-market GL renewal on account A-8025 via Harborview Brokerage (tier_1), but the file arrived without currently-valued loss runs; account shows moderate loss history and two prior Calloway accounts (A-8001, A-8013) submitted clean through the same broker — request 5-year loss runs (broker historically responsive) and hold the 9-day runway"
