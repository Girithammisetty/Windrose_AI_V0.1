# Typed custom case fields (case-service CASE-FR-022) — the denial / A-R
# work item's real adjudication attributes, typed so the case form validates
# them and decision surfaces read them structurally instead of parsing notes.
# data_type is IMMUTABLE after creation (case-service) — chosen deliberately.
# Names mirror the rcm_denials / rcm_remits binding-contract columns so field
# data and the tenant's bound datasets agree. Enum vocabularies are the ones
# the pack's own worklists and queries already use.
- name: carc_code
  data_type: string
  purpose: both
  field_meta:
    label: "CARC (claim adjustment reason code)"
    required: false
- name: rarc_code
  data_type: string
  purpose: both
  field_meta:
    label: "RARC (remittance advice remark code)"
    required: false
- name: denial_category
  data_type: enum
  purpose: both
  field_meta:
    label: "Denial category (BR-4 class)"
    options: [administrative, coverage, documentation, bundling, timely_filing,
              medical_necessity]
    required: false
- name: appeal_status
  data_type: enum
  purpose: both
  field_meta:
    label: "Appeal status"
    options: [not_appealed, appeal_pending, corrected_resubmit, overturned, upheld]
    required: false
- name: denied_amount
  data_type: float
  purpose: both
  field_meta:
    label: "Denied amount at risk (USD)"
    required: false
- name: payment_variance
  data_type: float
  purpose: both
  field_meta:
    label: "Underpayment variance recovered/at risk (USD)"
    required: false
- name: appeal_deadline_days
  data_type: integer
  purpose: both
  field_meta:
    label: "Payer appeal window — days remaining"
    required: false
