# payer-fwa-siu capability pack (BRD 27) — Core-neutral edition.
# Post-payment Fraud/Waste/Abuse detection + Special Investigations Unit
# workflow for US health payers. Installable TODAY against Datacern Core's
# public APIs via packctl/pack-service; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are
# declared under `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own investigated history.
pack_manifest: 1
name: payer-fwa-siu
version: 2.0.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  Payer-side FWA detection and SIU investigation workflow (BRD 27):
  claim-line FWA screening (upcoding, unbundling per NCCI, phantom billing,
  impossible days), provider peer-group outlier profiles with LEIE exclusion
  status, typed SIU lead and overpayment-review case schemas with
  investigation dispositions and deterministic triage routing, recovery
  tracking, SIU KPI semantic models and dashboards (hit rate, recovered
  dollars, false-positive rate), SIU role catalog, investigation-grounded
  copilot configuration with PHI-redacting guardrails, governed source and
  write-back connectors, and isolation-forest / xgboost detector training
  pipelines.
categories: [insurance, payer, fwa, siu, payment-integrity]
regulatory: [hipaa, hitrust, false_claims_act, glba, doj_referral_std, state_doi_reporting, chain_of_custody]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/fwa_claims.yaml", identity: "fwa_claims" }
    - { file: "semantic/siu_operations.yaml", identity: "siu_operations" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/siu_command_center.yaml", identity: "siu_command_center" }
    - { file: "dashboards/provider_outliers.yaml", identity: "provider_outliers" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "siu_lead_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "siu_case_schemas" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "fwa_ontology" }
  decision_models:
    - { file: "decisions/siu_lead_triage.yaml", identity: "siu_lead_triage" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      FWA-FR-030..070 bespoke recipes (FWA Scorer, Provider Outlier
      Detector, SIU Case Builder, Evidence Gatherer, Prosecution-Referral
      Packet Drafter) require agent-runtime graph-module registration
      (BRD 23 BR-12). This pack specializes the existing case-triage +
      analytics agents via TenantAgentConfig prompt_params + tenant-scope
      RAG grounding instead.
