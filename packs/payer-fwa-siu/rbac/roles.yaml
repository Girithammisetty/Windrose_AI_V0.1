# SIU role catalog (FWA-FR-100) as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Authority chain per BR-1/BR-3: investigators work cases and propose
# dispositions; supervisors approve dispositions, bulk actions, and model
# promotions; auditors get read+export over the audit/chain-of-custody trail.
- name: "SIU Investigator"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.case.execute
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.query.execute
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - dataset.profile.read
    - dataset.lineage.read
    - notification.inbox.read
- name: "SIU Supervisor"
  actions:
    - case.case.read
    - case.case.list
    - case.case.create
    - case.case.update
    - case.case.assign
