# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the SIU workflow needs and the
# exact landing-shape columns it requires; at install the tenant binds it to a
# REAL dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml — the X12 837
# claims extract drop and reference extracts) or file upload.
- identity: fwa_claim_lines
  name: fwa-claim-lines
  required_columns:
    [claim_line_id, claim_id, member_id, provider_npi, provider_specialty,
     service_month,
     # value domain: service_date = ISO date (YYYY-MM-DD) — per-day grain the
     # impossible-day screen aggregates on
     service_date,
     place_of_service, cpt_code, units, billed_amount,
     allowed_amount, paid_amount, diagnosis_code,
     # value domain: fwa_flag = typology labels (e.g. 'unbundling') — matched
     # literally by verified queries
     fwa_flag,
     flagged, fwa_score, member_state]
- identity: fwa_provider_profiles
  name: fwa-provider-profiles
  required_columns:
    [provider_npi, provider_specialty, peer_group, state, claim_line_count,
     total_billed, total_paid, avg_units_per_line, em_level5_share,
     max_visits_single_day, peer_deviation_sigma, leie_status, sanction_count,
     outlier_flag]
- identity: fwa_leads
  name: fwa-leads
  required_columns:
    [lead_id, provider_npi,
     # value domain: lead_source = nightly_scan|data_mining|member_complaint|
     # hotline|leie_refresh — matched literally by the triage table
     lead_source,
     # value domain: fwa_typology = upcoding|unbundling|phantom_billing|
     # impossible_day|kickback_referral_scheme|medical_necessity_abuse —
     # matched literally by the triage table
     fwa_typology,
     fwa_score, exposure_amount,
     # value domain: status — 'open_investigation' and 'referred' are matched
     # literally by semantic filters
     status,
     # value domain: priority = critical|high|medium|low — matched literally
     # by the triage table
     priority,
     opened_month, assigned_to,
     # value domain: outcome — 'confirmed' and 'false_positive' are matched
     # literally by semantic filters and verified queries
     outcome]
- identity: fwa_recoveries
  name: fwa-recoveries
  required_columns:
    [recovery_id, lead_id, provider_npi, recovery_method, demanded_amount,
     recovered_amount, status, recovery_month, cycle_days,
     # value domain: overpayment_identified_date = ISO date (YYYY-MM-DD) —
     # start of the 60-day report-and-return clock (42 CFR 401.305)
     overpayment_identified_date]
