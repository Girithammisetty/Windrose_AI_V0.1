# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# fwa_claim_lines / fwa_provider_profiles / fwa_leads / fwa_recoveries
# binding contracts. Attribute names are drawn strictly from those contracts'
# required_columns so the ontology describes data the install actually binds.
# This is a TYPE registry: entity resolution (BRD 56) resolves the concrete
# provider and member INSTANCES of these types across feeds (e.g. one NPI
# appearing in claims, profiles, and leads) into governed golden records.
- entity_key: provider
  name: "Billing provider"
  description: >-
    The rendering/billing provider (NPI) whose claim patterns are profiled
    against a peer group and screened against the OIG LEIE exclusion list.
  attributes:
    - { name: provider_specialty, data_type: string }
    - { name: peer_group, data_type: string }
    - { name: state, data_type: string }
    - { name: em_level5_share, data_type: float, description: "Share of E/M visits billed at level 5" }
    - { name: max_visits_single_day, data_type: integer }
    - { name: peer_deviation_sigma, data_type: float }
    - { name: leie_status, data_type: string, description: "clear | excluded (OIG LEIE screening)" }
    - { name: sanction_count, data_type: integer }
    - { name: outlier_flag, data_type: string }
  relationships:
    - { name: claim_lines, target: claim_line, cardinality: has_many }
    - { name: leads, target: siu_lead, cardinality: has_many }
    - { name: recoveries, target: recovery, cardinality: has_many }
- entity_key: member
  name: "Plan member"
  description: >-
    The health-plan member on whose behalf services were billed; member
    complaints are a lead source for phantom-billing review.
  attributes:
    - { name: member_state, data_type: string }
  relationships:
    - { name: claim_lines, target: claim_line, cardinality: has_many }
- entity_key: claim_line
  name: "Adjudicated claim line"
  description: >-
    A post-payment claim service line (CPT-coded) carrying billed/allowed/paid
    amounts and any FWA screening flag attached by the detection pipelines.
  attributes:
    - { name: cpt_code, data_type: string }
    - { name: diagnosis_code, data_type: string }
    - { name: service_month, data_type: string }
    - { name: place_of_service, data_type: string }
    - { name: units, data_type: integer }
    - { name: billed_amount, data_type: float }
    - { name: allowed_amount, data_type: float }
    - { name: paid_amount, data_type: float }
    - { name: fwa_flag, data_type: string, description: "none | upcoding | unbundling | phantom_billing | impossible_day" }
    - { name: fwa_score, data_type: float }
  relationships:
    - { name: provider, target: provider, cardinality: belongs_to }
    - { name: member, target: member, cardinality: belongs_to }
- entity_key: siu_lead
  name: "SIU lead"
  description: >-
    A billing-pattern anomaly or allegation routed to the Special
    Investigations Unit for human review — never itself a fraud
    determination; intent is established by investigators and counsel.
  attributes:
    - { name: lead_source, data_type: string }
    - { name: fwa_typology, data_type: string }
    - { name: fwa_score, data_type: float }
    - { name: exposure_amount, data_type: float }
    - { name: status, data_type: string }
    - { name: priority, data_type: string }
    - { name: opened_month, data_type: string }
    - { name: outcome, data_type: string, description: "pending | confirmed | false_positive" }
  relationships:
    - { name: provider, target: provider, cardinality: belongs_to }
    - { name: recoveries, target: recovery, cardinality: has_many }
- entity_key: recovery
  name: "Overpayment recovery action"
  description: >-
    A governed recovery action (payback demand, offset, settlement, education
    letter, prosecution restitution) opened from a confirmed lead, tracked
    from demand through collection.
  attributes:
    - { name: recovery_method, data_type: string }
    - { name: demanded_amount, data_type: float }
    - { name: recovered_amount, data_type: float }
    - { name: status, data_type: string }
    - { name: recovery_month, data_type: string }
    - { name: cycle_days, data_type: integer }
  relationships:
    - { name: lead, target: siu_lead, cardinality: belongs_to }
    - { name: provider, target: provider, cardinality: belongs_to }
