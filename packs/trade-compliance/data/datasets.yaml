# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the trade-compliance workflow
# needs and the exact landing-shape columns it requires; at install the tenant
# binds it to a REAL dataset (explicit dataset_bindings on the install
# request, or same-name reuse), and pack-service validates the bound dataset
# exposes every required column — failing closed with the missing list. Real
# data arrives through the pack's governed source connectors
# (connections/sources.yaml — the broker's ABI/ACE entry-summary drop and the
# GTM/ERP compliance extracts) or file upload.
- identity: tc_trading_partners
  name: tc-trading-partners
  required_columns:
    [partner_id, partner_name, partner_type, country, denied_party_risk,
     ctpat_flag, industry]
- identity: tc_shipments
  name: tc-shipments
  required_columns:
    [shipment_id, importer_id, origin_country, dest_port, lane, mode, value,
     entry_month, broker]
- identity: tc_review_items
  name: tc-review-items
  required_columns:
    [review_id, shipment_id, item_type, product_category,
     declared_hs_chapter, origin_country, destination, valuation_band,
     screening_list, match_score, duty_risk, severity, status, disposition,
     filed_month, age_days, days_to_deadline, deadline_bucket]
