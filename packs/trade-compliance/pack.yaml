# trade-compliance capability pack — Core-neutral edition: customs / trade
# compliance decisioning for the importer and broker side (importers, customs
# brokers, freight forwarders, trade-compliance teams). Installable TODAY
# against Datacern Core's public APIs via packctl/pack-service; the manifest
# envelope follows BRD 23 (PKG-FR-001/003). Components the current Core
# cannot materialize are declared under `deferred` — recorded in the install
# ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: trade-compliance
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted customs and trade-compliance decisioning for US importers,
  customs brokers, and freight forwarders: HS classification review with
  GRI-ordered reasoning and reasonable-care awareness (19 USC 1484),
  denied-party screening adjudication (OFAC SDN, BIS Entity/Denied Persons/
  Unverified lists, DDTC debarred, UFLPA Entity List, 50% rule) with
  evidence-based match clearing, export/dual-use license-determination
  escalation, UFLPA forced-labor admissibility holds,
  origin/transshipment verification, trade-compliance KPI
  semantic model and dashboards (classification correction rate, screening
  false-positive rate, true hits, duty-risk mix, deadline runway, entered
  value by lane/mode), importer-lane sourcing network analytics, customs +
  sanctions grounding memories, and shipment-anomaly + review-outcome
  training pipelines.
categories: [trade, customs, imports, sanctions, compliance]
regulatory: [cbp, htsus, ofac_sdn, bis_entity_list, ear, uflpa]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/trade_core.yaml", identity: "trade_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/trade_command_center.yaml", identity: "trade_command_center" }
    - { file: "dashboards/screening_sanctions.yaml", identity: "screening_sanctions" }
    - { file: "dashboards/classification_duty_risk.yaml", identity: "classification_duty_risk" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "review_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "review_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "trade_ontology" }
  decision_models:
    - { file: "decisions/screening_hit_routing.yaml", identity: "screening_hit_routing" }
    - { file: "decisions/classification_review_routing.yaml", identity: "classification_review_routing" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Classification Copilot with GRI-ordered
      heading analysis, Screening Match Adjudicator, License Determination
      Assistant, Origin Verification Sentinel) require agent-runtime
      graph-module registration (BRD 23 BR-12). This pack specializes the
      existing case-triage + analytics agents via TenantAgentConfig
      prompt_params + tenant-scope RAG grounding instead.
