# Trade-compliance role catalog as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties: the Classification Analyst reviews entries and
# proposes, the Screening Analyst adjudicates denied-party alerts (deeper
# query/export power for evidence work), the Licensing Specialist owns
# export/dual-use license determinations (plus ingestion reads to trace
# source feeds), the Trade Compliance Manager alone approves dispositions
# (holds, corrected entries, and releases are four-eyes), and the Trade
# Audit Lead reviews everything with no case-write power (CBP audit / focused
# assessment readiness).
- name: "Classification Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
