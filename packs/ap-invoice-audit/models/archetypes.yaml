# Governed model blueprints (experiment-service inc9): the intended models this
# vertical runs, independent of any trained artifact. Each corresponds to a
# training pipeline this pack already ships (pipelines/templates.yaml), so the
# blueprint and its implementation stay in one governed pair.
- archetype_key: ap_exception_outcome_scorer
  name: "Exception outcome scorer"
  task_type: classification
  target: disposition
  description: >-
    Supervised scorer over adjudicated exceptions (ap-exceptions): predicts
    the likely disposition from exception type, three-way-match result, fraud
    indicator, amount and deadline runway — the deterministic-first pre-router
    for exception triage. Implemented by the pack's xgboost training pipeline.
  expected_metrics: { f1: 0.80 }
  governance_notes: >-
    Payment-decision relevant: scores order the review queue only — every
    determination (block, release, credit, escalation) remains a four-eyes
    human decision by the AP Controls Manager. Promotion requires eval-gate +
    manager approval.
- archetype_key: ap_invoice_anomaly_detector
  name: "Invoice anomaly detector"
  task_type: anomaly_detection
  target: null
  description: >-
    Unsupervised surface scan over the invoice register (ap-invoices) for
    duplicate resubmissions, threshold-clustered invoice strings and
    new-vendor billing bursts. Implemented by the pack's isolation-forest
    training pipeline.
  expected_metrics: {}
  governance_notes: >-
    Detector output opens review work, never a payment action; flagged
    invoices route to the exception worklist for human investigation.
