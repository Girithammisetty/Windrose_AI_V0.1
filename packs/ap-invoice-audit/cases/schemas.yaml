# Governed typed case schema (case-service inc10): the AP invoice-exception
# work item as a named case TYPE binding the adjudication field set, so intake
# creates a structurally-complete exception case (not a generic case with
# prose notes). Embedded field defs use {name, data_type, label, required};
# names align with cases/fields.yaml and the ap_exceptions binding-contract
# columns.
- schema_key: ap_invoice_exception
  name: "AP invoice exception"
  description: >-
    An accounts-payable invoice exception (duplicate, three-way-match gap,
    price/quantity variance, banking-change or vendor-master anomaly)
    investigated under the company's payment-control framework, with
    payment-run deadline awareness and duplicate/credit recovery follow-up.
  fields:
    - { name: exception_type,    data_type: enum,    label: "Exception type",               required: true }
    - { name: three_way_match,   data_type: enum,    label: "Three-way-match result",       required: false }
    - { name: fraud_indicator,   data_type: enum,    label: "Fraud indicator",              required: false }
    - { name: deadline_bucket,   data_type: enum,    label: "Payment-run deadline bucket",  required: false }
    - { name: days_to_deadline,  data_type: integer, label: "Payment-run clock — days left", required: false }
    - { name: invoice_amount,    data_type: float,   label: "Invoice amount (USD)",         required: true }
    - { name: recovered_amount,  data_type: float,   label: "Recovered amount (USD)",       required: false }
