# Typed custom case fields (case-service CASE-FR-022) — the AP exception work
# item's real adjudication attributes, typed so the case form validates them
# and decision surfaces can read them structurally instead of parsing notes.
# data_type is IMMUTABLE after creation (case-service) — chosen deliberately.
# Names/values mirror the ap_exceptions binding-contract columns
# (data/datasets.yaml); enum options are the closed value sets those columns
# actually carry, so field data and dataset agree.
- name: exception_type
  data_type: enum
  purpose: both
  field_meta:
    label: "Exception type"
    options: [duplicate_invoice, missing_po, missing_receipt, price_variance,
              quantity_mismatch, suspicious_banking_change,
              vendor_master_change, weekend_submission]
    required: false
- name: three_way_match
  data_type: enum
  purpose: both
  field_meta:
    label: "Three-way-match result"
    options: [matched, po_gap, receipt_gap, price_gap]
    required: false
- name: fraud_indicator
  data_type: enum
  purpose: both
  field_meta:
    label: "Fraud indicator"
    options: [none, bec_suspect, shell_vendor_suspect, split_invoicing]
    required: false
- name: deadline_bucket
  data_type: enum
  purpose: both
  field_meta:
    label: "Payment-run deadline bucket"
    options: [0_5_days, 6_15_days, over_15_days, closed]
    required: false
- name: days_to_deadline
  data_type: integer
  purpose: both
  field_meta:
    label: "Payment-run clock — days left"
    required: false
- name: invoice_amount
  data_type: float
  purpose: both
  field_meta:
    label: "Invoice amount (USD)"
    required: false
- name: recovered_amount
  data_type: float
  purpose: both
  field_meta:
    label: "Recovered amount (USD)"
    required: false
