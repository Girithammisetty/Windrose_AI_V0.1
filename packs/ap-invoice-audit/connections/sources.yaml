# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the AP team's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
# These are the feeds that satisfy the pack's dataset binding contracts
# (data/datasets.yaml): the ERP AP subledger extract and the invoice-capture
# (OCR) output drop.
- name: "ERP AP subledger extract drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "erp-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/ap-subledger"
- name: "Invoice-capture feed (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: invoice-capture-exports
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
