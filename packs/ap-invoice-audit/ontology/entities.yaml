# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# ap_vendors / ap_invoices / ap_exceptions binding contracts. Attribute names
# are drawn strictly from the contract columns (data/datasets.yaml) so the
# ontology describes data the bound datasets actually carry.
- entity_key: vendor
  name: Vendor
  description: >-
    A supplier on the vendor master — the surface for shell-vendor and
    banking-change (BEC) schemes, screened via TIN verification, sanctions
    screening and master-data-change history.
  attributes:
    - { name: vendor_name, data_type: string }
    - { name: country, data_type: string }
    - { name: tenure_band, data_type: string, description: "new_under_1y | 1_3_years | over_3_years" }
    - { name: spend_tier, data_type: string }
    - { name: master_data_changes, data_type: string, description: "none | one | multiple" }
    - { name: w9_tin_verified, data_type: string, description: "yes | no" }
    - { name: sanctions_screened, data_type: string, description: "yes | no" }
  relationships:
    - { name: invoices, target: invoice, cardinality: has_many }
- entity_key: invoice
  name: Invoice
  description: >-
    A vendor bill on the AP register, matched against its PO and goods
    receipt within company-configured tolerances before payment.
  attributes:
    - { name: vendor_invoice_no, data_type: string }
    - { name: category, data_type: string }
    - { name: po_flag, data_type: string, description: "yes | no — non-PO invoices lack a three-way-match anchor" }
    - { name: payment_terms, data_type: string }
    - { name: invoice_month, data_type: string }
    - { name: approval_route, data_type: string, description: "auto_approved | single_approver | dual_approver" }
    - { name: currency, data_type: string }
  relationships:
    - { name: vendor, target: vendor, cardinality: belongs_to }
    - { name: exceptions, target: exception, cardinality: has_many }
- entity_key: exception
  name: "AP exception"
  description: >-
    A control exception raised on an invoice (duplicate, match gap, price or
    quantity variance, banking-change or vendor-master anomaly), carrying the
    payment-run clock and the human adjudication outcome.
  attributes:
    - { name: exception_type, data_type: string }
    - { name: three_way_match, data_type: string, description: "matched | po_gap | receipt_gap | price_gap" }
    - { name: fraud_indicator, data_type: string, description: "none | bec_suspect | shell_vendor_suspect | split_invoicing" }
    - { name: severity, data_type: string }
    - { name: status, data_type: string, description: "open | closed" }
    - { name: disposition, data_type: string }
    - { name: age_days, data_type: integer }
    - { name: days_to_deadline, data_type: integer }
    - { name: deadline_bucket, data_type: string }
    - { name: invoice_amount, data_type: float }
  relationships:
    - { name: invoice, target: invoice, cardinality: belongs_to }
    - { name: recovery, target: recovery, cardinality: has_one }
- entity_key: recovery
  name: Recovery
  description: >-
    The dollars recovered or prevented when an exception closes — a blocked
    duplicate before disbursement or a negotiated vendor credit.
  attributes:
    - { name: recovered_amount, data_type: float }
  relationships:
    - { name: exception, target: exception, cardinality: belongs_to }
