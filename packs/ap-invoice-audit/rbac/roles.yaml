# AP exception-audit role catalog as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties: the AP Exception Analyst investigates and proposes,
# the Recovery Audit Analyst digs into duplicates/credits with query
# authoring and export, the Vendor Master Specialist owns vendor-master and
# banking-change verification (ingestion/connection visibility), the AP
# Controls Manager alone approves dispositions (payment blocks and releases
# are four-eyes), and the Internal Controls Auditor reviews everything with
# no case-write power (SOX exam readiness).
- name: "AP Exception Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
