# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous QMS/MES change). The URLs are
# placeholders the tenant replaces; nothing is called at install.
- name: "QMS nonconformance status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://qms.example.invalid/api/v1/nonconformances/status"
    headers: { Content-Type: "application/json" }
- name: "MES lot hold-release status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://mes.example.invalid/api/v1/lots/hold-status"
    headers: { Content-Type: "application/json" }
