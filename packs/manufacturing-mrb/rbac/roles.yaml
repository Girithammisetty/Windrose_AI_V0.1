# Quality-operations role catalog as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties mirrors an MRB charter: the Quality Engineer writes up
# and investigates NCs and proposes dispositions, the MRB Engineering
# Reviewer carries the engineering evaluation (plus ad-hoc query authoring
# and export for stress/justification packages), the Supplier Quality
# Engineer owns the supplier-facing rail (SCARs, incoming data feeds), the
# Quality Manager alone approves dispositions (final MRB closures are
# four-eyes — use-as-is and critical-characteristic closures always carry the
# QM's signature), and the Quality Systems Auditor reviews everything with no
# case-write power (AS9100 / ISO 13485 internal-audit and certification-body
# readiness).
- name: "Quality Engineer"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
