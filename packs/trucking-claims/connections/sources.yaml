# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the tenant's
# expected feeds exist as governed starting points completed with real
# hosts/credentials in Data → Connections. Nothing is polled at install.
# These are the feeds that satisfy the pack's dataset binding contracts:
# claim paperwork (POD exceptions, seal records, reefer downloads, photos)
# lands on the SFTP drop; the TMS shipment/claims/carrier extracts land in S3.
- name: "Claim document drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "claims-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/inbound/claim-documents"
- name: "TMS extract files (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: tms-claims-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
