# Inspection-operations role catalog as tenant CUSTOM roles composing the
# Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). Separation of duties: the Triage Analyst reviews detections
# and proposes, the Field Verification Engineer confirms or refutes
# detections in the field (and feeds the detector-training loop), the
# Vegetation Program Specialist owns the clearance program, the Asset Risk
# Manager alone approves dispositions (immediate dispatch vs deferral is a
# four-eyes decision — deferred-maintenance records are discoverable), and
# the Regulatory Compliance Auditor reviews everything with no case-write
# power (WMP / inspection-cycle audit readiness).
- name: "Inspection Triage Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
