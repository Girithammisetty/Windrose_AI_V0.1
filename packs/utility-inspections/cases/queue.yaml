# Seeded inspection-triage queue: the OPEN findings from the seed dataset
# become cases so an analyst logging in sees a real, pattern-diverse worklist
# on day one — Tier-3 HFTD thermal hotspot, drone-AI shadow artifact,
# Grade-2-style leak in its window, vegetation cluster on a PSPS-history
# circuit, 1960s cast-iron corrosion, and a repeat hotspot after a prior
# monitor decision. due_days=3 keeps triage inside the 2-3 day make-safe
# deadlines on the tightest Tier-3 rows.
