# utility-inspections capability pack — Core-neutral edition: asset-
# inspection finding triage and repair/defer decisioning for electric & gas
# utilities (wildfire-exposed distribution utilities, transmission
# operators, inspection-services firms). Installable TODAY against Windrose
# Core's public APIs via packctl; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are
# declared under `deferred` — recorded in the install ledger, never faked.
pack_manifest: 1
name: utility-inspections
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted inspection-finding triage and repair/defer decisioning for
  electric and gas utilities: drone-AI/LiDAR/infrared/foot-patrol finding
  intake with wildfire risk-zone awareness (HFTD tiers, PSPS-history
  circuits), gas leak-grading practice, false-detection management with the
  field-verification detector-training loop, governed deferral with
  engineering rationale, inspection-program KPI semantic model and
  dashboards (immediate-dispatch rate, false-detection rate, deadline
  runway, risk-zone and detection-source mix), asset/circuit network
  analytics, wildfire-mitigation + leak-grading + NERC grounding memories,
  and asset-anomaly + disposition-scoring training pipelines.
categories: [utilities, energy, inspections, asset_management, wildfire]
regulatory: [wildfire_mitigation_plans, go_95, phmsa_pipeline_safety, nerc_fac_003, state_psc]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/inspections_core.yaml", identity: "inspections_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/inspection_triage_center.yaml", identity: "inspection_triage_center" }
    - { file: "dashboards/wildfire_risk_zones.yaml", identity: "wildfire_risk_zones" }
    - { file: "dashboards/detection_quality_backlog.yaml", identity: "detection_quality_backlog" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "finding_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: guardrails
    reason: >-
      Inspection-domain policies (no work order created, cancelled, or
      deferred without a human determination; deferrals must carry a
      documented engineering rationale and program window; a repeat finding
      on an asset with a prior monitor decision may never be re-monitored
      silently; pattern-of-deferral watch in Tier-3 HFTD zones) require
      guardrail-service / OPA policy materialization, which Core does not
      expose as a pack surface yet. The behavioral core is partially covered
      today by Core invariants: every pack-configured agent is proposal-mode
      with four-eyes approval (agent-runtime), and the agent instructions +
      disposition taxonomy route final repair/defer determinations
      exclusively to human analysts with the Asset Risk Manager as approver.
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Finding Triage Copilot, Deadline & Make-Safe
      Sentinel, False-Detection Screener, Vegetation Clearance Planner,
      Deferral Rationale Builder) require agent-runtime graph-module
      registration (BRD 23 BR-12). This pack specializes the existing
      case-triage + analytics agents via TenantAgentConfig prompt_params +
      tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      Production read connectors (asset registries / GIS: Esri ArcGIS Utility
      Network-class systems; work management: Maximo/SAP PM-class EAM;
      drone/aerial-AI analytics platforms; LiDAR vegetation-analytics
      vendors; SCADA/historian feeds; leak-survey instrument exports) require
      customer credentials and pack-service connector materialization. The
      pack ships seed datasets in the exact landing shape; production
      connectors are configured through the product Data > Connections UI.
  - kind: write_adapters
    reason: >-
      Write adapters (create/schedule/close work orders in the EAM, dispatch
      field crews, update GIS asset condition records, file regulator
      notifications) execute only behind pack-service's materialization
      contract and customer credentials; every such write stays
      proposal-mode with human approval — no autonomous work-order creation,
      deferral, or crew dispatch, ever.
  - kind: eval_sets
    reason: >-
      Golden eval sets (finding triage, false-detection screening,
      deadline-risk ranking, deferral-rationale quality) require
      eval-service write APIs whose action names are not yet in the rbac
      canonical catalog (Core follow-up noted in rbac catalog.go).
  - kind: ontology
    reason: >-
      Ontology registration (Asset, Circuit, District, Finding, Detection,
      WorkOrder, Deferral, RiskZone, InspectionCycle, LeakGrade,
      VegetationSpan, PSPSEvent) awaits pack-service; entity semantics are
      carried today by the inspections_core semantic model and dataset
      schemas.
  - kind: case_schemas
    reason: >-
      Typed case schemas (finding_triage, field_verification, leak_grading,
      vegetation_clearance, deferral_engineering_review) await case-service
      schema materialization; today's cases carry the same fields via
      display_projection + the disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      Model archetypes (finding_disposition_confidence,
      detection_false_positive_score) await experiment-service archetype
      APIs; the scoring capability ships as pipeline seeds instead
      (isolation_forest asset-condition anomaly + xgboost
      finding-disposition scorer) with model-governance expectations noted
      in grounding memories.
  - kind: display_labels
    reason: >-
      Display-label overlays ("Finding", "Make-safe deadline", "HFTD Tier 3",
      "Deferral pending engineering review", entity templates) require the
      BFF label-registry endpoints (BFF-FR-082/088) which are
      pack-service-tier features.
