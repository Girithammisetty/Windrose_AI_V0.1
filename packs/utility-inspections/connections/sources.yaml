# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the utility's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at
# install. These feeds are how the ui-findings / ui-assets / ui-circuits
# binding contracts receive real data.
- name: "Inspection-report drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "inspection-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/inspection-findings"
- name: "Asset-registry extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: utility-asset-registry-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
