# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the furnisher's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
# The SFTP drop is where an e-OSCAR-style ACDV batch export lands as flat
# files — the tenant's integration flattens referrals into the cr-disputes
# landing shape; Core ingests the files, it does not parse the ACDV wire
# format itself.
- name: "Dispute intake batch drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "dispute-intake.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/inbound/dispute-batches"
- name: "Core servicing extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: furnisher-servicing-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
