# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous reporting change). The URLs are
# placeholders the tenant replaces; nothing is called at install.
- name: "CRA dispute response status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://bureau-gateway.example.invalid/api/v1/dispute-responses"
    headers: { Content-Type: "application/json" }
- name: "Servicing platform tradeline status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://core-servicing.example.invalid/api/v1/tradelines/status"
    headers: { Content-Type: "application/json" }
