# credit-disputes capability pack — Core-neutral edition: FCRA credit-
# REPORTING dispute investigation for furnishers and CRAs (banks/lenders as
# furnishers, consumer reporting agencies, debt buyers/collectors, fintech
# servicers). Distinct from the card-disputes pack (Reg E/Z TRANSACTION
# disputes): this pack governs what gets reported about a consumer, not
# whether a charge stands. Installable TODAY against Windrose Core's public
# APIs via packctl; the manifest envelope follows BRD 23 (PKG-FR-001/003).
# Components the current Core cannot materialize are declared under
# `deferred` — recorded in the install ledger, never faked.
pack_manifest: 1
name: credit-disputes
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  AI-assisted FCRA credit-reporting dispute investigation for furnishers and
  CRAs: reinvestigation triage with regulatory-clock awareness (FCRA 611
  30/45-day windows, e-OSCAR ACDV response deadlines, 605B identity-theft
  blocks on a 4-business-day clock), reasonable-investigation depth beyond
  data matching, obsolescence and duplicate-tradeline detection,
  frivolous-dispute handling with documented notice, dispute-operations KPI
  semantic model and dashboards (correction rate, verified-accurate rate,
  deletion rate, identity-theft share, deadline runway, channel mix),
  consumer-creditor network analytics, FCRA/Reg V grounding memories, and
  tradeline-anomaly + dispute-outcome training pipelines.
categories: [banking, credit_reporting, disputes, furnisher, compliance]
regulatory: [fcra, reg_v, cfpb]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/credit_disputes_core.yaml", identity: "credit_disputes_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/dispute_operations_center.yaml", identity: "dispute_operations_center" }
    - { file: "dashboards/fcra_clock_channels.yaml", identity: "fcra_clock_channels" }
    - { file: "dashboards/accuracy_outcomes.yaml", identity: "accuracy_outcomes" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "reinvestigation_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: guardrails
    reason: >-
      Credit-reporting-domain policies (no outcome promised to a consumer
      before the human determination; frivolous closures only with the
      5-business-day notice stating reasons; no verify-accurate response
      without documented record-level evidence — the anti-"data matching
      only" rule; no reinsertion without furnisher certification;
      pattern-of-verification monitoring for CFPB furnisher-accuracy
      scrutiny) require guardrail-service / OPA policy materialization,
      which Core does not expose as a pack surface yet. The behavioral core
      is partially covered today by Core invariants: every pack-configured
      agent is proposal-mode with four-eyes approval (agent-runtime), and
      the agent instructions + disposition taxonomy route final
      determinations exclusively to human investigators with the Dispute
      Operations Manager as approver.
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Reinvestigation Copilot, ACDV Response
      Builder, 605B Block Sentinel, Obsolescence Auditor, Duplicate-
      Tradeline Resolver) require agent-runtime graph-module registration
      (BRD 23 BR-12). This pack specializes the existing case-triage +
      analytics agents via TenantAgentConfig prompt_params + tenant-scope
      RAG grounding instead.
  - kind: connection_templates
    reason: >-
      Production read connectors (e-OSCAR ACDV/AUD feeds; Metro 2 furnishing
      extracts from core banking, card, auto, mortgage, student-loan and
      collections servicing platforms; FTC IdentityTheft.gov report intake;
      credit-monitoring dispute portals; letter-vendor mail intake) require
      customer credentials and pack-service connector materialization. The
      pack ships seed datasets in the exact landing shape; production
      connectors are configured through the product Data > Connections UI.
  - kind: write_adapters
    reason: >-
      Write adapters (answer an ACDV via e-OSCAR, furnish Metro 2
      corrections/deletions to the CRAs, apply or rescind a 605B block, mark
      an account disputed, send the reinvestigation-results and frivolous-
      determination notices) execute only behind pack-service's
      materialization contract and customer credentials; every such write
      stays proposal-mode with human approval — no autonomous change to what
      is reported about a consumer, ever.
  - kind: eval_sets
    reason: >-
      Golden eval sets (reinvestigation triage, deadline-risk ranking,
      reasonable-investigation depth selection, frivolous-determination
      justification quality) require eval-service write APIs whose action
      names are not yet in the rbac canonical catalog (Core follow-up noted
      in rbac catalog.go).
  - kind: ontology
    reason: >-
      Ontology registration (Consumer, Tradeline, Furnisher, CRA, Dispute,
      ACDV, IdentityTheftReport, Block, DeadlineClock, ReinvestigationNotice,
      FrivolousNotice, MixedFile) awaits pack-service; entity semantics are
      carried today by the credit_disputes_core semantic model and dataset
      schemas.
  - kind: case_schemas
    reason: >-
      Typed case schemas (reinvestigation, acdv_response,
      identity_theft_block_review, obsolescence_review,
      duplicate_tradeline_review, frivolous_determination) await
      case-service schema materialization; today's cases carry the same
      fields via display_projection + the disposition taxonomy.
  - kind: model_archetypes
    reason: >-
      Model archetypes (dispute_outcome_confidence,
      tradeline_accuracy_risk_score) await experiment-service archetype
      APIs; the scoring capability ships as pipeline seeds instead
      (isolation_forest tradeline anomaly + xgboost dispute-outcome scorer)
      with model-governance expectations noted in grounding memories.
  - kind: display_labels
    reason: >-
      Display-label overlays ("Reinvestigation", "ACDV", "605B block due",
      "Deadline at risk", entity templates) require the BFF label-registry
      endpoints (BFF-FR-082/088) which are pack-service-tier features.
