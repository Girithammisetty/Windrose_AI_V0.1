# credit-disputes capability pack — Core-neutral edition: FCRA credit-
# REPORTING dispute investigation for furnishers and CRAs (banks/lenders as
# furnishers, consumer reporting agencies, debt buyers/collectors, fintech
# servicers). Distinct from the card-disputes pack (Reg E/Z TRANSACTION
# disputes): this pack governs what gets reported about a consumer, not
# whether a charge stands. Installable TODAY against Datacern Core's public
# APIs via packctl/pack-service; the manifest envelope follows BRD 23
# (PKG-FR-001/003). Components the current Core cannot materialize are
# declared under `deferred` — recorded in the install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases
# arrive from real rows via case triggers/intake, not seeds; eval golden sets
# are curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: credit-disputes
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  AI-assisted FCRA credit-reporting dispute investigation for furnishers and
  CRAs: reinvestigation triage with statutory-clock awareness (the FCRA
  reinvestigation window, e-OSCAR ACDV response deadlines, the
  identity-theft block clock), reasonable-investigation depth beyond data
  matching, obsolescence and duplicate-tradeline detection,
  frivolous-dispute handling with documented notice, dispute-operations KPI
  semantic model and dashboards (correction rate, verified-accurate rate,
  deletion rate, identity-theft share, deadline runway, channel mix),
  consumer-creditor network analytics, FCRA/Reg V grounding memories, and
  tradeline-anomaly + dispute-outcome training pipelines.
categories: [banking, credit_reporting, disputes, furnisher, compliance]
regulatory: [fcra, reg_v, cfpb]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/credit_disputes_core.yaml", identity: "credit_disputes_core" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/dispute_operations_center.yaml", identity: "dispute_operations_center" }
    - { file: "dashboards/fcra_clock_channels.yaml", identity: "fcra_clock_channels" }
    - { file: "dashboards/accuracy_outcomes.yaml", identity: "accuracy_outcomes" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "dispute_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "dispute_schema" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "dispute_ontology" }
  decision_models:
    - { file: "decisions/reinvestigation_triage.yaml", identity: "reinvestigation_triage" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      Bespoke LangGraph recipes (Reinvestigation Copilot, ACDV Response
      Builder, Identity-Theft Block Sentinel, Obsolescence Auditor,
      Duplicate-Tradeline Resolver) require agent-runtime graph-module
      registration (BRD 23 BR-12). This pack specializes the existing
      case-triage + analytics agents via TenantAgentConfig prompt_params +
      tenant-scope RAG grounding instead.
