# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload:
# the furnisher's systems of record for the tradeline book, and the dispute
# intake feeds (direct disputes, CRA referrals, court documents).
- identity: cr_consumers
  name: cr-consumers
  required_columns:
    [consumer_id, consumer_name, state,
     # value domain: prior_disputes — semantic measures compare against 'over_5'
     prior_disputes,
     # value domain: identity_theft_report — yes | no (measures compare 'yes')
     identity_theft_report, credit_monitoring,
     # value domain: litigation_history — yes | no (measures compare 'yes')
     litigation_history]
- identity: cr_tradelines
  name: cr-tradelines
  required_columns:
    [tradeline_id, consumer_id, creditor_name,
     # value domain: account_status — measures compare against
     #   in_collection | charged_off
     account_status, balance_band,
     # value domain: delinquency_history — measures compare against 'late_90_plus'
     delinquency_history, opened_year, furnisher_system]
- identity: cr_disputes
  name: cr-disputes
  required_columns:
    [dispute_id, tradeline_id,
     # value domain: channel — direct | e_oscar_acdv | court_document
     channel,
     # value domain: dispute_reason — wrong_balance | not_mine | identity_theft |
     #   duplicate_tradeline | obsolete_info | paid_in_full
     dispute_reason, tradeline_type,
     # value domain: fcra_flag — standard | identity_theft_block
     fcra_flag,
     # value domain: severity — measures compare against 'high'
     severity,
     # value domain: status — open | closed
     status,
     # value domain: disposition — codes from cases/dispositions.yaml
     #   (correct_tradeline, verify_accurate_as_reported, delete_unverifiable,
     #    escalate_identity_theft_review, expedite_priority_review,
     #    reinsertion_review, close_frivolous_documented)
     disposition, filed_month, age_days, days_to_deadline,
     # value domain: deadline_bucket — 0_5_days | 6_15_days | over_15_days | closed
     deadline_bucket]
