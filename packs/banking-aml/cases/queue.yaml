      party: "Elena Marquez (P-1012)"
      typology: funnel_account
      scenario_rule: many_to_one_rapid_out
      amount_involved: "11400.00"
      age_days: "5"
      note: "Three unrelated ACH senders in 48h followed by a single wire out to MX — funnel-account pattern; KYC refresh overdue (refresh_due), consider EDD alongside triage"
