# AML role catalog (AML-FR-120) as tenant CUSTOM roles composing the Core's
# closed action catalog (rbac never mints new verbs; packctl also creates a
# same-named permission group and binds the role so it's assignable).
# Separation of duties per BRD 30: L1 triages and proposes, L2 investigates
# and assigns, the MLRO alone approves dispositions that convert to SARs
# (BR-1), the Sanctions Analyst owns near-match adjudication, and the Model
# Risk Validator (BR-8, SR 11-7) reviews models without any case-write power.
- name: "AML Analyst L1"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
- name: "AML Investigator L2"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.case.assign
    - case.case.execute
    - case.disposition.read
    - case.disposition.create
    - case.disposition.update
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - chart.chart.list
    - semantic.model.read
    - semantic.model.list
    - semantic.measure.read
    - semantic.compile.execute
    - query.query.read
    - query.query.list
    - query.query.create
    - query.query.execute
    - query.execution.read
    - query.execution.execute
    - query.execution.export
    - dataset.dataset.read
    - dataset.dataset.list
    - dataset.profile.read
    - dataset.lineage.read
    - notification.inbox.read
