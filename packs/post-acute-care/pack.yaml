# post-acute-care capability pack (BRD 29) — Core-neutral edition.
# Installable TODAY against Windrose Core's public APIs via packctl; the
# manifest envelope follows BRD 23 (PKG-FR-001/003). Components today's Core
# cannot materialize are declared under `deferred` with the exact PAC-FR
# requirement they trace to — recorded in the install ledger, never faked.
pack_manifest: 1
name: post-acute-care
version: 1.0.0
publisher: { id: pub-windrose, name: "Windrose Inc." }
description: >-
  Post-acute care AI for home health, SNF, and hospice operators (BRD 29):
  PDGM/PDPM episode and assessment semantic models, network / readmission /
  referral dashboards, care-transition review queues with dispositions,
  post-acute role catalog, domain-grounded copilot configuration, and a
  30-day rehospitalization-risk training pipeline.
categories: [healthcare, post-acute, home-health, snf, hospice, medicare]
regulatory: [hipaa, cms_pdgm, cms_pdpm, oasis_e, mds_3, hospice_lcd, cert_uic_defensible, hitrust]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/episodes.yaml", identity: "episodes" }
    - { file: "semantic/referrals.yaml", identity: "referrals" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/post_acute_network.yaml", identity: "post_acute_network" }
    - { file: "dashboards/readmission_watch.yaml", identity: "readmission_watch" }
    - { file: "dashboards/referral_intake.yaml", identity: "referral_intake" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  cases:
    - { file: "cases/queue.yaml", identity: "care_transition_queue" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
deferred:
  - kind: agent_recipes
    reason: >-
      PAC-FR-030..080 bespoke LangGraph recipes (OASIS Copilot, PDGM Optimizer,
      MDS Copilot, PDPM Optimizer, Referral Triage, Hospice Eligibility)
      require agent-runtime graph-module registration (BRD 23 BR-12). This pack
      specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
  - kind: connection_templates
    reason: >-
      PAC-FR-090 read connectors (HomeCare HomeBase, MatrixCare, PointClickCare,
      Netsmart myUnity, Axxess, WellSky, HL7 ADT via HIE, Bamboo Health,
      HHAeXchange, CMS iQIES) require customer credentials and pack-service
      connector materialization. The pack ships seed datasets in the exact
      landing shape; production connectors are configured through the product
      Data > Connections UI.
  - kind: write_adapters
    reason: >-
      PAC-FR-090 write adapters (OASIS/MDS assessment drafts to EHR, care-plan
      update, referral response, hospice certification narrative) execute only
      behind pack-service's materialization contract and customer credentials;
      all platform-side writes remain proposal-mode per BR-1.
