# post-acute-care capability pack (BRD 29) — Core-neutral edition.
# Installable TODAY against Datacern Core's public APIs via packctl/pack-service;
# the manifest envelope follows BRD 23 (PKG-FR-001/003). Components the current
# Core cannot materialize are declared under `deferred` — recorded in the
# install ledger, never faked.
# v2.0.0 (no-dummy-data rule): the pack ships ZERO seed data — datasets are
# binding CONTRACTS resolved to the tenant's REAL data at install; cases arrive
# from real rows via case triggers/intake, not seeds; eval golden sets are
# curated by the tenant from its own adjudicated history.
pack_manifest: 1
name: post-acute-care
version: 2.1.0
publisher: { id: pub-datacern, name: "Datacern Inc." }
description: >-
  Post-acute care AI for home health, SNF, and hospice operators (BRD 29):
  PDGM/PDPM episode and assessment semantic models, network / readmission /
  referral dashboards, typed referral-triage and episode-review case schemas
  with dispositions, governed referral-routing and episode-escalation
  decision tables, post-acute ontology and role catalog, domain-grounded
  copilot configuration with PHI-redacting guardrails, referral/EHR source
  and write-back connection templates, and a 30-day rehospitalization-risk
  training pipeline with its governed model blueprint.
categories: [healthcare, post-acute, home-health, snf, hospice, medicare]
regulatory: [hipaa, cms_pdgm, cms_pdpm, oasis_e, mds_3, hospice_lcd, cert_uic_defensible, hitrust]
components:
  datasets:
    - { file: "data/datasets.yaml", identity: "datasets" }
  semantic_models:
    - { file: "semantic/episodes.yaml", identity: "episodes" }
    - { file: "semantic/referrals.yaml", identity: "referrals" }
  verified_queries:
    - { file: "queries/verified.yaml", identity: "canonical_questions" }
  saved_queries:
    - { file: "queries/saved.yaml", identity: "saved_queries" }
  dashboards:
    - { file: "dashboards/post_acute_network.yaml", identity: "post_acute_network" }
    - { file: "dashboards/readmission_watch.yaml", identity: "readmission_watch" }
    - { file: "dashboards/referral_intake.yaml", identity: "referral_intake" }
  dispositions:
    - { file: "cases/dispositions.yaml", identity: "dispositions" }
  case_fields:
    - { file: "cases/fields.yaml", identity: "pac_case_fields" }
  case_schemas:
    - { file: "cases/schemas.yaml", identity: "pac_case_schemas" }
  ontology:
    - { file: "ontology/entities.yaml", identity: "pac_ontology" }
  decision_models:
    - { file: "decisions/referral_triage.yaml", identity: "referral_triage" }
    - { file: "decisions/episode_escalation.yaml", identity: "episode_escalation" }
  roles:
    - { file: "rbac/roles.yaml", identity: "roles" }
  agent_configs:
    - { file: "agents/configs.yaml", identity: "agent_configs" }
  guardrails:
    - { file: "agents/guardrails.yaml", identity: "agent_guardrails" }
  memories:
    - { file: "memories/grounding.yaml", identity: "grounding" }
  pipelines:
    - { file: "pipelines/templates.yaml", identity: "pipelines" }
  display_labels:
    - { file: "labels/overrides.yaml", identity: "label_overrides" }
  model_archetypes:
    - { file: "models/archetypes.yaml", identity: "model_blueprints" }
  write_adapters:
    - { file: "connections/write_adapters.yaml", identity: "sor_writeback" }
  connection_templates:
    - { file: "connections/sources.yaml", identity: "source_feeds" }
deferred:
  - kind: agent_recipes
    reason: >-
      PAC-FR-030..080 bespoke LangGraph recipes (OASIS Copilot, PDGM Optimizer,
      MDS Copilot, PDPM Optimizer, Referral Triage, Hospice Eligibility)
      require agent-runtime graph-module registration (BRD 23 BR-12). This pack
      specializes the existing case-triage + analytics agents via
      TenantAgentConfig prompt_params + tenant-scope RAG grounding instead.
