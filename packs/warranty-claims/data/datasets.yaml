# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the workflow needs and the exact
# landing-shape columns it requires; at install the tenant binds it to a REAL
# dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml) or file upload.
- identity: wa_dealers
  name: wa-dealers
  required_columns:
    [dealer_id, dealer_name, region, volume_tier, audit_score_tier,
     claims_per_unit_tier, certified]
- identity: wa_units
  name: wa-units
  required_columns:
    [unit_id, dealer_id, product_line, model_year, warranty_plan, build_batch,
     sale_month, service_visits_band]
- identity: wa_claims
  name: wa-claims
  required_columns:
    [claim_id, unit_id, dealer_id, claim_type, component_system, failure_mode,
     labor_op_band, usage_band, in_warranty, severity, status, disposition,
     deadline_bucket, filed_month, age_days, days_to_deadline, claim_amount,
     adjusted_amount, recovery_amount]
