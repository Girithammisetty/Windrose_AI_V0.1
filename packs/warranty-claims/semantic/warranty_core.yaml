# Semantic model `warranty_core` — OEM warranty-claims KPI catalog
# (approval/denial rates, adjustment share, audit-escalation share, supplier
# recovery, cost per claim, deadline runway, component failure mix),
# expressed in the Core semantic grammar (agg whitelist, equality measure
# filters, derived expr_metric with nullif; join_paths left/many_to_one,
# acyclic chain: claims -> units -> dealers — the proven pv_core shape).
#
# entity.table is main.<safe_relation(dataset name)>; `dataset:` refs are
# rebound to live dataset URNs by packctl at install. Amount columns ingest
# as bronze strings, so numeric measures cast(... as double) (the proven
# claims_core pattern).
name: warranty_core
description: >-
  OEM warranty-claims operations KPI model (dealer/service-network claims
  paid by the manufacturer): claim volumes and backlog aging, disposition
  outcome mix, approval/denial/adjustment rates, dealer audit-escalation
  share, supplier cost recovery, component failure-signal surfaces and
  payment-decision deadline runway — claims joined to the unit-in-operation
  book joined to the dealer network.
definition:
  entities:
    - name: claims
      dataset: wa_claims
      table: main.wa_claims
      primary_key: [claim_id]
      dataset_version_policy: { policy: latest }
    - name: units
      dataset: wa_units
      table: main.wa_units
      primary_key: [unit_id]
      dataset_version_policy: { policy: latest }
    - name: dealers
      dataset: wa_dealers
      table: main.wa_dealers
      primary_key: [dealer_id]
      dataset_version_policy: { policy: latest }
  join_paths:
    - name: claims_units
      from_entity: claims
      to_entity: units
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: unit_id, to_column: unit_id }]
    - name: units_dealers
      from_entity: units
      to_entity: dealers
      join_type: left
      cardinality: many_to_one
      "on": [{ from_column: dealer_id, to_column: dealer_id }]
  dimensions:
    - { name: claim_type, entity: claims, type: categorical, column: claim_type }
    - { name: component_system, entity: claims, type: categorical, column: component_system }
    - { name: failure_mode, entity: claims, type: categorical, column: failure_mode }
    - { name: labor_op_band, entity: claims, type: categorical, column: labor_op_band }
    - { name: usage_band, entity: claims, type: categorical, column: usage_band }
    - { name: in_warranty, entity: claims, type: categorical, column: in_warranty }
    - { name: severity, entity: claims, type: categorical, column: severity }
    - { name: claim_status, entity: claims, type: categorical, column: status }
    - { name: claim_disposition, entity: claims, type: categorical, column: disposition }
    - { name: deadline_bucket, entity: claims, type: categorical, column: deadline_bucket }
    - { name: filed_month, entity: claims, type: categorical, column: filed_month }
    - { name: product_line, entity: units, type: categorical, column: product_line }
    - { name: model_year, entity: units, type: categorical, column: model_year }
    - { name: warranty_plan, entity: units, type: categorical, column: warranty_plan }
    - { name: build_batch, entity: units, type: categorical, column: build_batch }
    - { name: sale_month, entity: units, type: categorical, column: sale_month }
    - { name: service_visits_band, entity: units, type: categorical, column: service_visits_band }
    - { name: dealer_region, entity: dealers, type: categorical, column: region }
    - { name: dealer_volume_tier, entity: dealers, type: categorical, column: volume_tier }
    - { name: audit_score_tier, entity: dealers, type: categorical, column: audit_score_tier }
    - { name: claims_per_unit_tier, entity: dealers, type: categorical, column: claims_per_unit_tier }
    - { name: dealer_certified, entity: dealers, type: categorical, column: certified }
  measures:
    - { name: claim_count, entity: claims, agg: count,
        description: "Number of warranty claims" }
    - { name: open_claim_count, entity: claims, agg: count,
        filters: "status = 'open'",
        description: "Claims still open (adjudication backlog)" }
    - { name: closed_claim_count, entity: claims, agg: count,
        filters: "status = 'closed'",
        description: "Claims closed with a final disposition" }
    - { name: approved_claim_count, entity: claims, agg: count,
        filters: "disposition = 'approve_pay_claim'",
        description: "Claims approved and paid in full to the dealer" }
    - { name: denied_claim_count, entity: claims, agg: count,
        filters: "disposition = 'deny_policy_exclusion'",
        description: "Claims denied on a policy exclusion or evidence gap" }
    - { name: adjusted_claim_count, entity: claims, agg: count,
        filters: "disposition = 'adjust_partial_pay'",
        description: "Claims adjusted — partial payment (trimmed labor ops or goodwill cost-share)" }
    - { name: audit_escalated_count, entity: claims, agg: count,
        filters: "disposition = 'escalate_dealer_audit'",
        description: "Claims escalated to dealer audit (suspected claim padding)" }
    - { name: supplier_recovery_count, entity: claims, agg: count,
        filters: "disposition = 'close_supplier_recovery'",
        description: "Claims paid and closed with cost recovered from the supplier" }
    - { name: goodwill_claim_count, entity: claims, agg: count,
        filters: "claim_type = 'goodwill'",
        description: "Out-of-warranty goodwill assistance requests" }
    - { name: recall_related_claim_count, entity: claims, agg: count,
        filters: "claim_type = 'recall_related'",
        description: "Claims implicating an open safety campaign (recall routing watch)" }
    - { name: replacement_claim_count, entity: claims, agg: count,
        filters: "claim_type = 'replacement'",
        description: "Full component/assembly replacement claims (high-dollar watch)" }
    - { name: out_of_warranty_claim_count, entity: claims, agg: count,
        filters: "in_warranty = 'no'",
        description: "Claims filed outside the warranty term or usage limit" }
    - { name: labor_stacked_claim_count, entity: claims, agg: count,
        filters: "labor_op_band = 'three_plus_ops'",
        description: "Claims billing three or more labor operations (stacking signal)" }
    - { name: powertrain_claim_count, entity: claims, agg: count,
        filters: "component_system = 'powertrain'",
        description: "Powertrain-system claims (early-warning cluster watch)" }
    - { name: avg_claim_age_days, entity: claims, agg: avg,
        expr: "cast(age_days as double)", format: decimal,
        description: "Average claim age in days (cycle time / backlog aging)" }
    - { name: total_claim_amount, entity: claims, agg: sum,
        expr: "cast(claim_amount as double)", format: decimal,
        description: "Total dollars claimed by the dealer network" }
    - { name: avg_claim_amount, entity: claims, agg: avg,
        expr: "cast(claim_amount as double)", format: decimal,
        description: "Average claimed amount (cost per claim, as submitted)" }
    - { name: total_adjusted_amount, entity: claims, agg: sum,
        expr: "cast(adjusted_amount as double)", format: decimal,
        description: "Total dollars actually approved for payment after adjudication" }
    - { name: total_recovered_amount, entity: claims, agg: sum,
        expr: "cast(recovery_amount as double)", format: decimal,
        description: "Total dollars recovered from suppliers via warranty chargebacks" }
    - { name: unit_count, entity: units, agg: count,
        description: "Units in operation (the claims-per-unit denominator)" }
    - { name: extended_plan_unit_count, entity: units, agg: count,
        filters: "warranty_plan = 'extended'",
        description: "Units on an extended warranty plan" }
    - { name: high_service_unit_count, entity: units, agg: count,
        filters: "service_visits_band = '4_plus'",
        description: "Units with four or more service visits (comeback / repeat-repair watch)" }
    - { name: dealer_count, entity: dealers, agg: count,
        description: "Dealers in the service network" }
    - { name: certified_dealer_count, entity: dealers, agg: count,
        filters: "certified = 'yes'",
        description: "Dealers holding current service certification" }
    - { name: elevated_cpu_dealer_count, entity: dealers, agg: count,
        filters: "claims_per_unit_tier = 'elevated'",
        description: "Dealers with claims-per-unit well above peer tier (audit watch)" }
    - { name: claim_approval_rate,
        expr_metric: "approved_claim_count / nullif(closed_claim_count, 0)",
        format: percent,
        description: "Claims approved and paid in full over all closures" }
    - { name: claim_denial_rate,
        expr_metric: "denied_claim_count / nullif(closed_claim_count, 0)",
        format: percent,
        description: "Claims denied on policy exclusion over all closures" }
    - { name: adjustment_share,
        expr_metric: "adjusted_claim_count / nullif(closed_claim_count, 0)",
        format: percent,
        description: "Claims partially paid after adjustment over all closures" }
    - { name: audit_escalation_share,
        expr_metric: "audit_escalated_count / nullif(closed_claim_count, 0)",
        format: percent,
        description: "Closures escalated to dealer audit over all closures" }
    - { name: supplier_recovery_rate,
        expr_metric: "total_recovered_amount / nullif(total_claim_amount, 0)",
        format: percent,
        description: "Dollars recovered from suppliers over dollars claimed" }
