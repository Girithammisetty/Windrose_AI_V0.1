# Dealer & Audit Watch: claim-padding surveillance — regional claim volume,
# audit escalations against the claims-per-unit peer tiers, labor-op
# stacking mix, and the denial trend the audit lead tracks month over month.
name: "Dealer & Audit Watch"
module: insights
semantic_model: warranty_core
description: >-
  Dealer-network integrity posture: claim volume by dealer region, audit
  escalations by claims-per-unit peer tier, labor-op stacking mix, monthly
  denial trend, and per-region claimed vs approved dollars.
tags: [manufacturing, warranty, dealer_audit, claim_padding, pack]
charts:
  - name: "Claim volume by dealer region"
    chart_type: vertical_bar_chart
    description: "Warranty claims by the filing dealer's region"
    config:
      x: { dimension: dealer_region }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Audit escalations by claims-per-unit tier"
    chart_type: vertical_bar_chart
    description: "Dealer-audit escalations against the dealer's claims-per-unit peer tier"
    config:
      x: { dimension: claims_per_unit_tier }
      y: [ { measure: audit_escalated_count, agg_fn: count } ]
    sources: [ { measure: audit_escalated_count } ]
    w: 6
    h: 4
  - name: "Labor-op stacking mix"
    chart_type: pie_chart
    description: "Claims by labor-operation band — three-plus-op claims are the stacking signal"
    config:
      x: { dimension: labor_op_band }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Denial trend"
    chart_type: line_chart
    description: "Policy-exclusion denials by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: denied_claim_count, agg_fn: count } ]
    sources: [ { measure: denied_claim_count } ]
    w: 6
    h: 4
  - name: "Regional integrity grid"
    chart_type: grid_chart
    description: "Claims, denials, audit escalations, claimed and approved dollars by region"
    config:
      columns: [dealer_region, claim_count, denied_claim_count, audit_escalated_count, total_claim_amount, total_adjusted_amount]
      x: { dimension: dealer_region }
      y:
        - { measure: claim_count, agg_fn: count }
        - { measure: denied_claim_count, agg_fn: count }
        - { measure: audit_escalated_count, agg_fn: count }
        - { measure: total_claim_amount, agg_fn: sum }
        - { measure: total_adjusted_amount, agg_fn: sum }
    sources:
      - { measure: claim_count }
      - { measure: denied_claim_count }
      - { measure: audit_escalated_count }
      - { measure: total_claim_amount }
      - { measure: total_adjusted_amount }
    w: 12
    h: 4
