# Warranty Command Center: claim mix by type, payment-decision deadline
# runway, outcome mix, intake trend. Chart families restricted to the
# render-verified set (vertical_bar / grid / pie / line); expr_metric
# measures (rates) are query/NL surfaces, never charted directly.
name: "Warranty Command Center"
module: insights
semantic_model: warranty_core
description: >-
  Top-line warranty operations KPIs: claim volumes by type, payment-decision
  deadline runway on the open book, human disposition outcome mix, monthly
  intake trend, and dollar exposure per claim type.
tags: [manufacturing, warranty, claims, pack]
charts:
  - name: "Claims by type"
    chart_type: vertical_bar_chart
    description: "Claim volume by type (repair, replacement, goodwill, recall-related)"
    config:
      x: { dimension: claim_type }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Deadline runway (open book)"
    chart_type: vertical_bar_chart
    description: "Open claims by days remaining to the dealer-agreement payment decision deadline"
    config:
      x: { dimension: deadline_bucket }
      y: [ { measure: open_claim_count, agg_fn: count } ]
    sources: [ { measure: open_claim_count } ]
    w: 6
    h: 4
  - name: "Disposition outcome mix"
    chart_type: pie_chart
    description: "Approved vs denied vs adjusted vs audit-escalated vs supplier-recovered vs pending"
    config:
      x: { dimension: claim_disposition }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Claim intake by month"
    chart_type: line_chart
    description: "Warranty claim filings trend by filed month"
    config:
      x: { dimension: filed_month }
      y: [ { measure: claim_count, agg_fn: count } ]
    sources: [ { measure: claim_count } ]
    w: 6
    h: 4
  - name: "Claim-type worklist grid"
    chart_type: grid_chart
    description: "Claims, closures, approvals, denials and claimed dollars by type"
    config:
      columns: [claim_type, claim_count, closed_claim_count, approved_claim_count, denied_claim_count, total_claim_amount]
      x: { dimension: claim_type }
      y:
        - { measure: claim_count, agg_fn: count }
        - { measure: closed_claim_count, agg_fn: count }
        - { measure: approved_claim_count, agg_fn: count }
        - { measure: denied_claim_count, agg_fn: count }
        - { measure: total_claim_amount, agg_fn: sum }
    sources:
      - { measure: claim_count }
      - { measure: closed_claim_count }
      - { measure: approved_claim_count }
      - { measure: denied_claim_count }
      - { measure: total_claim_amount }
    w: 12
    h: 4
