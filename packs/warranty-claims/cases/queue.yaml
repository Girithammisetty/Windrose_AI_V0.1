# Seeded warranty-adjudication queue: the OPEN claims from the seed dataset
# become cases so an analyst logging in sees a real, pattern-diverse worklist
# on day one — dealer claim-padding escalation, powertrain build-batch
# cluster (early warning + supplier recovery), out-of-warranty goodwill on a
# fleet account, high-dollar hydraulics replacement with photos pending,
# third-visit repeat-repair comeback, and a recall-adjacent brake claim that
# must route to the safety campaign. due_days=4 keeps triage inside the
# tightest dealer-agreement payment-decision runways (2-6 days).
dataset: wa_claims
due_days: 4
rows:
  - row_pk: CLM-7001
    severity: high
    display_projection:
      claim_id: CLM-7001
      dealer: "Iron Bend Power Systems (D-3004)"
      claim_type: repair
      component_system: electrical
      amount: "2875.00"
      days_to_deadline: "4"
      note: "Sixth electrical claim this window from D-3004 (claims-per-unit ~3x peer tier, audit score 'watch'), again on U-5103 with three-plus stacked labor ops. Track record: CLM-6002 trimmed for unsupported ops, CLM-6007 denied, CLM-6011 and CLM-6019 already escalated to audit. Pattern supports escalate_dealer_audit — but adjudicate this claim on its own diagnostic evidence (harness short, request diagnostic codes + returned harness) before the 4-day payment decision"
  - row_pk: CLM-7002
    severity: high
    display_projection:
      claim_id: CLM-7002
      dealer: "Harborline Equipment (D-3009)"
      claim_type: repair
      component_system: powertrain
      amount: "3480.00"
      days_to_deadline: "15"
      note: "Fourth identical crank-seal leak at under 250 hours on a b2025_q4-batch compact tractor (U-5126) — CLM-6004, CLM-6010 and CLM-6017 were all paid and fully recovered from the seal supplier ($10,320 to date). Early-warning cluster is confirmed: approve-pay the dealer, route cost to supplier chargeback (close_supplier_recovery), and flag engineering containment on the remaining b2025_q4 units in operation"
  - row_pk: CLM-7003
    severity: medium
    display_projection:
      claim_id: CLM-7003
      dealer: "Delta Farm Power (D-3011)"
      claim_type: goodwill
      component_system: powertrain
      amount: "1450.00"
      days_to_deadline: "28"
      note: "Goodwill request on U-5129, a fleet wheel loader out of warranty on hours (over_limit) — premature powertrain wear, $1,450. The fleet account is a loyal multi-unit customer with a clean claim history and documented maintenance; goodwill is discretionary and follows the documented matrix (loyalty, maintenance record, proximity to term) — adjust_partial_pay cost-share is the typical outcome, and the decision needs the Warranty Operations Manager's approval tier"
  - row_pk: CLM-7004
    severity: high
    display_projection:
      claim_id: CLM-7004
      dealer: "Cascade Machinery (D-3003)"
      claim_type: replacement
      component_system: hydraulics
      amount: "6240.00"
      days_to_deadline: "6"
      note: "Highest-dollar item on the open book: full hydraulic cylinder replacement on U-5121 (extended plan, high hours) with three-plus labor ops. Photo evidence of the failed cylinder and the dealer's failure-analysis sheet are still pending — a replacement at this dollar level pays only with documented causal-part evidence. Deadline in 6 days: chase the documentation today and review replace-vs-repair economics before approving"
  - row_pk: CLM-7005
    severity: medium
    display_projection:
      claim_id: CLM-7005
      dealer: "Keystone Valley Machinery (D-3007)"
      claim_type: repair
      component_system: hvac
      amount: "1080.00"
      days_to_deadline: "12"
      note: "Third HVAC compressor claim on the same unit U-5109 (4_plus service visits): CLM-6005 paid 2026-03, CLM-6013 paid 2026-05, identical failure mode now back within weeks. A comeback at this cadence signals misdiagnosis or an upstream root cause (electrical supply, system contamination) — require a documented root-cause diagnostic from the Technical Assessor before paying a third identical repair"
  - row_pk: CLM-7006
    severity: high
    display_projection:
      claim_id: CLM-7006
      dealer: "Lakeshore Equipment Works (D-3012)"
      claim_type: recall_related
      component_system: brakes
      amount: "610.00"
      days_to_deadline: "2"
      note: "Premature brake wear on U-5112, an early-my2026 utility vehicle matching the open safety campaign on that build population (compare CLM-6020, correctly routed to campaign funding). Safety defects are recall-remedy territory — the fix is free of charge regardless of warranty status and the claim must route to the campaign, never be denied as a warranty exclusion. 2-day runway: route today and record the campaign linkage"
