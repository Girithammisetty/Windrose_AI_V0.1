# Disposition taxonomy for the warranty-claim adjudication workflow.
# Categories are the Core's closed set {true_positive,false_positive,benign,
# inconclusive,other} (CASE-FR-020). approve_pay_claim confirms a valid
# covered failure; deny_policy_exclusion records a claim outside coverage
# (with dealer-communicable findings — the note feeds the denial notice);
# adjust_partial_pay trims unsupported labor ops or applies the goodwill
# cost-share matrix; escalate_dealer_audit routes suspected claim padding to
# the audit program (a statistical outlier is a signal, not proof);
# close_supplier_recovery pays the dealer and recovers the cost from the
# responsible supplier via warranty chargeback; escalate_claim_review is the
# NEUTRAL routing outcome for the generic human adjudication and
# enhanced-documentation audit lanes; route_safety_campaign and
# route_quality_engineering are its named siblings — the safety/recall
# campaign queue and the quality-engineering (defect-pattern) queue — so the
# outcome record says WHICH review lane got the claim, not just "a human";
# refer_repurchase_review routes repeat-repair units to repurchase/lemon-law
# evaluation (jurisdiction-specific — the note carries the repair history).
# None of the routing codes implies an approve/deny/pay determination.
- { code: approve_pay_claim,       label: "Approve — pay claim in full (covered failure confirmed)",       category: true_positive,  requires_note: true }
- { code: deny_policy_exclusion,   label: "Deny — policy exclusion or evidence gap",                       category: false_positive, requires_note: true }
- { code: adjust_partial_pay,      label: "Adjust — partial payment (trimmed ops / goodwill cost-share)",  category: other,          requires_note: true }
- { code: escalate_dealer_audit,   label: "Escalate to dealer audit (suspected claim padding)",            category: inconclusive,   requires_note: true }
- { code: close_supplier_recovery, label: "Close — cost recovered from supplier (warranty chargeback)",    category: benign,         requires_note: true }
- { code: escalate_claim_review,   label: "Route to claim review — human adjudication queue",              category: inconclusive,   requires_note: true }
- { code: route_safety_campaign,   label: "Route to safety/recall campaign review",                        category: inconclusive,   requires_note: true }
- { code: route_quality_engineering, label: "Route to quality engineering (defect pattern)",               category: inconclusive,   requires_note: true }
- { code: refer_repurchase_review, label: "Refer to repurchase/lemon-law review",                          category: other,          requires_note: true }
