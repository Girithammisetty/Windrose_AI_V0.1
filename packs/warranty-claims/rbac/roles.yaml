# Warranty-operations role catalog as tenant CUSTOM roles composing the
# Core's closed action catalog (rbac never mints new verbs; packctl also
# creates a same-named permission group and binds the role so it's
# assignable). Separation of duties: the Warranty Claims Analyst adjudicates
# and proposes, the Technical Assessor handles diagnostic/root-cause and
# comeback escalations, the Supplier Recovery Specialist owns warranty
# chargebacks to suppliers, the Warranty Operations Manager alone approves
# dispositions (denials, goodwill and supplier debits are four-eyes), and
# the Warranty Audit Lead reviews everything with no case-write power
# (dealer-audit and financial-control readiness).
- name: "Warranty Claims Analyst"
  actions:
    - case.case.read
    - case.case.list
    - case.case.update
    - case.disposition.read
    - case.disposition.create
    - ai.proposal.read
    - ai.proposal.list
    - ai.proposal.approve
    - ai.agent_session.read
    - ai.agent_session.list
    - ai.agent_session.create
    - ai.agent_session.execute
    - memory.memory.read
    - chart.dashboard.read
    - chart.dashboard.list
    - chart.chart.read
    - semantic.model.read
    - semantic.compile.execute
    - query.query.read
    - query.execution.read
    - query.execution.execute
    - dataset.dataset.read
    - notification.inbox.read
