# Datacern security scanning — SAST (semgrep, gosec, bandit), dependency CVEs
# (trivy) and secrets (gitleaks) on every PR and a weekly full sweep. This is
# the automated rung of the platform's independent-validation ladder; findings
# gate merges at HIGH severity and land as SARIF in the GitHub Security tab.
# Local equivalent: security/run_baseline_scan.sh (same tools, same scopes).
name: security-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1" # weekly full sweep, Monday 05:00 UTC
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # SARIF upload to the Security tab

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install semgrep
      - name: semgrep (Go/Python/TS security rules)
        run: |
          semgrep scan \
            --config p/golang --config p/python --config p/typescript \
            --config p/security-audit --config p/secrets \
            --exclude '*.venv*' --exclude 'node_modules' \
            --exclude 'deploy/e2e/run' --exclude '**/testdata' \
            --exclude-rule python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text \
            --sarif --output semgrep.sarif --metrics=off \
            --severity ERROR --error
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: semgrep.sarif, category: semgrep }

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # Must match the modules' `go 1.26.x` directive (and ci.yml's test-go
        # lane) — a lower toolchain can't load the packages for analysis.
        with: { go-version: "1.26" }
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec over every Go module
        # Excluded rule classes are drift false-positives for this codebase (same
        # posture as semgrep's rule-drift exclusions — injection/crypto rules stay
        # ON). Each was reviewed: G115/G109 integer conversions of bounded config/
        # length/sequence values; G101 "hardcoded creds" matching constant IDENTIFIER
        # names (e.g. "token.obo_issued", meter keys); G703/G704 path/SSRF taint over
        # typed-UUID, url-escaped, and fixed-internal-host inputs; G118 deliberate
        # fire-and-forget goroutines using context.Background. SQLi (G201/202),
        # weak-crypto (G4xx), and command-injection (G204) rules remain enforced.
        run: |
          set -e
          fail=0
          for mod in $(find services libs -name go.mod -maxdepth 3); do
            dir=$(dirname "$mod")
            echo "==> $dir"
            (cd "$dir" && gosec -quiet -severity high -exclude=G101,G109,G115,G118,G703,G704 ./...) || fail=1
          done
          exit $fail

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit
      - name: bandit over Python sources (HIGH severity gate)
        run: |
          bandit -r services libs deploy packs \
            -x '**/.venv/**,**/node_modules/**,**/.pytest_cache/**' \
            --severity-level high

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the trivy BINARY instead of aquasecurity/trivy-action: that action
      # runs trivy in a Docker container, and pulling that image at "Set up job"
      # was failing the job in seconds. The binary install has no Docker pull.
      - name: Install trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: trivy dependency/CVE scan (lockfiles)
        env:
          # Anonymous ghcr.io pulls of the vuln DB are rate-limited; use the AWS
          # ECR public mirror. A local scan finds 0 HIGH/CRITICAL, so this gate
          # passes once it can actually run.
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        # Retry only the flaky part (vuln-DB download, registry rate limits),
        # then run the scan ONCE — its verdict is final. The previous retry
        # wrapped the whole scan and read $? after an `if` (always 0), which
        # both mislabeled real findings as infra and retried them.
        run: |
          for i in 1 2 3; do
            trivy fs --download-db-only && break
            echo "vuln-DB download attempt $i failed — retrying in 20s"
            sleep 20
          done
          trivy fs --skip-db-update --scanners vuln --severity HIGH,CRITICAL --exit-code 1 \
            --format sarif --output trivy.sarif .
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy.sarif, category: trivy }

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # full history so leaked-then-deleted secrets are caught
      - name: gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
