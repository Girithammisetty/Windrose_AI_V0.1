# Default role -> action matrix for the 10 system roles (RBC-FR-024).
# Derived from V1 role/permission intent; one row per binding, reviewed seed data.
#
# V1 -> V2 role-name mapping (RBC-FR-020; names otherwise preserved verbatim):
#   Admin                  -> Admin
#   Use case Admin         -> Use case Admin
#   IDO User               -> Data User        (renamed)
#   Model Builder          -> Model Builder
#   Data Integration User  -> Data Integration User
#   Insights User          -> Insights User
#   Insights Ad-Hoc User   -> Insights Ad-Hoc User
#   Case Analyst           -> Case Analyst
#   Case Manager           -> Case Manager
#   Case Executive         -> Case Executive
#
# NOTE: "Admin" (tenant admin) bypasses action checks via the projection admin
# flag (RBC-FR-041, BR-7); its explicit bindings below exist only so that
# explain-chains and the SQL fallback ground truth stay readable.
roles:
  - name: Admin
    actions:
      # In-app inbox + own notification preferences (every human persona).
      - notification.inbox.read
      - notification.preference.read
      - notification.preference.update
      - rbac.workspace.read
      - rbac.workspace.list
      - rbac.workspace.create
      - rbac.workspace.update
      - rbac.workspace.admin
      - rbac.group.read
      - rbac.group.list
      - rbac.group.create
      - rbac.group.update
      - rbac.group.delete
      - rbac.group.assign
      - rbac.role.read
      - rbac.role.list
      - rbac.role.create
      - rbac.role.update
      - rbac.role.delete
      - rbac.grant.read
      - rbac.grant.list
      - rbac.grant.create
      - rbac.grant.delete
      - rbac.grant.share
      - identity.user.read
      - identity.user.list
      - identity.user.admin
      - identity.service_account.admin
      - identity.credential.read
      - identity.tenant.read
      - identity.tenant.update
      - identity.tenant.admin
      - audit.log.read
      - audit.log.list
      - audit.log.export
      - usage.report.read
      - usage.report.list
      - usage.budget.read
      - usage.budget.update
      # Operator views/controls (tenant-scoped): query stats/limits, realtime
      # connection ops, tool-plane administration. (Admin bypasses checks via
      # the projection admin flag; bindings kept for explain-chain readability.)
      - query.stats.read
      - query.limits.read
      - query.limits.update
      - realtime.connection.admin
      - tool.tool.read
      - tool.tool.create
      - tool.tool.update
      - tool.tool.delete
      - tool.enablement.update
      - tool.kill.create
      - tool.kill.delete
      - tool.byo.create
      - tool.byo.approve
      # eval-service (Tier 2a): explicit for explain-chain readability, same
      # as every other Admin binding — Admin itself bypasses via the
      # projection admin flag. READ-ONLY subset for now: eval.dataset.write,
      # eval.suite.write, eval.case.curate, eval.canary.manage, eval.slo.operator
      # are real actions eval-service's own routes require, but their verbs
      # (write/curate/manage/operator) aren't in rbac's closed verb set
      # (domain.AllVerbs: read/list/create/update/delete/execute/assign/
      # approve/admin/export/share) — eval-service predates that grammar and
      # was never fixed. Binding them here would fail EnsureSystemRoles at
      # boot. Flagged as a follow-up: rename eval-service's action verbs to
      # the closed set (its own registration.py + require() calls), or
      # relax the grammar — a real decision, not made here.
      - eval.run.read
      - eval.run.execute
      - eval.case.read
      - eval.dataset.read
      - eval.gate.read
      - eval.scorer.admin
      - eval.slo.read
      - eval.trends.read
      # ai-gateway admin (Tier 2a): LLM-infra control plane (providers,
      # routing ladders, ai-gateway's OWN spend budgets — distinct from
      # usage.budget.* above, virtual keys, guardrails). READ-ONLY subset for
      # now — same closed-verb-grammar issue as eval-service above:
      # ai.provider.write, ai.ladder.write, ai.budget.write, ai.key.write,
      # ai.guardrail.write, ai.cache.invalidate all use non-conforming verbs.
      - ai.provider.read
      - ai.ladder.read
      - ai.budget.read
      - ai.spend.read
      - ai.key.read
      - ai.guardrail.read
      - ai.platform.admin

