name: windrose-dev
services:
  postgres:
    # pgvector image (superset of postgres:16) — memory/semantic/tool-plane/agent-runtime
    # need the `vector` extension at runtime; drop-in replacement for postgres:16-alpine.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: windrose
      POSTGRES_PASSWORD: windrose_dev
      POSTGRES_DB: windrose
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_connections=500"]
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windrose"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda start --overprovisioned --smp 1 --memory 1G --reserve-memory 0M
        --node-id 0 --check=false
        --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
        --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports: ["9092:9092", "8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: windrose
      POSTGRES_PWD: windrose_dev
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8233:8080"]

  # --- Real object storage (S3 API) ---
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: windrose
      MINIO_ROOT_PASSWORD: windrose_dev
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 windrose windrose_dev &&
      mc mb -p local/windrose-datasets local/windrose-warehouse local/windrose-profiles local/windrose-uploads local/windrose-ml &&
      echo 'buckets ready'"

  # --- Real Iceberg REST catalog (backed by MinIO) ---
  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.2
    depends_on:
      minio: { condition: service_healthy }
    environment:
      CATALOG_WAREHOUSE: s3://windrose-warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      # Persistent file-backed sqlite JDBC catalog on a named volume instead of
      # the fixture's default IN-MEMORY sqlite — otherwise every iceberg-rest
      # restart wipes ALL table registrations (namespaces go empty) and breaks
      # the whole data-read plane (resolve / query-service / charts / pipeline
      # dataset inputs) even though the parquet stays in MinIO. (The fixture image
      # only bundles the sqlite JDBC driver, not postgres.) Auto-inits its
      # metadata tables on first boot.
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:sqlite:/persist/iceberg_catalog.db
      CATALOG_JDBC_INIT__CATALOG__TABLES: "true"
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: windrose
      AWS_SECRET_ACCESS_KEY: windrose_dev
    volumes: ["icebergdata:/persist"]
    ports: ["8181:8181"]

  # --- Real Trino query engine (task #66): the official image ships a
  # working single-node coordinator+worker default config out of the box —
  # only the Iceberg catalog needs mounting. Reads the shared Iceberg REST
  # catalog DIRECTLY (no per-execution materialization, unlike the DuckDB
  # engine) — this is query-service's "default_large" engine per router.go.
  trino:
    image: trinodb/trino:482
    depends_on:
      iceberg-rest: { condition: service_started }
      minio: { condition: service_healthy }
    volumes: ["./trino/catalog:/etc/trino/catalog:ro"]
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 5s
      retries: 40
      start_period: 30s

  # --- Real policy engine (loads rbac's Rego bundle at dev time) ---
  opa:
    image: openpolicyagent/opa:1.4.2
    command: ["run", "--server", "--addr=0.0.0.0:8281", "--log-level=error", "/policy"]
    volumes: ["../services/rbac-service/policy:/policy:ro"]
    ports: ["8281:8281"]

  # --- Real secrets (Vault dev mode = real Vault API) ---
  vault:
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: windrose_dev_root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]

  # --- Real ML experiment tracking + model registry (wave 4) ---
  mlflow-init:
    image: postgres:16-alpine
    depends_on:
      postgres: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - >
        PGPASSWORD=windrose_dev psql -h postgres -U windrose -tc
        "SELECT 1 FROM pg_database WHERE datname='mlflow'" | grep -q 1 ||
        PGPASSWORD=windrose_dev createdb -h postgres -U windrose mlflow

  mlflow:
    # v3.14 matches the mlflow>=3.11 client pin (CVE remediation 2026-07);
    # server auto-migrates the 2.x postgres schema on first boot.
    image: ghcr.io/mlflow/mlflow:v3.14.0
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      mlflow-init: { condition: service_completed_successfully }
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: windrose
      AWS_SECRET_ACCESS_KEY: windrose_dev
    command:
      - bash
      - -c
      - >
        pip install --no-cache-dir psycopg2-binary boto3 >/tmp/pipe.log 2>&1 &&
        mlflow server --host 0.0.0.0 --port 5000
        --backend-store-uri postgresql://windrose:windrose_dev@postgres:5432/mlflow
        --artifacts-destination s3://windrose-ml/mlflow --serve-artifacts
    ports: ["5500:5000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      retries: 30

  # --- Real search/index for case triage (list/search/facets) ---
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Windrose_dev_123
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports: ["9200:9200"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      retries: 30

  # --- Real append-only audit store (7-year WORM trail) ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: windrose
      CLICKHOUSE_PASSWORD: windrose_dev
      CLICKHOUSE_DB: audit
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    # Container ceiling sits ABOVE ClickHouse's own 1.5 GiB tracker (see
    # clickhouse/config.d/memory-limits.xml). Untracked allocations + page
    # cache count toward the cgroup, so leave headroom: CH self-limits and
    # rejects queries instead of the kernel OOM-killing the server (exit 137),
    # which used to freeze the BYO SIEM audit-export watermark.
    mem_limit: 2560m
    volumes:
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ports: ["8123:8123", "9010:9000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      retries: 30

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["./otel-collector.yaml:/etc/otel/config.yaml:ro"]
    ports: ["4317:4317", "4318:4318"]

  # --- Real local SMTP sink (email capture) — notification-service's email
  # channel connects here (SMTP :1025); the captured mail is browsable + query-
  # able via the web UI / REST API on :8025. Real adapter on real local infra
  # (the same pattern as MinIO for S3): notification sends real SMTP, mailpit
  # accepts and stores it instead of relaying to the internet.
  mailpit:
    image: axllent/mailpit:v1.20
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports: ["1025:1025", "8025:8025"]
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      retries: 20

volumes:
  pgdata: {}
  miniodata: {}
  icebergdata: {}
