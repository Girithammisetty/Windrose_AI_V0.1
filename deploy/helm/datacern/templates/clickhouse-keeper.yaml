{{- /*
ClickHouse Keeper (drop-in ZooKeeper-protocol coordinator) for a real,
Keeper-coordinated multi-replica ClickHouse cluster (B9: HA ClickHouse for
audit-service's append-only WORM store). Renders NOTHING unless
clickhouse.ha.enabled is set — the default/dev/single-node path
(deploy/k8s/data-tier/search-audit.yaml's plain-kubectl single-node ClickHouse
StatefulSet, applied outside this chart) is completely untouched either way.

AUTHORED + `helm lint` / `helm template` VALIDATED ONLY. There is no
multi-node k8s cluster available to actually apply this against in this
environment — treat it as reviewed IaC, not a live-proven deployment. Anyone
turning this on for real should first prove out a Keeper quorum against a
throwaway cluster (kind/k3d) before pointing a production audit-service at it.

Each Keeper pod needs a unique numeric server_id matching the position it
holds in every pod's shared raft_configuration. Pod ordinals in a StatefulSet
are stable and predictable (<name>-0, <name>-1, ...), so a single initContainer
derives server_id = ordinal+1 from $HOSTNAME at boot and writes it as a
config.d override — the StatefulSet pod template itself is identical across
replicas (a k8s requirement); only the initContainer's runtime output differs
per pod.
*/}}
{{- if .Values.clickhouse.ha.enabled }}
{{- $root := . -}}
{{- $keeper := .Values.clickhouse.ha.keeper -}}
{{- $keeperReplicas := int $keeper.replicas -}}
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-keeper-headless
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-keeper
    app.kubernetes.io/component: coordination
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: clickhouse-keeper
  ports:
    - { name: client, port: 2181, targetPort: 2181 }
    - { name: raft, port: 9444, targetPort: 9444 }
    - { name: prometheus, port: 9363, targetPort: 9363 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-keeper
data:
  keeper_config.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <keeper_server>
        <tcp_port>2181</tcp_port>
        <log_storage_path>/var/lib/clickhouse-keeper/coordination/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/coordination/snapshots</snapshot_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
          <raft_logs_level>information</raft_logs_level>
        </coordination_settings>
        <raft_configuration>
          {{- range $i, $e := until $keeperReplicas }}
          <server>
            <id>{{ add $i 1 }}</id>
            <hostname>clickhouse-keeper-{{ $i }}.clickhouse-keeper-headless.{{ $root.Release.Namespace }}.svc.cluster.local</hostname>
            <port>9444</port>
          </server>
          {{- end }}
        </raft_configuration>
      </keeper_server>
      <prometheus>
        <endpoint>/metrics</endpoint>
        <port>9363</port>
        <metrics>true</metrics>
        <events>true</events>
      </prometheus>
    </clickhouse>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-keeper
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-keeper
    app.kubernetes.io/component: coordination
spec:
  serviceName: clickhouse-keeper-headless
  replicas: {{ $keeperReplicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse-keeper
  template:
    metadata:
      labels:
        {{- include "datacern.labels" $root | nindent 8 }}
        app.kubernetes.io/name: clickhouse-keeper
        app.kubernetes.io/component: coordination
    spec:
      serviceAccountName: {{ include "datacern.serviceAccountName" $root }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Every pod's raft peer list must agree on membership before quorum forms,
      # so all replicas come up together rather than one-at-a-time.
      initContainers:
        - name: gen-server-id
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              ordinal="${HOSTNAME##*-}"
              id=$((ordinal + 1))
              mkdir -p /generated
              cat > /generated/server-id.xml <<EOF
              <clickhouse>
                <keeper_server>
                  <server_id>${id}</server_id>
                </keeper_server>
              </clickhouse>
              EOF
          volumeMounts:
            - { name: generated-config, mountPath: /generated }
      containers:
        - name: keeper
          image: {{ $keeper.image }}
          command: ["clickhouse-keeper"]
          args:
            - --config-file=/etc/clickhouse-keeper/keeper_config.xml
          ports:
            - { name: client, containerPort: 2181 }
            - { name: raft, containerPort: 9444 }
            - { name: prometheus, containerPort: 9363 }
          readinessProbe:
            tcpSocket: { port: 2181 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $keeper.resources | nindent 12 }}
          volumeMounts:
            - { name: keeper-config, mountPath: /etc/clickhouse-keeper/keeper_config.xml, subPath: keeper_config.xml, readOnly: true }
            - { name: generated-config, mountPath: /etc/clickhouse-keeper/config.d/server-id.xml, subPath: server-id.xml, readOnly: true }
            - { name: keeper-data, mountPath: /var/lib/clickhouse-keeper }
      volumes:
        - name: keeper-config
          configMap:
            name: clickhouse-keeper-config
        - name: generated-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: keeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with $keeper.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ $keeper.storageSize }}
{{- end }}
