{{- /*
Multi-replica, Keeper-coordinated ClickHouse StatefulSet (B9: HA for
audit-service's append-only WORM store, services/audit-service/internal/
chstore/chstore.go). Renders NOTHING unless clickhouse.ha.enabled is set —
the default/dev/single-node path (deploy/k8s/data-tier/search-audit.yaml's
plain-kubectl single-node ClickHouse StatefulSet + ClusterIP Service, applied
outside this chart) is completely untouched either way: this template adds a
NEW, separately-named StatefulSet/Service pair (clickhouse-ha*), it does not
modify or replace the existing single-node `clickhouse` resources.

AUTHORED + `helm lint` / `helm template` VALIDATED ONLY — there is no
multi-node k8s cluster available in this environment to actually apply it
against. Treat this as reviewed IaC, not a live-proven HA deployment. Once
this is live, point audit-service at it via (values.yaml):
  clickhouse:
    addrs: [clickhouse-ha-0.clickhouse-ha-headless...:9000, clickhouse-ha-1...:9000, clickhouse-ha-2...:9000]
    replicated: true
    ha: { enabled: true, replicas: 3 }
which sets CLICKHOUSE_ADDRS + CLICKHOUSE_REPLICATED on audit-service
(templates/deployment.yaml) so its Migrate() creates the audit_events table as
ReplicatedReplacingMergeTree instead of the single-node ReplacingMergeTree.

Every node needs the SAME <zookeeper> (Keeper ensemble) config but a
DIFFERENT <macros><replica> value (shard is fixed at "01": this is one
logical shard replicated N ways, not sharded — matches chstore.go's
'/clickhouse/tables/{shard}/audit_events' path, which only ever needs one
shard for audit-service's write volume). Pod ordinals in a StatefulSet are
stable and predictable (<name>-0, <name>-1, ...), so the per-ordinal macros
are pre-rendered into one ConfigMap keyed by ordinal (Helm `range` over
clickhouse.ha.replicas) and a startup initContainer picks its own entry by
parsing $HOSTNAME — the pod template itself must be identical across
replicas (a k8s requirement), only the initContainer's runtime selection
differs per pod.
*/}}
{{- if .Values.clickhouse.ha.enabled }}
{{- $root := . -}}
{{- $ha := .Values.clickhouse.ha -}}
{{- $replicas := int $ha.replicas -}}
{{- $keeperReplicas := int $ha.keeper.replicas -}}
---
# Headless: stable per-pod DNS (clickhouse-ha-0.clickhouse-ha-headless, ...)
# so Keeper-registered replica addresses resolve, and so audit-service's
# CLICKHOUSE_ADDRS can name each pod directly.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-ha-headless
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-ha
    app.kubernetes.io/component: audit-store
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: clickhouse-ha
  ports:
    - { name: http, port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
---
# Load-balanced ClusterIP for any client that just wants "a" replica (e.g. ad
# hoc `clickhouse-client` debugging) — additive, does not replace the
# existing single-node `clickhouse` Service in deploy/k8s/data-tier.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-ha
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-ha
    app.kubernetes.io/component: audit-store
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse-ha
  ports:
    - { name: http, port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-ha-common-config
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-ha
data:
  listen.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
    </clickhouse>
  zookeeper.xml: |
    <clickhouse>
      <zookeeper>
        {{- range $i, $e := until $keeperReplicas }}
        <node>
          <host>clickhouse-keeper-{{ $i }}.clickhouse-keeper-headless.{{ $root.Release.Namespace }}.svc.cluster.local</host>
          <port>2181</port>
        </node>
        {{- end }}
      </zookeeper>
      <distributed_ddl>
        <path>/clickhouse/task_queue/ddl</path>
      </distributed_ddl>
    </clickhouse>
  memory-limits.xml: |
    <clickhouse>
        <max_server_memory_usage_to_ram_ratio>0.6</max_server_memory_usage_to_ram_ratio>
        <mark_cache_size>268435456</mark_cache_size>
        <uncompressed_cache_size>268435456</uncompressed_cache_size>
    </clickhouse>
---
# One macros.xml per pod ordinal, all pre-rendered here; the StatefulSet's
# initContainer (below) picks its own key at runtime by parsing $HOSTNAME.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-ha-macros
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-ha
data:
  {{- range $i, $e := until $replicas }}
  macros-{{ $i }}.xml: |
    <clickhouse>
      <macros>
        <shard>01</shard>
        <replica>clickhouse-ha-{{ $i }}</replica>
      </macros>
    </clickhouse>
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-ha
  labels:
    {{- include "datacern.labels" $root | nindent 4 }}
    app.kubernetes.io/name: clickhouse-ha
    app.kubernetes.io/component: audit-store
spec:
  serviceName: clickhouse-ha-headless
  replicas: {{ $replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse-ha
  template:
    metadata:
      labels:
        {{- include "datacern.labels" $root | nindent 8 }}
        app.kubernetes.io/name: clickhouse-ha
        app.kubernetes.io/component: audit-store
    spec:
      serviceAccountName: {{ include "datacern.serviceAccountName" $root }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Selects this pod's pre-rendered macros-<ordinal>.xml (ConfigMap
        # above, keyed by ordinal) by parsing its own $HOSTNAME — StatefulSet
        # pod names are the predictable <name>-<ordinal> pattern.
        - name: select-macros
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              ordinal="${HOSTNAME##*-}"
              mkdir -p /generated
              cp "/macros-src/macros-${ordinal}.xml" /generated/macros.xml
          volumeMounts:
            - { name: macros-src, mountPath: /macros-src, readOnly: true }
            - { name: generated-config, mountPath: /generated }
      containers:
        - name: clickhouse
          image: {{ $ha.image }}
          env:
            - { name: CLICKHOUSE_USER, value: datacern }
            - { name: CLICKHOUSE_PASSWORD, value: datacern_dev }
            - { name: CLICKHOUSE_DB, value: audit }
            - { name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT, value: "1" }
          ports:
            - { name: http, containerPort: 8123 }
            - { name: native, containerPort: 9000 }
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml $ha.resources | nindent 12 }}
          volumeMounts:
            - { name: chdata, mountPath: /var/lib/clickhouse }
            - { name: common-config, mountPath: /etc/clickhouse-server/config.d/listen.xml, subPath: listen.xml, readOnly: true }
            - { name: common-config, mountPath: /etc/clickhouse-server/config.d/zookeeper.xml, subPath: zookeeper.xml, readOnly: true }
            - { name: common-config, mountPath: /etc/clickhouse-server/config.d/memory-limits.xml, subPath: memory-limits.xml, readOnly: true }
            - { name: generated-config, mountPath: /etc/clickhouse-server/config.d/macros.xml, subPath: macros.xml, readOnly: true }
      volumes:
        - name: common-config
          configMap:
            name: clickhouse-ha-common-config
        - name: macros-src
          configMap:
            name: clickhouse-ha-macros
        - name: generated-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: chdata
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with $ha.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ $ha.storageSize }}
{{- end }}
