# Datacern umbrella chart — default values (cloud-agnostic).
# Override per cloud with -f values-<cloud>.yaml and set the image tag at deploy
# time: --set global.imageTag=<sha-or-tag>.

global:
  # Container registry that CI pushed to (deploy/CONFIG.md -> REGISTRY).
  registry: ghcr.io/datacern-ai
  # Image tag; CI publishes ${{ github.sha }}. Override at deploy time.
  imageTag: latest
  # Pull secrets, if the registry is private and not using workload identity.
  imagePullSecrets: []
  # e.g. [{ name: ghcr-pull }]

nameOverride: ""

# --- Non-secret configuration (rendered into ConfigMap `datacern-config`) ------
# Every Deployment consumes this via envFrom. Values here are the in-cluster
# defaults; per-cloud endpoints are overridden in values-<cloud>.yaml.
config:
  DATACERN_ENV: production

  # Stabilization: refuse to boot on any in-memory/fake adapter (rule: no
  # fake/mock/stub in a runtime path). identity-service honors this today — with
  # it "true" the service EXITS at boot instead of silently faking success
  # unless it is given real DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS, KEYCLOAK_URL,
  # RBAC_URL, OPA_URL. NOTE: those are the env NAMES the Go services read — ensure
  # the synced datacern-secrets provides them (it currently ships POSTGRES_* /
  # REDIS_URL / KAFKA_BOOTSTRAP / KEYCLOAK_ADMIN_* under different names; reconcile
  # them in the secret store / CD, or the guard will (by design) refuse to boot
  # rather than run on a fake. Set "false" only to intentionally stage.)
  REQUIRE_REAL_ADAPTERS: "true"

  # SEC-1 (BRD 58): refuse to boot if a service's runtime DB role can bypass RLS
  # (rolsuper/rolbypassrls) — a wrong DATABASE_URL must fail closed, not silently
  # disable tenant isolation. Requires each *_DATABASE_URL to point at a
  # NOSUPERUSER NOBYPASSRLS *_app role (not the migrate/superuser role).
  DB_REQUIRE_NONSUPERUSER: "true"

  # Identity / JWT (public issuer + audience; signing key/JWKS are SECRETS).
  JWT_ISSUER: https://identity.datacern.internal
  JWT_AUDIENCE: datacern

  # Policy, data lake, ML tracking, workflow, search, embeddings.
  OPA_URL: http://opa:8281
  ICEBERG_CATALOG_URI: http://iceberg-rest:8181
  ICEBERG_WAREHOUSE: s3://datacern-warehouse/
  MLFLOW_TRACKING_URI: http://mlflow:5000
  TEMPORAL_HOST: temporal:7233
  OPENSEARCH_URL: http://opensearch:9200
  OLLAMA_BASE_URL: http://ollama:11434

  # --- Observability (BYO OTel backend) -----------------------------------------
  # Opt-in: unset/false is a clean no-op in every service (go-common/otelx,
  # py-common/datacern_common/otelx.py both gate on DATACERN_OTEL_ENABLED /
  # OTEL_EXPORTER_OTLP_ENDPOINT). Point this at your own OTel Collector or a
  # vendor's native OTLP/gRPC endpoint (Datadog Agent, Honeycomb, Grafana Cloud,
  # New Relic, Splunk O11y) to receive traces — see deploy/CONFIG.md.
  DATACERN_OTEL_ENABLED: "false"
  # OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector.observability.svc:4317

  # --- Internal MCP backend facades (SPIFFE peer allowlist) ---------------------
  # case-service and chart-service host in-cluster MCP backend facades
  # (POST /internal/v1/mcp/invoke) that authorize the calling peer by the
  # mesh-injected `X-Spiffe-Id` header. The facades FAIL CLOSED (403) when this is
  # unset, so it MUST be configured for the governed agent write-back path (an
  # approved proposal → mcp-gateway → facade) to work at all.
  #
  # Value = the CALLER identity the mcp-gateway forwards. The gateway federates
  # every approved write-proposal to these facades under the SPIFFE id it
  # registers for the backend (mcp_backends.spiffe_id — see deploy/e2e seeds,
  # which use `spiffe://datacern/ns/tools/sa/mcp-gateway`). Comma-separated to
  # allow more than one caller identity.
  #
  # SECURITY: the `X-Spiffe-Id` header is only trustworthy when pods speak mTLS
  # (service mesh / SPIRE) so the mesh — not an arbitrary client — sets it, AND
  # ingress to the facade pods is pinned to in-cluster peers. This chart ships
  # that pinning as default-deny NetworkPolicies (see `networkPolicies` below);
  # the allowlist here is the identity gate, the NetworkPolicy the L4 minimum.
  CASE_FACADE_ALLOWED_SPIFFE: spiffe://datacern/ns/tools/sa/mcp-gateway
  CHART_FACADE_ALLOWED_SPIFFE: spiffe://datacern/ns/tools/sa/mcp-gateway

  # In-cluster service DNS (name:port from deploy/services.yaml). Callers resolve
  # peers via these, never hard-coded hosts.
  IDENTITY_URL: http://identity-service:8301
  RBAC_URL: http://rbac-service:8302
  INGESTION_URL: http://ingestion-service:8303
  DATASET_URL: http://dataset-service:8304
  REALTIME_HUB_URL: http://realtime-hub:8305
  AGENT_RUNTIME_URL: http://agent-runtime:8306
  MEMORY_URL: http://memory-service:8307
  CASE_URL: http://case-service:8308
  TOOL_REGISTRY_URL: http://tool-registry:8310
  MCP_GATEWAY_URL: http://mcp-gateway:8311
  AI_GATEWAY_URL: http://ai-gateway:8312
  PIPELINE_URL: http://pipeline-orchestrator:8313
  EXPERIMENT_URL: http://experiment-service:8314
  INFERENCE_URL: http://inference-service:8316
  QUERY_SERVICE_URL: http://query-service:8085
  SEMANTIC_URL: http://semantic-service:8086
  CHART_URL: http://chart-service:8320
  USAGE_URL: http://usage-service:8321
  AUDIT_URL: http://audit-service:8322
  NOTIFICATION_URL: http://notification-service:8323
  EVAL_URL: http://eval-service:8324
  PACK_URL: http://pack-service:8309
  BFF_URL: http://bff-graphql:4000

# --- Secrets -------------------------------------------------------------------
# The Secret `datacern-secrets` is synced from the cloud secret manager (External
# Secrets Operator or the CD workflow). The chart does NOT create it by default —
# every Deployment consumes it via envFrom.
secrets:
  create: false
  name: datacern-secrets

# Optional: let the External Secrets Operator materialize datacern-secrets from
# the cloud secret store. Enable + set secretStoreRef in values-<cloud>.yaml.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: datacern-secret-store
    kind: ClusterSecretStore
  # remoteRef.key prefix in the cloud secret manager (e.g. datacern/prod).
  remoteKeyPrefix: datacern/prod
  # Keys to pull from the store into datacern-secrets. Mirrors deploy/CONFIG.md.
  keys:
    # Postgres endpoint components (admin/DDL role). Per-service FULL DSNs are
    # provided below instead for every application service -- these 4 keys exist
    # for templates/bootstrap-job.yaml alone (BRD 58 WS3, postgresBootstrap.enabled),
    # which composes them into the admin connection it uses to create each
    # per-service database on a fresh managed Postgres instance.
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_ADMIN_USER
    - POSTGRES_ADMIN_PASSWORD
    # Redis — BOTH forms: REDIS_ADDR (bare host:port, Go services) and REDIS_URL
    # (redis[s]:// URL, Python services). See deploy/CONFIG.md.
    - REDIS_ADDR
    - REDIS_URL
    - KAFKA_BOOTSTRAP
    - KAFKA_SASL_USERNAME
    - KAFKA_SASL_PASSWORD
    - OBJECTSTORE_ENDPOINT
    - OBJECTSTORE_ACCESS_KEY
    - OBJECTSTORE_SECRET_KEY
    - OBJECTSTORE_REGION
    - JWT_SIGNING_KEY_PEM
    - JWT_JWKS
    - KEYCLOAK_URL
    - KEYCLOAK_ADMIN_USER
    - KEYCLOAK_ADMIN_PASSWORD
    - VAULT_ADDR
    - VAULT_TOKEN
    - SMTP_HOST
    - SMTP_PORT
    - SMTP_USER
    - SMTP_PASSWORD
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    # ClickHouse (audit-service): reads CLICKHOUSE_ADDR/USER/PASSWORD (host:port,
    # not a URL). CLICKHOUSE_URL kept for any URL-shaped consumer.
    - CLICKHOUSE_URL
    - CLICKHOUSE_ADDR
    - CLICKHOUSE_USER
    - CLICKHOUSE_PASSWORD
    # --- Per-service Postgres DSNs (one runtime NOBYPASSRLS app-role DSN +
    # one admin/DDL migrate DSN per database). The chart injects each into ONLY
    # the service(s) that own it via services[].env, so every service gets a
    # distinct DB + role. <DBKEY>: 20 distinct databases (tool-registry and
    # mcp-gateway share TOOL_PLANE; pack-service is not deployed by this chart).
    - IDENTITY_DATABASE_URL
    - IDENTITY_MIGRATE_URL
    - RBAC_DATABASE_URL
    - RBAC_MIGRATE_URL
    - CASE_DATABASE_URL
    - CASE_MIGRATE_URL
    - CHART_DATABASE_URL
    - CHART_MIGRATE_URL
    - QUERY_DATABASE_URL
    - QUERY_MIGRATE_URL
    - TOOL_PLANE_DATABASE_URL
    - TOOL_PLANE_MIGRATE_URL
    - USAGE_DATABASE_URL
    - USAGE_MIGRATE_URL
    - AUDIT_DATABASE_URL
    - AUDIT_MIGRATE_URL
    - NOTIFICATION_DATABASE_URL
    - NOTIFICATION_MIGRATE_URL
    - REALTIME_HUB_DATABASE_URL
    - REALTIME_HUB_MIGRATE_URL
    - INGESTION_DATABASE_URL
    - INGESTION_MIGRATE_URL
    - DATASET_DATABASE_URL
    - DATASET_MIGRATE_URL
    - AGENT_RUNTIME_DATABASE_URL
    - AGENT_RUNTIME_MIGRATE_URL
    - MEMORY_DATABASE_URL
    - MEMORY_MIGRATE_URL
    - AI_GATEWAY_DATABASE_URL
    - AI_GATEWAY_MIGRATE_URL
    - PIPELINE_DATABASE_URL
    - PIPELINE_MIGRATE_URL
    - EXPERIMENT_DATABASE_URL
    - EXPERIMENT_MIGRATE_URL
    - INFERENCE_DATABASE_URL
    - INFERENCE_MIGRATE_URL
    - SEMANTIC_DATABASE_URL
    - SEMANTIC_MIGRATE_URL
    - EVAL_DATABASE_URL
    - EVAL_MIGRATE_URL
    - PACK_DATABASE_URL
    - PACK_MIGRATE_URL
    # memory + agent-runtime also open a datacern async admin pool (asyncpg scheme,
    # distinct from the psycopg migrate DSN) for runtime CREATE SCHEMA.
    - AGENT_RUNTIME_ADMIN_URL
    - MEMORY_ADMIN_URL

# --- ServiceAccount ------------------------------------------------------------
# Workload-identity annotations are cloud-specific (IRSA / GKE WI / AAD) — set in
# values-<cloud>.yaml so pods reach managed infra keylessly.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Ingress (applied only to services with ingress: public) -------------------
ingress:
  enabled: true
  className: ""            # set per cloud (alb / gce / azure-application-gateway)
  annotations: {}          # set per cloud
  # Host each public service is exposed on. path defaults to "/".
  hosts:
    ui-web:
      host: app.datacern.example.com
      path: /
    bff-graphql:
      host: api.datacern.example.com
      path: /
  tls: []
  # - hosts: [app.datacern.example.com]
  #   secretName: datacern-ui-tls

# --- Migration Jobs ------------------------------------------------------------
migrate:
  enabled: true
  # Extra backoff before failing a migration Job.
  backoffLimit: 1

# --- Postgres per-service database bootstrap (BRD 58 WS3) -----------------------
# Disabled by default -- see templates/bootstrap-job.yaml's header comment for
# why (requires a real admin DSN already provisioned, and the risk profile of a
# hook Job that could block install if that secret is missing). Enable for a
# fresh cloud bring-up once POSTGRES_HOST/POSTGRES_PORT/POSTGRES_ADMIN_USER/
# POSTGRES_ADMIN_PASSWORD (already declared in externalSecrets.keys) are real:
#   --set postgresBootstrap.enabled=true
postgresBootstrap:
  enabled: false
  image: postgres:16-alpine
  backoffLimit: 3
  resources: null # defaults to _resourceTiers.small below
  # Mirrors deploy/k8s/data-tier/postgres-createdbs.yaml's exact database list
  # (Hetzner) / deploy/local/up.sh (local dev) -- keep these three in sync.
  databases:
    - identity
    - rbac
    - tool_plane
    - case_svc
    - realtimehub
    - dataset
    - ingestion
    - ai_gateway
    - agent_runtime
    - memory
    - pipeline
    - experiment
    - inference
    - query
    - semantic
    - eval
    - chart
    - usage
    - notification
    - pack
    - audit
  pgvectorDatabases:
    - tool_plane
    - dataset
    - ai_gateway
    - agent_runtime
    - memory
    - semantic

# --- ClickHouse (audit-service's append-only WORM store) -----------------------
# B9 / audit-service HA: services/audit-service/internal/chstore/chstore.go
# already supports a multi-node, Keeper-coordinated cluster (Config.Addrs +
# Config.Replicated switch buildMigrateDDL to ReplicatedReplacingMergeTree) and
# cmd/server/main.go already reads CLICKHOUSE_ADDRS (comma-separated) /
# CLICKHOUSE_REPLICATED from the environment -- this section is what turns that
# on via Helm. Every key below defaults to the single-node shape so a chart
# install with no overrides is byte-for-byte the same as before this section
# existed: CLICKHOUSE_ADDR/USER/PASSWORD only, ReplacingMergeTree (not
# Replicated).
clickhouse:
  # Non-empty enables CLICKHOUSE_ADDRS on audit-service (comma-joined) instead
  # of (in addition to) the single CLICKHOUSE_ADDR secret. Only meaningful
  # against a real Keeper-coordinated ClickHouse cluster -- e.g. the addresses
  # of the clickhouse.ha StatefulSet pods below, or an externally managed one.
  addrs: []
  # e.g. with clickhouse.ha.enabled: true and replicas: 3 —
  #   - clickhouse-ha-0.clickhouse-ha-headless.<ns>.svc.cluster.local:9000
  #   - clickhouse-ha-1.clickhouse-ha-headless.<ns>.svc.cluster.local:9000
  #   - clickhouse-ha-2.clickhouse-ha-headless.<ns>.svc.cluster.local:9000

  # Sets CLICKHOUSE_REPLICATED=true on audit-service, switching its DDL to
  # ReplicatedReplacingMergeTree. Only safe once every node advertises the
  # {shard}/{replica} macros a Keeper-coordinated cluster provides (see
  # clickhouse.ha below) -- turning this on against a single/non-replicated
  # ClickHouse will fail at migrate time by design (chstore.go comment).
  replicated: false

  # --- Self-managed HA ClickHouse + Keeper (NEW infra, opt-in only) -------------
  # Genuinely new infrastructure this chart did not previously manage at all —
  # deploy/k8s/data-tier/search-audit.yaml's single-node ClickHouse StatefulSet
  # (plain kubectl apply, outside Helm) is untouched either way. When disabled
  # (the default), templates/clickhouse-keeper.yaml and
  # templates/clickhouse-ha.yaml render NOTHING. Authored + `helm lint` /
  # `helm template` validated only -- there is no multi-node k8s cluster in
  # this environment to actually apply it against, so treat this as reviewed
  # IaC, not a live-proven HA deployment.
  ha:
    enabled: false
    # ClickHouse data-node replicas. Each pod gets its own PVC + a per-ordinal
    # macros.xml (shard "01", replica = pod ordinal) so
    # ReplicatedReplacingMergeTree converges via Keeper.
    replicas: 3
    image: clickhouse/clickhouse-server:24.8
    storageClassName: ""   # "" = cluster default StorageClass
    storageSize: 20Gi
    resources:
      requests: { cpu: "500m", memory: 2Gi }
      limits: { memory: 4Gi }
    keeper:
      # ClickHouse Keeper (drop-in ZooKeeper-protocol replacement) coordinating
      # replica state. 3 is the minimum for quorum (tolerates 1 node down).
      replicas: 3
      image: clickhouse/clickhouse-keeper:24.8
      storageClassName: ""
      storageSize: 5Gi
      resources:
        requests: { cpu: "100m", memory: 256Mi }
        limits: { memory: 512Mi }

# --- Observability (Prometheus-Operator convention) -----------------------------
# Metrics stay pull-based (every service exposes /metrics; see deploy/CONFIG.md).
# Enable this for customers running the Prometheus Operator so scraping is
# auto-discovered instead of hand-written scrape_configs. Disabled by default —
# renders nothing (and the CRD need not even be installed) when false.
observability:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    labels: {}
    # Extra labels merged onto every ServiceMonitor, e.g. to match the label
    # selector your Prometheus Operator's `serviceMonitorSelector` expects:
    #   release: kube-prometheus-stack

  # SLO alert bundle (BRD 58 WS2) -- docs/design/observability-slos.md.
  # Same CRD group/gating convention as serviceMonitor above.
  prometheusRule:
    enabled: false
    labels: {}
    # e.g. { release: kube-prometheus-stack } to match your Prometheus
    # Operator's ruleSelector, same as serviceMonitor.labels above.

  # Dashboards-as-code (BRD 58 WS2): a ConfigMap carrying a real Grafana
  # dashboard JSON, labeled for the kube-prometheus-stack Grafana sidecar's
  # auto-discovery (grafana_dashboard: "1" by default -- override
  # sidecarLabel/sidecarLabelValue if your Grafana sidecar is configured
  # differently). One parameterized dashboard (a `job` template variable
  # switches between services) rather than one static dashboard per service.
  grafanaDashboard:
    enabled: false
    sidecarLabel: grafana_dashboard
    sidecarLabelValue: "1"

# --- Network isolation for the internal MCP backend facades --------------------
# case-service and chart-service expose an in-cluster MCP facade
# (POST /internal/v1/mcp/invoke) that trusts a mesh-injected `X-Spiffe-Id`
# header (see `config.CASE_FACADE_ALLOWED_SPIFFE` / `CHART_FACADE_ALLOWED_SPIFFE`).
# That header is only trustworthy when ingress to the facade pods is restricted
# to verified in-cluster peers, so the chart ships one default-deny
# NetworkPolicy per facade service: ingress to the service port is allowed ONLY
# from other datacern pods (same `app.kubernetes.io/part-of: datacern` label) —
# external and cross-workload traffic is denied.
#
# REQUIRES a service mesh (or equivalent) terminating mTLS between pods for the
# `X-Spiffe-Id` header to be trustworthy; this NetworkPolicy is the MINIMUM L4
# in-cluster isolation, NOT a substitute for mesh identity.
#
# Defaults ON for a production posture. Disable only on clusters where a mesh /
# CNI policy layer already provides equivalent isolation.
networkPolicies:
  enabled: true
  # Services fronting an internal MCP facade. Ingress to each is pinned to
  # in-cluster datacern peers; everything else is denied.
  facades:
    - case-service
    - chart-service
  # Extra namespaceSelector matchLabels allowed to reach the facade pods on the
  # service port — e.g. your Prometheus/monitoring namespace, since /metrics is
  # served on the same port. Empty => only in-cluster datacern pods may connect.
  extraNamespaceSelectors: []
  #   - kubernetes.io/metadata.name: monitoring

# --- Pod hardening defaults (per-service overridable) --------------------------
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Default resources, referenced by anchors in the services list below.
_resourceTiers:
  small: &res-small
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  medium: &res-medium
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1", memory: 512Mi }
  large: &res-large
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "2", memory: 1Gi }

# --- Services ------------------------------------------------------------------
# MIRRORS deploy/services.yaml. Templates range over this list to render a
# Deployment + Service (+ HPA / migration Job) per entry. Keep in sync with the
# inventory when a service is added.
#   name/language/port/migrate/ingress  -> from deploy/services.yaml
#   health (readiness) default /readyz; liveness default /healthz
#   dockerfile-derived image name == service name (CI pushes <registry>/<name>)
services:
  # --- Per-service env: maps the EXACT var name THIS service reads (Table A) to
  # a key in datacern-secrets (secretKeyRef) or datacern-config (configMapKeyRef).
  # `env` overrides `envFrom`, so each service gets its own DSN/Redis/Kafka even
  # though the ConfigMap+Secret are shared. Go services read unprefixed
  # DATABASE_URL/REDIS_ADDR/KAFKA_BROKERS; Python read <PREFIX>_*; ingestion is
  # the one unprefixed Python service. OPA_URL/RBAC_URL/ICEBERG_*/KEYCLOAK_*/
  # VAULT_* that a service reads UNPREFIXED already arrive via envFrom, so they
  # get no entry here. (secret/config names are literal — keep in sync with
  # secrets.name=datacern-secrets and the datacern-config ConfigMap.)
  - name: identity-service
    language: go
    port: 8301
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads: DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    # OPA_URL/RBAC_URL/KEYCLOAK_URL/KEYCLOAK_ADMIN_* arrive via envFrom.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: IDENTITY_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: IDENTITY_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: KAFKA_BOOTSTRAP } }

  - name: rbac-service
    language: go
    port: 8302
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads: DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: RBAC_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: RBAC_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: KAFKA_BOOTSTRAP } }

  - name: ingestion-service
    language: python
    port: 8303
    migrate: true
    ingress: internal
    # NOT bumped: app/main.py's _outbox_relay_loop ticks a bespoke
    # ing_outbox_claim_pending SQL function (migrations/0005_outbox_relay_fn.py)
    # that is a plain SELECT with no FOR UPDATE SKIP LOCKED, unlike every other
    # service's outbox dispatcher. 2 replicas would both claim the same batch
    # and double-publish e.g. ingestion.completed before either marks it
    # published. Fix that function first, then this can go to 2.
    replicas: 1
    resources: *res-large
    # UNPREFIXED Python service. Reads: DATABASE_URL, INGESTION_MIGRATE_URL,
    # REDIS_URL, KAFKA_BOOTSTRAP_SERVERS, S3_ENDPOINT_URL. OPA_URL/RBAC_URL/
    # VAULT_ADDR/VAULT_TOKEN/ICEBERG_CATALOG_URI arrive UNPREFIXED via envFrom.
    # (S3 access/secret keys are NOT read from env by this service.)
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: INGESTION_DATABASE_URL } }
      - name: INGESTION_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: INGESTION_MIGRATE_URL } }
      - name: REDIS_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: REDIS_URL } }
      - name: KAFKA_BOOTSTRAP_SERVERS
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: KAFKA_BOOTSTRAP } }
      - name: S3_ENDPOINT_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: OBJECTSTORE_ENDPOINT } }

  - name: dataset-service
    language: python
    port: 8304
    migrate: true
    ingress: internal
    # Bumped to 2: pure request/response API, no in-process singleton loop.
    # Its outbox/retention loops use OutboxDispatcher.run_once() (FOR UPDATE
    # SKIP LOCKED) -- safe under N replicas.
    replicas: 2
    resources: *res-large
    # Prefix DST_. Reads DB/migrate/redis/kafka/opa/rbac/s3(+region)/iceberg.
    env:
      - name: DST_DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: DATASET_DATABASE_URL } }
      - name: DST_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: DATASET_MIGRATE_URL } }
      - name: DST_REDIS_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: REDIS_URL } }
      - name: DST_KAFKA_BOOTSTRAP_SERVERS
