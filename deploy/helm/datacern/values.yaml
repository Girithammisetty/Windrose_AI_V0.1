    replicas: 2
    resources: *res-medium
    # Prefix PACK_. Reads DB/migrate/redis/opa/rbac (NO kafka). Listed in
    # deploy/services.yaml but was previously missing from this chart list.
    env:
      - name: PACK_DATABASE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: PACK_DATABASE_URL } }
      - name: PACK_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: PACK_MIGRATE_URL } }
      - name: PACK_REDIS_URL
        valueFrom: { secretKeyRef: { name: datacern-secrets, key: REDIS_URL } }
      - name: PACK_OPA_URL
        valueFrom: { configMapKeyRef: { name: datacern-config, key: OPA_URL } }
      - name: PACK_RBAC_URL
        valueFrom: { configMapKeyRef: { name: datacern-config, key: RBAC_URL } }

  - name: bff-graphql
    language: node
    port: 4000
    migrate: false
    ingress: public
    health: /healthz
    liveness: /healthz
    replicas: 2
    resources: *res-medium
    # bff runs as `node` (uid 1000) but writes nothing to the FS; keep it locked.

  - name: ui-web
    language: node
    port: 3000
    migrate: false
    ingress: public
    health: /login          # Next.js has no /readyz; /login is the ready signal
    liveness: /login
    replicas: 2
    resources: *res-medium
    # Full override — Next.js writes its cache under /app/.next at runtime, so the
    # root FS can't be read-only. Other hardening is kept.
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop: [ALL]

# --- SLM distillation training Job (task #45 / design §M3) --------------------
# OFF by default: a normal install renders no training Job and schedules nothing
# on GPUs. Enable + provision the terraform GPU node pool
# (enable_gpu_training_pool=true) to run a LoRA distillation against a versioned
# SFT dataset (exported by agent-runtime milestone 2). The trainer image/compute
# is the GPU-gated leg.
training:
  enabled: false
  image: ""            # defaults to <registry>/slm-trainer:<imageTag>
  jobSuffix: "run"
  gpuCount: 1
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  # The distillation target — populate before enabling.
  tenantId: ""
  archetype: ""        # the agent_key the SLM specializes on
  sftDatasetId: ""     # the versioned SFT dataset to train against
  baseModel: "meta-llama/Llama-3.2-3B-Instruct"
