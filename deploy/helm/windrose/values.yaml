# Windrose umbrella chart — default values (cloud-agnostic).
# Override per cloud with -f values-<cloud>.yaml and set the image tag at deploy
# time: --set global.imageTag=<sha-or-tag>.

global:
  # Container registry that CI pushed to (deploy/CONFIG.md -> REGISTRY).
  registry: ghcr.io/windrose-ai
  # Image tag; CI publishes ${{ github.sha }}. Override at deploy time.
  imageTag: latest
  # Pull secrets, if the registry is private and not using workload identity.
  imagePullSecrets: []
  # e.g. [{ name: ghcr-pull }]

nameOverride: ""

# --- Non-secret configuration (rendered into ConfigMap `windrose-config`) ------
# Every Deployment consumes this via envFrom. Values here are the in-cluster
# defaults; per-cloud endpoints are overridden in values-<cloud>.yaml.
config:
  WINDROSE_ENV: production

  # Stabilization: refuse to boot on any in-memory/fake adapter (rule: no
  # fake/mock/stub in a runtime path). identity-service honors this today — with
  # it "true" the service EXITS at boot instead of silently faking success
  # unless it is given real DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS, KEYCLOAK_URL,
  # RBAC_URL, OPA_URL. NOTE: those are the env NAMES the Go services read — ensure
  # the synced windrose-secrets provides them (it currently ships POSTGRES_* /
  # REDIS_URL / KAFKA_BOOTSTRAP / KEYCLOAK_ADMIN_* under different names; reconcile
  # them in the secret store / CD, or the guard will (by design) refuse to boot
  # rather than run on a fake. Set "false" only to intentionally stage.)
  REQUIRE_REAL_ADAPTERS: "true"

  # Identity / JWT (public issuer + audience; signing key/JWKS are SECRETS).
  JWT_ISSUER: https://identity.windrose.internal
  JWT_AUDIENCE: windrose

  # Policy, data lake, ML tracking, workflow, search, embeddings.
  OPA_URL: http://opa:8281
  ICEBERG_CATALOG_URI: http://iceberg-rest:8181
  ICEBERG_WAREHOUSE: s3://windrose-warehouse/
  MLFLOW_TRACKING_URI: http://mlflow:5000
  TEMPORAL_HOST: temporal:7233
  OPENSEARCH_URL: http://opensearch:9200
  OLLAMA_BASE_URL: http://ollama:11434

  # --- Observability (BYO OTel backend) -----------------------------------------
  # Opt-in: unset/false is a clean no-op in every service (go-common/otelx,
  # py-common/windrose_common/otelx.py both gate on WINDROSE_OTEL_ENABLED /
  # OTEL_EXPORTER_OTLP_ENDPOINT). Point this at your own OTel Collector or a
  # vendor's native OTLP/gRPC endpoint (Datadog Agent, Honeycomb, Grafana Cloud,
  # New Relic, Splunk O11y) to receive traces — see deploy/CONFIG.md.
  WINDROSE_OTEL_ENABLED: "false"
  # OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector.observability.svc:4317

  # --- Internal MCP backend facades (SPIFFE peer allowlist) ---------------------
  # case-service and chart-service host in-cluster MCP backend facades
  # (POST /internal/v1/mcp/invoke) that authorize the calling peer by the
  # mesh-injected `X-Spiffe-Id` header. The facades FAIL CLOSED (403) when this is
  # unset, so it MUST be configured for the governed agent write-back path (an
  # approved proposal → mcp-gateway → facade) to work at all.
  #
  # Value = the CALLER identity the mcp-gateway forwards. The gateway federates
  # every approved write-proposal to these facades under the SPIFFE id it
  # registers for the backend (mcp_backends.spiffe_id — see deploy/e2e seeds,
  # which use `spiffe://windrose/ns/tools/sa/mcp-gateway`). Comma-separated to
  # allow more than one caller identity.
  #
  # SECURITY: the `X-Spiffe-Id` header is only trustworthy when pods speak mTLS
  # (service mesh / SPIRE) so the mesh — not an arbitrary client — sets it, AND
  # ingress to the facade pods is pinned to in-cluster peers. This chart ships
  # that pinning as default-deny NetworkPolicies (see `networkPolicies` below);
  # the allowlist here is the identity gate, the NetworkPolicy the L4 minimum.
  CASE_FACADE_ALLOWED_SPIFFE: spiffe://windrose/ns/tools/sa/mcp-gateway
  CHART_FACADE_ALLOWED_SPIFFE: spiffe://windrose/ns/tools/sa/mcp-gateway

  # In-cluster service DNS (name:port from deploy/services.yaml). Callers resolve
  # peers via these, never hard-coded hosts.
  IDENTITY_URL: http://identity-service:8301
  RBAC_URL: http://rbac-service:8302
  INGESTION_URL: http://ingestion-service:8303
  DATASET_URL: http://dataset-service:8304
  REALTIME_HUB_URL: http://realtime-hub:8305
  AGENT_RUNTIME_URL: http://agent-runtime:8306
  MEMORY_URL: http://memory-service:8307
  CASE_URL: http://case-service:8308
  TOOL_REGISTRY_URL: http://tool-registry:8310
  MCP_GATEWAY_URL: http://mcp-gateway:8311
  AI_GATEWAY_URL: http://ai-gateway:8312
  PIPELINE_URL: http://pipeline-orchestrator:8313
  EXPERIMENT_URL: http://experiment-service:8314
  INFERENCE_URL: http://inference-service:8316
  QUERY_SERVICE_URL: http://query-service:8085
  SEMANTIC_URL: http://semantic-service:8086
  CHART_URL: http://chart-service:8320
  USAGE_URL: http://usage-service:8321
  AUDIT_URL: http://audit-service:8322
  NOTIFICATION_URL: http://notification-service:8323
  EVAL_URL: http://eval-service:8324
  PACK_URL: http://pack-service:8309
  BFF_URL: http://bff-graphql:4000

# --- Secrets -------------------------------------------------------------------
# The Secret `windrose-secrets` is synced from the cloud secret manager (External
# Secrets Operator or the CD workflow). The chart does NOT create it by default —
# every Deployment consumes it via envFrom.
secrets:
  create: false
  name: windrose-secrets

# Optional: let the External Secrets Operator materialize windrose-secrets from
# the cloud secret store. Enable + set secretStoreRef in values-<cloud>.yaml.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: windrose-secret-store
    kind: ClusterSecretStore
  # remoteRef.key prefix in the cloud secret manager (e.g. windrose/prod).
  remoteKeyPrefix: windrose/prod
  # Keys to pull from the store into windrose-secrets. Mirrors deploy/CONFIG.md.
  keys:
    # Postgres endpoint components (admin/DDL role) — informational; the chart no
    # longer composes DSNs. Per-service FULL DSNs are provided below instead.
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_ADMIN_USER
    - POSTGRES_ADMIN_PASSWORD
    # Redis — BOTH forms: REDIS_ADDR (bare host:port, Go services) and REDIS_URL
    # (redis[s]:// URL, Python services). See deploy/CONFIG.md.
    - REDIS_ADDR
    - REDIS_URL
    - KAFKA_BOOTSTRAP
    - KAFKA_SASL_USERNAME
    - KAFKA_SASL_PASSWORD
    - OBJECTSTORE_ENDPOINT
    - OBJECTSTORE_ACCESS_KEY
    - OBJECTSTORE_SECRET_KEY
    - OBJECTSTORE_REGION
    - JWT_SIGNING_KEY_PEM
    - JWT_JWKS
    - KEYCLOAK_URL
    - KEYCLOAK_ADMIN_USER
    - KEYCLOAK_ADMIN_PASSWORD
    - VAULT_ADDR
    - VAULT_TOKEN
    - SMTP_HOST
    - SMTP_PORT
    - SMTP_USER
    - SMTP_PASSWORD
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    # ClickHouse (audit-service): reads CLICKHOUSE_ADDR/USER/PASSWORD (host:port,
    # not a URL). CLICKHOUSE_URL kept for any URL-shaped consumer.
    - CLICKHOUSE_URL
    - CLICKHOUSE_ADDR
    - CLICKHOUSE_USER
    - CLICKHOUSE_PASSWORD
    # --- Per-service Postgres DSNs (one runtime NOBYPASSRLS app-role DSN +
    # one admin/DDL migrate DSN per database). The chart injects each into ONLY
    # the service(s) that own it via services[].env, so every service gets a
    # distinct DB + role. <DBKEY>: 20 distinct databases (tool-registry and
    # mcp-gateway share TOOL_PLANE; pack-service is not deployed by this chart).
    - IDENTITY_DATABASE_URL
    - IDENTITY_MIGRATE_URL
    - RBAC_DATABASE_URL
    - RBAC_MIGRATE_URL
    - CASE_DATABASE_URL
    - CASE_MIGRATE_URL
    - CHART_DATABASE_URL
    - CHART_MIGRATE_URL
    - QUERY_DATABASE_URL
    - QUERY_MIGRATE_URL
    - TOOL_PLANE_DATABASE_URL
    - TOOL_PLANE_MIGRATE_URL
    - USAGE_DATABASE_URL
    - USAGE_MIGRATE_URL
    - AUDIT_DATABASE_URL
    - AUDIT_MIGRATE_URL
    - NOTIFICATION_DATABASE_URL
    - NOTIFICATION_MIGRATE_URL
    - REALTIME_HUB_DATABASE_URL
    - REALTIME_HUB_MIGRATE_URL
    - INGESTION_DATABASE_URL
    - INGESTION_MIGRATE_URL
    - DATASET_DATABASE_URL
    - DATASET_MIGRATE_URL
    - AGENT_RUNTIME_DATABASE_URL
    - AGENT_RUNTIME_MIGRATE_URL
    - MEMORY_DATABASE_URL
    - MEMORY_MIGRATE_URL
    - AI_GATEWAY_DATABASE_URL
    - AI_GATEWAY_MIGRATE_URL
    - PIPELINE_DATABASE_URL
    - PIPELINE_MIGRATE_URL
    - EXPERIMENT_DATABASE_URL
    - EXPERIMENT_MIGRATE_URL
    - INFERENCE_DATABASE_URL
    - INFERENCE_MIGRATE_URL
    - SEMANTIC_DATABASE_URL
    - SEMANTIC_MIGRATE_URL
    - EVAL_DATABASE_URL
    - EVAL_MIGRATE_URL
    - PACK_DATABASE_URL
    - PACK_MIGRATE_URL
    # memory + agent-runtime also open a windrose async admin pool (asyncpg scheme,
    # distinct from the psycopg migrate DSN) for runtime CREATE SCHEMA.
    - AGENT_RUNTIME_ADMIN_URL
    - MEMORY_ADMIN_URL

# --- ServiceAccount ------------------------------------------------------------
# Workload-identity annotations are cloud-specific (IRSA / GKE WI / AAD) — set in
# values-<cloud>.yaml so pods reach managed infra keylessly.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Ingress (applied only to services with ingress: public) -------------------
ingress:
  enabled: true
  className: ""            # set per cloud (alb / gce / azure-application-gateway)
  annotations: {}          # set per cloud
  # Host each public service is exposed on. path defaults to "/".
  hosts:
    ui-web:
      host: app.windrose.example.com
      path: /
    bff-graphql:
      host: api.windrose.example.com
      path: /
  tls: []
  # - hosts: [app.windrose.example.com]
  #   secretName: windrose-ui-tls

# --- Migration Jobs ------------------------------------------------------------
migrate:
  enabled: true
  # Extra backoff before failing a migration Job.
  backoffLimit: 1

# --- Observability (Prometheus-Operator convention) -----------------------------
# Metrics stay pull-based (every service exposes /metrics; see deploy/CONFIG.md).
# Enable this for customers running the Prometheus Operator so scraping is
# auto-discovered instead of hand-written scrape_configs. Disabled by default —
# renders nothing (and the CRD need not even be installed) when false.
observability:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    labels: {}
    # Extra labels merged onto every ServiceMonitor, e.g. to match the label
    # selector your Prometheus Operator's `serviceMonitorSelector` expects:
    #   release: kube-prometheus-stack

# --- Network isolation for the internal MCP backend facades --------------------
# case-service and chart-service expose an in-cluster MCP facade
# (POST /internal/v1/mcp/invoke) that trusts a mesh-injected `X-Spiffe-Id`
# header (see `config.CASE_FACADE_ALLOWED_SPIFFE` / `CHART_FACADE_ALLOWED_SPIFFE`).
# That header is only trustworthy when ingress to the facade pods is restricted
# to verified in-cluster peers, so the chart ships one default-deny
# NetworkPolicy per facade service: ingress to the service port is allowed ONLY
# from other windrose pods (same `app.kubernetes.io/part-of: windrose` label) —
# external and cross-workload traffic is denied.
#
# REQUIRES a service mesh (or equivalent) terminating mTLS between pods for the
# `X-Spiffe-Id` header to be trustworthy; this NetworkPolicy is the MINIMUM L4
# in-cluster isolation, NOT a substitute for mesh identity.
#
# Defaults ON for a production posture. Disable only on clusters where a mesh /
# CNI policy layer already provides equivalent isolation.
networkPolicies:
  enabled: true
  # Services fronting an internal MCP facade. Ingress to each is pinned to
  # in-cluster windrose peers; everything else is denied.
  facades:
    - case-service
    - chart-service
  # Extra namespaceSelector matchLabels allowed to reach the facade pods on the
  # service port — e.g. your Prometheus/monitoring namespace, since /metrics is
  # served on the same port. Empty => only in-cluster windrose pods may connect.
  extraNamespaceSelectors: []
  #   - kubernetes.io/metadata.name: monitoring

# --- Pod hardening defaults (per-service overridable) --------------------------
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Default resources, referenced by anchors in the services list below.
_resourceTiers:
  small: &res-small
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  medium: &res-medium
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1", memory: 512Mi }
  large: &res-large
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "2", memory: 1Gi }

# --- Services ------------------------------------------------------------------
# MIRRORS deploy/services.yaml. Templates range over this list to render a
# Deployment + Service (+ HPA / migration Job) per entry. Keep in sync with the
# inventory when a service is added.
#   name/language/port/migrate/ingress  -> from deploy/services.yaml
#   health (readiness) default /readyz; liveness default /healthz
#   dockerfile-derived image name == service name (CI pushes <registry>/<name>)
services:
  # --- Per-service env: maps the EXACT var name THIS service reads (Table A) to
  # a key in windrose-secrets (secretKeyRef) or windrose-config (configMapKeyRef).
  # `env` overrides `envFrom`, so each service gets its own DSN/Redis/Kafka even
  # though the ConfigMap+Secret are shared. Go services read unprefixed
  # DATABASE_URL/REDIS_ADDR/KAFKA_BROKERS; Python read <PREFIX>_*; ingestion is
  # the one unprefixed Python service. OPA_URL/RBAC_URL/ICEBERG_*/KEYCLOAK_*/
  # VAULT_* that a service reads UNPREFIXED already arrive via envFrom, so they
  # get no entry here. (secret/config names are literal — keep in sync with
  # secrets.name=windrose-secrets and the windrose-config ConfigMap.)
  - name: identity-service
    language: go
    port: 8301
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads: DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    # OPA_URL/RBAC_URL/KEYCLOAK_URL/KEYCLOAK_ADMIN_* arrive via envFrom.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: IDENTITY_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: IDENTITY_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }

  - name: rbac-service
    language: go
    port: 8302
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads: DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: RBAC_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: RBAC_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }

  - name: ingestion-service
    language: python
    port: 8303
    migrate: true
    ingress: internal
    replicas: 1
    resources: *res-large
    # UNPREFIXED Python service. Reads: DATABASE_URL, INGESTION_MIGRATE_URL,
    # REDIS_URL, KAFKA_BOOTSTRAP_SERVERS, S3_ENDPOINT_URL. OPA_URL/RBAC_URL/
    # VAULT_ADDR/VAULT_TOKEN/ICEBERG_CATALOG_URI arrive UNPREFIXED via envFrom.
    # (S3 access/secret keys are NOT read from env by this service.)
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: INGESTION_DATABASE_URL } }
      - name: INGESTION_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: INGESTION_MIGRATE_URL } }
      - name: REDIS_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_URL } }
      - name: KAFKA_BOOTSTRAP_SERVERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }
      - name: S3_ENDPOINT_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_ENDPOINT } }

  - name: dataset-service
    language: python
    port: 8304
    migrate: true
    ingress: internal
    replicas: 1
    resources: *res-large
    # Prefix DST_. Reads DB/migrate/redis/kafka/opa/rbac/s3(+region)/iceberg.
    env:
      - name: DST_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: DATASET_DATABASE_URL } }
      - name: DST_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: DATASET_MIGRATE_URL } }
      - name: DST_REDIS_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_URL } }
      - name: DST_KAFKA_BOOTSTRAP_SERVERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }
      - name: DST_OPA_URL
        valueFrom: { configMapKeyRef: { name: windrose-config, key: OPA_URL } }
      - name: DST_RBAC_URL
        valueFrom: { configMapKeyRef: { name: windrose-config, key: RBAC_URL } }
      - name: DST_S3_ENDPOINT_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_ENDPOINT } }
      - name: DST_S3_ACCESS_KEY
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_ACCESS_KEY } }
      - name: DST_S3_SECRET_KEY
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_SECRET_KEY } }
      - name: DST_S3_REGION
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_REGION } }
      - name: DST_ICEBERG_CATALOG_URI
        valueFrom: { configMapKeyRef: { name: windrose-config, key: ICEBERG_CATALOG_URI } }
      - name: DST_ICEBERG_WAREHOUSE
        valueFrom: { configMapKeyRef: { name: windrose-config, key: ICEBERG_WAREHOUSE } }

  - name: realtime-hub
    language: go
    port: 8305
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads: DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REALTIME_HUB_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REALTIME_HUB_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }

  - name: agent-runtime
    language: python
    port: 8306
    migrate: true
    ingress: internal
    replicas: 1
    resources: *res-large
    # Prefix AR_. Reads AR_DATABASE_URL, AR_ADMIN_DATABASE_URL (privileged DDL),
    # AR_MIGRATE_URL, AR_REDIS_URL, AR_KAFKA_BOOTSTRAP_SERVERS, AR_OPA_URL.
    # NOTE: agent-runtime has NO rbac_url field — no AR_RBAC_URL entry.
    # ADMIN + MIGRATE both point at the privileged (migrate) DSN.
    env:
      - name: AR_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: AGENT_RUNTIME_DATABASE_URL } }
      - name: AR_ADMIN_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: AGENT_RUNTIME_ADMIN_URL } }
      - name: AR_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: AGENT_RUNTIME_MIGRATE_URL } }
      - name: AR_REDIS_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_URL } }
      - name: AR_KAFKA_BOOTSTRAP_SERVERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }
      - name: AR_OPA_URL
        valueFrom: { configMapKeyRef: { name: windrose-config, key: OPA_URL } }

  - name: memory-service
    language: python
    port: 8307
    migrate: true
    ingress: internal
    replicas: 1
    resources: *res-medium
    # Prefix MEM_. Reads MEM_DATABASE_URL, MEM_ADMIN_DATABASE_URL, MEM_MIGRATE_URL,
    # MEM_REDIS_URL, MEM_KAFKA_BOOTSTRAP_SERVERS, MEM_OPA_URL, MEM_RBAC_URL.
    env:
      - name: MEM_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: MEMORY_DATABASE_URL } }
      - name: MEM_ADMIN_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: MEMORY_ADMIN_URL } }
      - name: MEM_MIGRATE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: MEMORY_MIGRATE_URL } }
      - name: MEM_REDIS_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_URL } }
      - name: MEM_KAFKA_BOOTSTRAP_SERVERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }
      - name: MEM_OPA_URL
        valueFrom: { configMapKeyRef: { name: windrose-config, key: OPA_URL } }
      - name: MEM_RBAC_URL
        valueFrom: { configMapKeyRef: { name: windrose-config, key: RBAC_URL } }

  - name: case-service
    language: go
    port: 8308
    migrate: true
    ingress: internal
    replicas: 2
    resources: *res-medium
    # Reads DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS,
    # MINIO_ENDPOINT/MINIO_ACCESS_KEY/MINIO_SECRET_KEY.
    env:
      - name: DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: CASE_DATABASE_URL } }
      - name: MIGRATE_DATABASE_URL
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: CASE_MIGRATE_URL } }
      - name: REDIS_ADDR
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: REDIS_ADDR } }
      - name: KAFKA_BROKERS
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: KAFKA_BOOTSTRAP } }
      - name: MINIO_ENDPOINT
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_ENDPOINT } }
      - name: MINIO_ACCESS_KEY
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_ACCESS_KEY } }
      - name: MINIO_SECRET_KEY
        valueFrom: { secretKeyRef: { name: windrose-secrets, key: OBJECTSTORE_SECRET_KEY } }

  - name: tool-registry
    language: go
    port: 8310
    migrate: true
    ingress: internal
    replicas: 1
    resources: *res-small
    # tool-plane cmd/registry. DBKEY=TOOL_PLANE (shared with mcp-gateway).
    # Reads DATABASE_URL, MIGRATE_DATABASE_URL, REDIS_ADDR, KAFKA_BROKERS.
    env:
