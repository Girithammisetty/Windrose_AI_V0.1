{{- /*
Optional ExternalSecret (External Secrets Operator) that materializes the K8s
Secret `windrose-secrets` from the cloud secret manager. Enable with
externalSecrets.enabled and set secretStoreRef in values-<cloud>.yaml.
*/}}
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "windrose.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ default "1h" .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ default "ClusterSecretStore" .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.secrets.name }}
    creationPolicy: Owner
  data:
    {{- $prefix := .Values.externalSecrets.remoteKeyPrefix -}}
    {{- range $key := .Values.externalSecrets.keys }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $prefix }}/{{ $key }}
    {{- end }}
{{- end }}
