{{- /* One Deployment per entry in .Values.services (mirrors deploy/services.yaml). */}}
{{- $root := . -}}
{{- range $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "windrose.labels" $root | nindent 4 }}
    {{- include "windrose.selectorLabels" (dict "svc" $svc "root" $root) | nindent 4 }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      {{- include "windrose.selectorLabels" (dict "svc" $svc "root" $root) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "windrose.labels" $root | nindent 8 }}
        {{- include "windrose.selectorLabels" (dict "svc" $svc "root" $root) | nindent 8 }}
      annotations:
        # Roll pods when the non-secret config changes.
        checksum/config: {{ toYaml $root.Values.config | sha256sum }}
    spec:
      serviceAccountName: {{ include "windrose.serviceAccountName" $root }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "windrose.image" (dict "svc" $svc "root" $root) }}
          imagePullPolicy: {{ default "IfNotPresent" $root.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: windrose-config
            - secretRef:
                name: {{ $root.Values.secrets.name }}
          startupProbe:
            httpGet:
              path: {{ include "windrose.readyPath" (dict "svc" $svc) }}
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ include "windrose.readyPath" (dict "svc" $svc) }}
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ include "windrose.livePath" (dict "svc" $svc) }}
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (default $root.Values._resourceTiers.small $svc.resources) | nindent 12 }}
          securityContext:
            {{- /* A service may override the whole block (booleans don't merge cleanly). */}}
            {{- toYaml (default $root.Values.securityContext $svc.securityContext) | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with $svc.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with $svc.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
