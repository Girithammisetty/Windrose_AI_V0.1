{{- /*
Pre-install/pre-upgrade migration Job per service with migrate:true that has a
resolvable migrate command. Python services run `alembic upgrade head` (alembic +
migrations ship in the image). Go services self-migrate idempotently on boot
under MIGRATE_DATABASE_URL, so they get no dedicated Job unless a service sets an
explicit `migrateCommand` in values (see README + _helpers.tpl).
*/}}
{{- $root := . -}}
{{- if $root.Values.migrate.enabled }}
{{- range $svc := .Values.services }}
{{- if $svc.migrate }}
{{- $cmd := include "windrose.migrateCommand" (dict "svc" $svc) }}
{{- if $cmd }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $svc.name }}-migrate
  labels:
    {{- include "windrose.labels" $root | nindent 4 }}
    {{- include "windrose.selectorLabels" (dict "svc" $svc "root" $root) | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ default 1 $root.Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "windrose.selectorLabels" (dict "svc" $svc "root" $root) | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "windrose.serviceAccountName" $root }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "windrose.image" (dict "svc" $svc "root" $root) }}
          imagePullPolicy: {{ default "IfNotPresent" $root.Values.global.imagePullPolicy }}
          command: {{ $cmd }}
          envFrom:
            - configMapRef:
                name: windrose-config
            - secretRef:
                name: {{ $root.Values.secrets.name }}
          resources:
            {{- toYaml (default $root.Values._resourceTiers.small $svc.resources) | nindent 12 }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
