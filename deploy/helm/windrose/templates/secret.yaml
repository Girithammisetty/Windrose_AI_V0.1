{{- /*
By default windrose-secrets is synced externally (secrets.create: false) — via
the External Secrets Operator (externalsecret.yaml) or the CD workflow. This
template only creates it when secrets.create=true (e.g. local/dev) from inline
secrets.data. Never commit real values here.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "windrose.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := (default dict .Values.secrets.data) }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
