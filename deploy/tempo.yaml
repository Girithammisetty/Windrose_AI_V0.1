# Grafana Tempo, single-binary ("monolithic") mode for the dev stack (BRD 58
# WS2). Real trace storage + query API, not a stub -- a production deploy
# would split components and use object storage instead of the local
# filesystem backend below; that split is out of scope for this dev wiring.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
