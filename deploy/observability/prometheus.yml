# Throwaway scrape config for the local observability alerting drill
# (deploy/observability/drill.sh). NOT part of docker-compose.dev.yml -- this
# only ever backs a `docker run --rm prom/prometheus` container started and
# torn down by drill.sh, never a standing service.
#
# The `job` label matters here: the platform's alert rules
# (deploy/helm/datacern/templates/prometheusrule.yaml, rendered into
# rules.generated.yml by render_rules.py) group `by (job)`, but
# libs/go-common/metricsx only attaches a `service` const-label to each
# metric -- Prometheus itself assigns `job` from the scrape config below, not
# from anything the app emits. See prometheusrule.yaml's own header comment.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.generated.yml

scrape_configs:
  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      # host.docker.internal resolves to the Docker Desktop host (Mac), where
      # notification-service actually runs as a bare process (deploy/e2e
      # dev stack), not a container this Prometheus could reach by service
      # name.
      - targets: ["host.docker.internal:8323"]

# No real Alertmanager for this drill -- proving the alert transitions
# inactive -> pending -> firing is entirely a property of Prometheus's own
# rule-evaluation engine (visible via /api/v1/rules and /api/v1/alerts);
# routing a firing alert to a notification channel is a separate, already
# well-understood concern this drill does not need to re-prove. A disabled/
# empty alerting section is intentionally left out (default: no Alertmanager
# configured, Prometheus just evaluates rules and reports state locally).
